<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="gGQA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="gMLA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="gSparse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="620" rx="16" fill="#F8FAFC"/>

  <!-- 标题 -->
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">开源大模型注意力机制三条路线全景对比</text>
  <text x="500" y="64" text-anchor="middle" font-size="12" fill="#64748B">GQA · MLA · Sparse Attention —— 内存 · 计算 · 工程复杂度的三角博弈</text>

  <!-- 中心节点：注意力层 -->
  <rect x="380" y="90" width="240" height="50" rx="25" fill="#1E293B" filter="url(#shadow)"/>
  <text x="500" y="121" text-anchor="middle" font-size="15" font-weight="600" fill="#FFF">Attention 层（新瓶颈）</text>

  <!-- 三条路线卡片 -->
  <!-- GQA -->
  <rect x="30" y="180" width="290" height="400" rx="14" fill="#fff" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="180" width="290" height="46" rx="14" fill="url(#gGQA)"/>
  <rect x="30" y="212" width="290" height="14" fill="url(#gGQA)"/>
  <text x="175" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#FFF">路线一：GQA</text>
  <text x="175" y="245" text-anchor="middle" font-size="11" fill="#6366F1" font-weight="600">行业默认 · 安全选择</text>

  <text x="50" y="275" font-size="11" fill="#475569" font-weight="600">核心思路</text>
  <text x="50" y="293" font-size="11" fill="#334155">多个 Q 头共享同一组 KV 头</text>

  <text x="50" y="320" font-size="11" fill="#475569" font-weight="600">代表模型</text>
  <text x="50" y="338" font-size="11" fill="#334155">Qwen3 · Llama 4 · GLM-4.5</text>

  <text x="50" y="365" font-size="11" fill="#475569" font-weight="600">KV 缓存</text>
  <rect x="50" y="375" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="50" y="375" width="90" height="10" rx="5" fill="#6366F1"/>
  <text x="240" y="385" font-size="10" fill="#6366F1">中等（2-4x）</text>

  <text x="50" y="410" font-size="11" fill="#475569" font-weight="600">计算开销</text>
  <rect x="50" y="420" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="50" y="420" width="30" height="10" rx="5" fill="#6366F1"/>
  <text x="240" y="430" font-size="10" fill="#6366F1">无额外</text>

  <text x="50" y="455" font-size="11" fill="#475569" font-weight="600">工程复杂度</text>
  <rect x="50" y="465" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="50" y="465" width="30" height="10" rx="5" fill="#10B981"/>
  <text x="240" y="475" font-size="10" fill="#10B981">低 ✓</text>

  <text x="50" y="505" font-size="11" fill="#475569" font-weight="600">框架兼容</text>
  <text x="50" y="523" font-size="11" fill="#10B981" font-weight="600">原生支持 ✓</text>

  <text x="50" y="552" font-size="11" fill="#475569" font-weight="600">适用场景</text>
  <text x="50" y="570" font-size="10" fill="#334155">通用 · 中等上下文 · 快速迭代</text>

  <!-- MLA -->
  <rect x="355" y="180" width="290" height="400" rx="14" fill="#fff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="355" y="180" width="290" height="46" rx="14" fill="url(#gMLA)"/>
  <rect x="355" y="212" width="290" height="14" fill="url(#gMLA)"/>
  <text x="500" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#FFF">路线二：MLA</text>
  <text x="500" y="245" text-anchor="middle" font-size="11" fill="#10B981" font-weight="600">压缩流派 · 极致效率</text>

  <text x="375" y="275" font-size="11" fill="#475569" font-weight="600">核心思路</text>
  <text x="375" y="293" font-size="11" fill="#334155">KV 压缩到低维潜空间</text>

  <text x="375" y="320" font-size="11" fill="#475569" font-weight="600">代表模型</text>
  <text x="375" y="338" font-size="11" fill="#334155">DeepSeek V3/V4 · Kimi K2</text>

  <text x="375" y="365" font-size="11" fill="#475569" font-weight="600">KV 缓存</text>
  <rect x="375" y="375" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="375" y="375" width="160" height="10" rx="5" fill="#10B981"/>
  <text x="565" y="385" font-size="10" fill="#10B981">高（5-10x）★</text>

  <text x="375" y="410" font-size="11" fill="#475569" font-weight="600">计算开销</text>
  <rect x="375" y="420" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="375" y="420" width="60" height="10" rx="5" fill="#F59E0B"/>
  <text x="565" y="430" font-size="10" fill="#F59E0B">略增（压缩/解压）</text>

  <text x="375" y="455" font-size="11" fill="#475569" font-weight="600">工程复杂度</text>
  <rect x="375" y="465" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="375" y="465" width="140" height="10" rx="5" fill="#EF4444"/>
  <text x="565" y="475" font-size="10" fill="#EF4444">高 ✗</text>

  <text x="375" y="505" font-size="11" fill="#475569" font-weight="600">框架兼容</text>
  <text x="375" y="523" font-size="11" fill="#EF4444" font-weight="600">需定制 kernel ✗</text>

  <text x="375" y="552" font-size="11" fill="#475569" font-weight="600">适用场景</text>
  <text x="375" y="570" font-size="10" fill="#334155">超长上下文 · 内存受限 · 256K+</text>

  <!-- Sparse Attention -->
  <rect x="680" y="180" width="290" height="400" rx="14" fill="#fff" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="680" y="180" width="290" height="46" rx="14" fill="url(#gSparse)"/>
  <rect x="680" y="212" width="290" height="14" fill="url(#gSparse)"/>
  <text x="825" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#FFF">路线三：Sparse</text>
  <text x="825" y="245" text-anchor="middle" font-size="11" fill="#92400E" font-weight="600">跳过不重要的 token</text>

  <text x="700" y="275" font-size="11" fill="#475569" font-weight="600">核心思路</text>
  <text x="700" y="293" font-size="11" fill="#334155">选择性跳过低重要性 token</text>

  <text x="700" y="320" font-size="11" fill="#475569" font-weight="600">代表模型</text>
  <text x="700" y="338" font-size="11" fill="#334155">DeepSeek V3.2 · GLM-5</text>

  <text x="700" y="365" font-size="11" fill="#475569" font-weight="600">KV 缓存</text>
  <rect x="700" y="375" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="700" y="375" width="60" height="10" rx="5" fill="#F59E0B"/>
  <text x="890" y="385" font-size="10" fill="#F59E0B">不直接减少</text>

  <text x="700" y="410" font-size="11" fill="#475569" font-weight="600">计算开销</text>
  <rect x="700" y="420" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="700" y="420" width="160" height="10" rx="5" fill="#10B981"/>
  <text x="890" y="430" font-size="10" fill="#10B981">显著减少 ★</text>

  <text x="700" y="455" font-size="11" fill="#475569" font-weight="600">工程复杂度</text>
  <rect x="700" y="465" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="700" y="465" width="140" height="10" rx="5" fill="#EF4444"/>
  <text x="890" y="475" font-size="10" fill="#EF4444">高 ✗</text>

  <text x="700" y="505" font-size="11" fill="#475569" font-weight="600">框架兼容</text>
  <text x="700" y="523" font-size="11" fill="#EF4444" font-weight="600">需定制 kernel ✗</text>

  <text x="700" y="552" font-size="11" fill="#475569" font-weight="600">适用场景</text>
  <text x="700" y="570" font-size="10" fill="#334155">超长上下文 · 高吞吐 · 计算受限</text>

  <!-- 底部注释 -->
  <text x="500" y="606" text-anchor="middle" font-size="10" fill="#94A3B8">数据来源：Sebastian Raschka 架构图谱 · 各模型技术报告 · ByteBytego 分析 | 制图：AI 热点深度分析</text>
</svg>
