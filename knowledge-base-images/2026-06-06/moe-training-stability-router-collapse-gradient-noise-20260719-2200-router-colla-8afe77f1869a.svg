<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600"><rect width="1200" height="600" fill="#f7fafc"/><text x="60" y="65" font-family="sans-serif" font-size="34" font-weight="bold" fill="#183153">MoE 路由坍缩：从 token 到专家的正反馈</text><rect x="60" y="180" width="200" height="110" rx="14" fill="#dbeafe"/><text x="110" y="245" font-family="sans-serif" font-size="28" fill="#1e3a8a">Token 流</text><path d="M270 235 L380 235" stroke="#2563eb" stroke-width="8" marker-end="url(#a)"/><rect x="390" y="150" width="220" height="170" rx="14" fill="#fef3c7"/><text x="440" y="220" font-family="sans-serif" font-size="28" fill="#92400e">Router</text><text x="425" y="265" font-family="sans-serif" font-size="22" fill="#92400e">Top-k 选择</text><path d="M620 195 L740 145 M620 235 L740 235 M620 275 L740 325" stroke="#64748b" stroke-width="7" marker-end="url(#a)"/><rect x="755" y="95" width="270" height="90" rx="12" fill="#bbf7d0"/><text x="825" y="150" font-family="sans-serif" font-size="25" fill="#166534">专家 1：过热</text><rect x="755" y="190" width="270" height="90" rx="12" fill="#e2e8f0"/><text x="830" y="245" font-family="sans-serif" font-size="25" fill="#475569">专家 2：空闲</text><rect x="755" y="285" width="270" height="90" rx="12" fill="#e2e8f0"/><text x="830" y="340" font-family="sans-serif" font-size="25" fill="#475569">专家 3：空闲</text><path d="M1025 140 C1120 150 1120 420 620 405" fill="none" stroke="#dc2626" stroke-width="7" marker-end="url(#a)"/><text x="650" y="470" font-family="sans-serif" font-size="25" fill="#b91c1c">更多样本 → 更快学习 → 更高路由分数：正反馈</text><text x="60" y="545" font-family="sans-serif" font-size="21" fill="#64748b">图示：坍缩不是“专家不存在”，而是稀疏选择与学习速度共同放大了早期微小偏差。</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs></svg>