<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8eeff"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="arrow2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0002"/>
    </filter>
  </defs>
  <rect width="900" height="500" fill="url(#bg)" rx="12"/>
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1b4b">Computer Use 交互范式：从对话框到桌面</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="200" height="260" rx="16" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
    <circle cx="140" cy="180" r="36" fill="#e0e7ff"/>
    <circle cx="140" cy="168" r="14" fill="#6366F1"/>
    <ellipse cx="140" cy="205" rx="20" ry="12" fill="#6366F1"/>
    <text x="140" y="250" text-anchor="middle" font-size="16" font-weight="bold" fill="#312e81">用户</text>
    <text x="140" y="274" text-anchor="middle" font-size="12" fill="#6b7280">自然语言指令</text>
    <rect x="65" y="290" width="150" height="52" rx="8" fill="#f5f3ff" stroke="#c7d2fe"/>
    <text x="140" y="312" text-anchor="middle" font-size="11" fill="#4338ca">"帮我把桌面上的</text>
    <text x="140" y="328" text-anchor="middle" font-size="11" fill="#4338ca">PDF文件整理到文件夹"</text>
  </g>

  <!-- Arrow 1: User → Agent -->
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#6366F1"/>
    </marker>
  </defs>
  <line x1="240" y1="250" x2="330" y2="250" stroke="url(#arrow1)" stroke-width="3" marker-end="url(#a1)"/>
  <text x="285" y="238" text-anchor="middle" font-size="11" fill="#6366F1">意图表达</text>

  <!-- AI Agent -->
  <g filter="url(#shadow)">
    <rect x="340" y="100" width="220" height="300" rx="16" fill="#fff" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="400" y="125" width="100" height="60" rx="12" fill="#eef2ff"/>
    <text x="450" y="152" text-anchor="middle" font-size="28">🤖</text>
    <text x="450" y="175" text-anchor="middle" font-size="11" fill="#6366F1">AI Agent</text>
    <text x="450" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1b4b">Computer Use</text>
    <!-- capability tags -->
    <rect x="365" y="225" width="70" height="22" rx="11" fill="#dbeafe"/>
    <text x="400" y="240" text-anchor="middle" font-size="10" fill="#1d4ed8">屏幕感知</text>
    <rect x="440" y="225" width="70" height="22" rx="11" fill="#dcfce7"/>
    <text x="475" y="240" text-anchor="middle" font-size="10" fill="#15803d">光标操控</text>
    <rect x="365" y="255" width="70" height="22" rx="11" fill="#fef3c7"/>
    <text x="400" y="270" text-anchor="middle" font-size="10" fill="#92400e">键盘输入</text>
    <rect x="440" y="255" width="70" height="22" rx="11" fill="#fce7f3"/>
    <text x="475" y="270" text-anchor="middle" font-size="10" fill="#9d174d">多窗口切换</text>
    <!-- reasoning -->
    <rect x="365" y="290" width="170" height="45" rx="8" fill="#f5f3ff" stroke="#c7d2fe"/>
    <text x="450" y="308" text-anchor="middle" font-size="10" fill="#4338ca">理解上下文 → 规划步骤</text>
    <text x="450" y="322" text-anchor="middle" font-size="10" fill="#4338ca">→ 执行操作 → 验证结果</text>
    <text x="450" y="375" text-anchor="middle" font-size="12" fill="#6b7280">像隐形同事一样工作</text>
  </g>

  <!-- Arrow 2: Agent → Desktop -->
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#10B981"/>
    </marker>
  </defs>
  <line x1="560" y1="250" x2="640" y2="250" stroke="url(#arrow2)" stroke-width="3" marker-end="url(#a2)"/>
  <text x="600" y="238" text-anchor="middle" font-size="11" fill="#10B981">操控执行</text>

  <!-- Desktop -->
  <g filter="url(#shadow)">
    <rect x="650" y="120" width="210" height="260" rx="16" fill="#fff" stroke="#a7f3d0" stroke-width="1.5"/>
    <!-- monitor -->
    <rect x="680" y="145" width="150" height="100" rx="8" fill="#1e293b"/>
    <rect x="685" y="150" width="140" height="85" rx="4" fill="#0f172a"/>
    <!-- desktop content -->
    <rect x="695" y="158" width="50" height="35" rx="3" fill="#1e40af" opacity="0.8"/>
    <text x="720" y="180" text-anchor="middle" font-size="8" fill="#93c5fd">Finder</text>
    <rect x="755" y="158" width="50" height="35" rx="3" fill="#7c3aed" opacity="0.8"/>
    <text x="780" y="180" text-anchor="middle" font-size="8" fill="#c4b5fd">Terminal</text>
    <rect x="695" y="200" width="50" height="25" rx="3" fill="#059669" opacity="0.8"/>
    <text x="720" y="216" text-anchor="middle" font-size="7" fill="#a7f3d0">Documents</text>
    <!-- cursor -->
    <polygon points="770,195 770,210 780,205" fill="#f59e0b" stroke="#fff" stroke-width="0.5"/>
    <!-- stand -->
    <rect x="745" y="245" width="20" height="15" fill="#94a3b8"/>
    <rect x="725" y="258" width="60" height="5" rx="2" fill="#94a3b8"/>
    <!-- labels -->
    <text x="755" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">macOS 桌面</text>
    <text x="755" y="310" text-anchor="middle" font-size="11" fill="#6b7280">文件管理 / 应用操控</text>
    <text x="755" y="328" text-anchor="middle" font-size="11" fill="#6b7280">文本编辑 / 系统操作</text>
    <text x="755" y="355" text-anchor="middle" font-size="10" fill="#10B981">✦ 多Agent并行工作</text>
  </g>

  <!-- Evolution timeline at bottom -->
  <g transform="translate(80, 430)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#1e1b4b">交互演化：</text>
    <rect x="85" y="-12" width="90" height="24" rx="12" fill="#dbeafe"/>
    <text x="130" y="4" text-anchor="middle" font-size="11" fill="#1d4ed8">命令行时代</text>
    <text x="195" y="4" text-anchor="middle" font-size="14" fill="#9ca3af">→</text>
    <rect x="210" y="-12" width="110" height="24" rx="12" fill="#e0e7ff"/>
    <text x="265" y="4" text-anchor="middle" font-size="11" fill="#4338ca">图形界面时代</text>
    <text x="335" y="4" text-anchor="middle" font-size="14" fill="#9ca3af">→</text>
    <rect x="350" y="-12" width="140" height="24" rx="12" fill="#6366F1"/>
    <text x="420" y="4" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Agent操控时代 ✦</text>
  </g>
  <text x="450" y="478" text-anchor="middle" font-size="10" fill="#9ca3af">© AI Hotspot Analysis 2026</text>
</svg>
