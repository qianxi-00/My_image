<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#0f172a"/>
  <text x="40" y="50" fill="#f8fafc" font-size="26" font-family="Arial, sans-serif" font-weight="700">四类产品路线对比：支持场景 Agent 化</text>
  <text x="40" y="82" fill="#94a3b8" font-size="14" font-family="Arial, sans-serif">建议层 → 半自动共岗 → 自动解决 OS → 跨系统编排平台</text>
  <!-- 4 cards -->
  <g font-family="Arial, sans-serif">
    <rect x="40" y="120" width="210" height="340" rx="14" fill="#1e293b" stroke="#38bdf8"/>
    <text x="145" y="160" text-anchor="middle" fill="#7dd3fc" font-size="16" font-weight="700">A. 建议层</text>
    <text x="55" y="200" fill="#cbd5e1" font-size="13">知识库问答</text>
    <text x="55" y="225" fill="#cbd5e1" font-size="13">回复草稿生成</text>
    <text x="55" y="250" fill="#cbd5e1" font-size="13">人完全负责执行</text>
    <text x="55" y="300" fill="#94a3b8" font-size="12">落地快 / 价值上限低</text>
    <text x="55" y="330" fill="#94a3b8" font-size="12">适合冷启动</text>
    <text x="55" y="400" fill="#38bdf8" font-size="13" font-weight="700">风险：低</text>

    <rect x="270" y="120" width="210" height="340" rx="14" fill="#1e293b" stroke="#a78bfa"/>
    <text x="375" y="160" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="700">B. 共岗层</text>
    <text x="285" y="200" fill="#cbd5e1" font-size="13">Agent 预填动作</text>
    <text x="285" y="225" fill="#cbd5e1" font-size="13">人一键确认</text>
    <text x="285" y="250" fill="#cbd5e1" font-size="13">工具权限受限</text>
    <text x="285" y="300" fill="#94a3b8" font-size="12">效率提升明显</text>
    <text x="285" y="330" fill="#94a3b8" font-size="12">适合高敏感行业</text>
    <text x="285" y="400" fill="#a78bfa" font-size="13" font-weight="700">风险：中低</text>

    <rect x="500" y="120" width="210" height="340" rx="14" fill="#1e293b" stroke="#34d399"/>
    <text x="605" y="160" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="700">C. 解决 OS</text>
    <text x="515" y="200" fill="#cbd5e1" font-size="13">自动诊断+执行</text>
    <text x="515" y="225" fill="#cbd5e1" font-size="13">例外才升级人工</text>
    <text x="515" y="250" fill="#cbd5e1" font-size="13">状态机+证据账本</text>
    <text x="515" y="300" fill="#94a3b8" font-size="12">真正改写工作流</text>
    <text x="515" y="330" fill="#94a3b8" font-size="12">产品护城河开始形成</text>
    <text x="515" y="400" fill="#34d399" font-size="13" font-weight="700">风险：中</text>

    <rect x="730" y="120" width="190" height="340" rx="14" fill="#1e293b" stroke="#fbbf24"/>
    <text x="825" y="160" text-anchor="middle" fill="#fcd34d" font-size="16" font-weight="700">D. 编排平台</text>
    <text x="745" y="200" fill="#cbd5e1" font-size="13">跨 CRM/计费</text>
    <text x="745" y="225" fill="#cbd5e1" font-size="13">/工单/知识库</text>
    <text x="745" y="250" fill="#cbd5e1" font-size="13">策略可配置</text>
    <text x="745" y="300" fill="#94a3b8" font-size="12">平台型商业模式</text>
    <text x="745" y="330" fill="#94a3b8" font-size="12">集成与治理更重</text>
    <text x="745" y="400" fill="#fbbf24" font-size="13" font-weight="700">风险：中高</text>
  </g>
</svg>
