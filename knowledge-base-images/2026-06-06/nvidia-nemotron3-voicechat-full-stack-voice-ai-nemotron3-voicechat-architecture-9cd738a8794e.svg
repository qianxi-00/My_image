<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">语音AI三大架构路线与Nemotron 3 VoiceChat定位</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">数据来源：Artificial Analysis Speech-to-Speech Leaderboard (2026.04)</text>

  <!-- 三条路线 -->
  <!-- Route 1: Cascaded -->
  <rect x="30" y="80" width="230" height="180" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <rect x="30" y="80" width="230" height="30" rx="8" fill="#ef4444" opacity="0.8"/>
  <text x="145" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">级联管线 Cascaded</text>
  <text x="145" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">语音 → ASR → LLM → TTS → 语音</text>
  <text x="145" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">延迟高 · 信息损耗 · 可控性强</text>
  <rect x="50" y="165" width="50" height="24" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="75" y="181" text-anchor="middle" fill="white" font-size="9">ASR</text>
  <text x="110" y="181" text-anchor="middle" fill="#64748b" font-size="14">→</text>
  <rect x="120" y="165" width="50" height="24" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="145" y="181" text-anchor="middle" fill="white" font-size="9">LLM</text>
  <text x="180" y="181" text-anchor="middle" fill="#64748b" font-size="14">→</text>
  <rect x="190" y="165" width="50" height="24" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="215" y="181" text-anchor="middle" fill="white" font-size="9">TTS</text>
  <text x="145" y="210" text-anchor="middle" fill="#f87171" font-size="10">代表：企业级语音机器人</text>
  <text x="145" y="245" text-anchor="middle" fill="#64748b" font-size="10">延迟 ~2-5s · 首字延迟高</text>

  <!-- Route 2: Half-Cascade -->
  <rect x="285" y="80" width="230" height="180" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <rect x="285" y="80" width="230" height="30" rx="8" fill="#f59e0b" opacity="0.8"/>
  <text x="400" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">半级联 Half-Cascade</text>
  <text x="400" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">音频输入 → 内部文本LLM → TTS输出</text>
  <text x="400" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">延迟适中 · 质量好 · 商业主流</text>
  <rect x="310" y="165" width="70" height="24" rx="4" fill="#f59e0b" opacity="0.5"/>
  <text x="345" y="181" text-anchor="middle" fill="white" font-size="9">音频编码</text>
  <text x="390" y="181" text-anchor="middle" fill="#64748b" font-size="14">→</text>
  <rect x="400" y="165" width="70" height="24" rx="4" fill="#f59e0b" opacity="0.5"/>
  <text x="435" y="181" text-anchor="middle" fill="white" font-size="9">文本LLM</text>
  <text x="480" y="181" text-anchor="middle" fill="#64748b" font-size="14">→</text>
  <rect x="490" y="165" width="40" height="24" rx="4" fill="#f59e0b" opacity="0.5"/>
  <text x="510" y="181" text-anchor="middle" fill="white" font-size="9">TTS</text>
  <text x="400" y="210" text-anchor="middle" fill="#fbbf24" font-size="10">OpenAI · Google Gemini · xAI</text>
  <text x="400" y="245" text-anchor="middle" fill="#64748b" font-size="10">延迟 ~0.8-3s · 当前主流方案</text>

  <!-- Route 3: Native Audio -->
  <rect x="540" y="80" width="230" height="180" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <rect x="540" y="80" width="230" height="30" rx="8" fill="#8b5cf6" opacity="0.8"/>
  <text x="655" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">原生音频 Native Audio</text>
  <text x="655" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">音频 → 模型内部推理 → 音频</text>
  <text x="655" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">延迟最低 · 情感保留 · 难训练</text>
  <rect x="570" y="165" width="170" height="24" rx="4" fill="#8b5cf6" opacity="0.5"/>
  <text x="655" y="181" text-anchor="middle" fill="white" font-size="9">端到端音频空间推理</text>
  <text x="655" y="210" text-anchor="middle" fill="#c084fc" font-size="10">Nova 2 Sonic · Step-Audio · Moshi</text>
  <text x="655" y="245" text-anchor="middle" fill="#64748b" font-size="10">延迟 ~0.5-1.1s · 最前沿方向</text>

  <!-- Nemotron 3 VoiceChat 定位 -->
  <rect x="100" y="290" width="600" height="190" rx="10" fill="#0d3320" stroke="#22c55e" stroke-width="2"/>
  <rect x="100" y="290" width="600" height="35" rx="10" fill="#22c55e" opacity="0.9"/>
  <text x="400" y="313" text-anchor="middle" fill="white" font-size="14" font-weight="bold">NVIDIA Nemotron 3 VoiceChat — 开源端到端全双工语音对话模型</text>

  <text x="160" y="348" fill="#86efac" font-size="12" font-weight="bold">架构</text>
  <text x="160" y="368" fill="#cbd5e1" font-size="11">12B参数 · 端到端S2S</text>
  <text x="160" y="388" fill="#cbd5e1" font-size="11">Parakeet编码 + Nano v2骨干 + TTS解码</text>

  <text x="400" y="348" fill="#86efac" font-size="12" font-weight="bold">性能</text>
  <text x="400" y="368" fill="#cbd5e1" font-size="11">对话动态性 77.8% (开源第2)</text>
  <text x="400" y="388" fill="#cbd5e1" font-size="11">语音推理 29.2% (开源第2)</text>

  <text x="620" y="348" fill="#86efac" font-size="12" font-weight="bold">目标</text>
  <text x="620" y="368" fill="#cbd5e1" font-size="11">端到端延迟 &lt;300ms</text>
  <text x="620" y="388" fill="#cbd5e1" font-size="11">80ms音块 · 实时全双工</text>

  <text x="400" y="420" text-anchor="middle" fill="#4ade80" font-size="12">★ 唯一在对话动态性和语音推理两个维度均进入开源前三的模型</text>
  <text x="400" y="440" text-anchor="middle" fill="#94a3b8" font-size="11">Pareto前沿"最理想象限" — 兼顾对话流畅性与推理能力</text>
  <text x="400" y="460" text-anchor="middle" fill="#94a3b8" font-size="10">与闭源模型差距：29.2% vs 87%~96% (Big Bench Audio)</text>

  <!-- 底部注释 -->
  <text x="400" y="490" text-anchor="middle" fill="#475569" font-size="9">© 2026 AI Hotspot Analysis | Nemotron 3 VoiceChat 深度解读</text>
</svg>
