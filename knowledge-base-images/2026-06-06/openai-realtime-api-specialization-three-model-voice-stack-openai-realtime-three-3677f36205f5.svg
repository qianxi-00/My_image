<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="520" fill="#F8FAFC" rx="12"/>

  <!-- 标题 -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">OpenAI Realtime API 架构演进：从单模型到三模型能力栈</text>

  <!-- 左侧：旧架构 -->
  <rect x="30" y="60" width="200" height="430" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="130" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">旧架构（Beta）</text>
  <text x="130" y="105" text-anchor="middle" font-size="11" fill="#B91C1C">单一全能模型</text>

  <!-- 旧模型 -->
  <rect x="55" y="130" width="150" height="50" rx="8" fill="#FEE2E2" stroke="#FECACA" stroke-width="1"/>
  <text x="130" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#991B1B">Realtime API</text>
  <text x="130" y="170" text-anchor="middle" font-size="10" fill="#B91C1C">推理+翻译+转写</text>

  <text x="130" y="210" text-anchor="middle" font-size="10" fill="#DC2626">❌ 成本不可分割</text>
  <text x="130" y="228" text-anchor="middle" font-size="10" fill="#DC2626">❌ 延迟不可调节</text>
  <text x="130" y="246" text-anchor="middle" font-size="10" fill="#DC2626">❌ 功能耦合</text>
  <text x="130" y="264" text-anchor="middle" font-size="10" fill="#DC2626">❌ 32K 上下文</text>

  <!-- 中间箭头 -->
  <text x="290" y="290" text-anchor="middle" font-size="28" fill="#6366F1">→</text>
  <text x="290" y="310" text-anchor="middle" font-size="11" fill="#6366F1" font-weight="bold">拆分</text>

  <!-- 右侧：新架构 -->
  <rect x="350" y="60" width="520" height="430" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="610" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">新架构（2026.05）</text>
  <text x="610" y="105" text-anchor="middle" font-size="11" fill="#2563EB">三模型专用能力栈</text>

  <!-- 用户输入 -->
  <rect x="480" y="125" width="260" height="35" rx="17" fill="#1E293B" filter="url(#shadow)"/>
  <text x="610" y="148" text-anchor="middle" font-size="13" fill="white" font-weight="bold">🎤 用户语音输入</text>

  <!-- 三个模型 -->
  <rect x="370" y="185" width="155" height="80" rx="10" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="447" y="215" text-anchor="middle" font-size="13" fill="white" font-weight="bold">GPT-Realtime-2</text>
  <text x="447" y="235" text-anchor="middle" font-size="11" fill="#E0E7FF">🧠 推理引擎</text>
  <text x="447" y="252" text-anchor="middle" font-size="10" fill="#C7D2FE">128K · 工具调用</text>

  <rect x="545" y="185" width="155" height="80" rx="10" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="622" y="215" text-anchor="middle" font-size="13" fill="white" font-weight="bold">GPT-Realtime</text>
  <text x="622" y="235" text-anchor="middle" font-size="11" fill="#E0E7FF">🌐 Translate</text>
  <text x="622" y="252" text-anchor="middle" font-size="10" fill="#C7D2FE">70+语言输入</text>

  <rect x="720" y="185" width="135" height="80" rx="10" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="787" y="215" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Realtime</text>
  <text x="787" y="235" text-anchor="middle" font-size="11" fill="#D1FAE5">📝 Whisper</text>
  <text x="787" y="252" text-anchor="middle" font-size="10" fill="#A7F3D0">$0.017/分钟</text>

  <!-- 可组合箭头 -->
  <text x="447" y="290" text-anchor="middle" font-size="10" fill="#6366F1">独立调用</text>
  <text x="622" y="290" text-anchor="middle" font-size="10" fill="#3B82F6">独立调用</text>
  <text x="787" y="290" text-anchor="middle" font-size="10" fill="#10B981">独立调用</text>

  <!-- 可组合层 -->
  <rect x="370" y="310" width="485" height="35" rx="8" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="612" y="332" text-anchor="middle" font-size="12" fill="#0369A1" font-weight="bold">🔀 可组合：按需选择 1~3 个模型 · 灵活编排</text>

  <!-- 应用场景 -->
  <text x="612" y="375" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">应用场景</text>

  <rect x="370" y="390" width="115" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="427" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">🏥 医疗</text>
  <text x="427" y="428" text-anchor="middle" font-size="9" fill="#94A3B8">推理+转写</text>

  <rect x="500" y="390" width="115" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="557" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">📞 客服</text>
  <text x="557" y="428" text-anchor="middle" font-size="9" fill="#94A3B8">推理+翻译</text>

  <rect x="630" y="390" width="115" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="687" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">✈️ 旅行</text>
  <text x="687" y="428" text-anchor="middle" font-size="9" fill="#94A3B8">全栈组合</text>

  <rect x="760" y="390" width="95" height="50" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="807" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">📝 会议</text>
  <text x="807" y="428" text-anchor="middle" font-size="9" fill="#94A3B8">纯转写</text>

  <!-- 优势总结 -->
  <rect x="370" y="455" width="485" height="25" rx="6" fill="#ECFDF5"/>
  <text x="612" y="472" text-anchor="middle" font-size="11" fill="#065F46" font-weight="bold">✅ 成本可控 · 延迟灵活 · 功能独立 · 128K上下文 · 70+语言</text>

  <!-- 来源标注 -->
  <text x="450" y="510" text-anchor="middle" font-size="9" fill="#94A3B8">来源：OpenAI 官方博客 · 2026年5月7日</text>
</svg>