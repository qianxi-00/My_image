<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="appGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="providerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3B82F6"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10B981"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8B5CF6"/></marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#F59E0B"/></marker>
  </defs>

  <rect width="920" height="560" rx="12" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="460" y="35" text-anchor="middle" font-size="19" font-weight="bold" fill="#1E293B">AI Gateway 三层技术路线分化（2026）</text>

  <!-- ===== Layer 1: Application Layer ===== -->
  <rect x="30" y="60" width="860" height="100" rx="10" fill="url(#appGrad)" opacity="0.08" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="85" font-size="14" font-weight="bold" fill="#5B21B6">应用层 · AI Applications</text>

  <!-- App boxes -->
  <rect x="50" y="100" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="110" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">AI Chat</text>
  <text x="110" y="134" text-anchor="middle" font-size="9" fill="#7C3AED">多模型路由需求</text>

  <rect x="190" y="100" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="250" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">AI Agent</text>
  <text x="250" y="134" text-anchor="middle" font-size="9" fill="#7C3AED">工具调用 · MCP</text>

  <rect x="330" y="100" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="390" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">AI Coding</text>
  <text x="390" y="134" text-anchor="middle" font-size="9" fill="#7C3AED">代码生成 · 补全</text>

  <rect x="470" y="100" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="530" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">RAG / Search</text>
  <text x="530" y="134" text-anchor="middle" font-size="9" fill="#7C3AED">检索增强生成</text>

  <rect x="610" y="100" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">Multimodal</text>
  <text x="670" y="134" text-anchor="middle" font-size="9" fill="#7C3AED">图像 · 视频 · 音频</text>

  <rect x="750" y="100" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="810" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">Enterprise</text>
  <text x="810" y="134" text-anchor="middle" font-size="9" fill="#7C3AED">合规 · 审计 · SLA</text>

  <!-- Arrow down from apps -->
  <path d="M460 160 L460 182" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="470" y="176" font-size="10" fill="#7C3AED">统一 OpenAI 兼容 API</text>

  <!-- ===== Layer 2: AI Gateway Layer ===== -->
  <rect x="30" y="185" width="860" height="190" rx="10" fill="url(#gwGrad)" opacity="0.08" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="210" font-size="14" font-weight="bold" fill="#1E40AF">AI Gateway 层 · 三条技术路线</text>

  <!-- Route A: Cloud Native Managed -->
  <rect x="50" y="225" width="250" height="130" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="175" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">A. 云原生托管型</text>
  <text x="175" y="266" text-anchor="middle" font-size="10" fill="#3B82F6">OpenRouter · TokenMix</text>
  <line x1="65" y1="278" x2="285" y2="278" stroke="#93C5FD" stroke-width="1"/>
  <text x="65" y="296" font-size="10" fill="#1E40AF">• 一键接入 100+ 模型</text>
  <text x="65" y="312" font-size="10" fill="#1E40AF">• 零运维 · 按量计费</text>
  <text x="65" y="328" font-size="10" fill="#1E40AF">• 快速原型 · 轻量团队</text>
  <text x="65" y="344" font-size="10" fill="#6B7280">⚠ 供应商锁定 · 数据出境</text>

  <!-- Route B: Open Source Self-Hosted -->
  <rect x="330" y="225" width="260" height="130" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E3A8A">B. 开源自托管型</text>
  <text x="460" y="266" text-anchor="middle" font-size="10" fill="#2563EB">LiteLLM · Portkey OSS</text>
  <line x1="345" y1="278" x2="575" y2="278" stroke="#93C5FD" stroke-width="1"/>
  <text x="345" y="296" font-size="10" fill="#1E3A8A">• 完全掌控数据与路由</text>
  <text x="345" y="312" font-size="10" fill="#1E3A8A">• 40K+ GitHub Stars</text>
  <text x="345" y="328" font-size="10" fill="#1E3A8A">• Guardrails · 缓存 · 审计</text>
  <text x="345" y="344" font-size="10" fill="#6B7280">⚠ 需自运维 · K8s 复杂度</text>

  <!-- Route C: Infra Platform Extension -->
  <rect x="620" y="225" width="250" height="130" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="745" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">C. 基础设施扩展型</text>
  <text x="745" y="266" text-anchor="middle" font-size="10" fill="#10B981">Envoy AI GW · Kong</text>
  <line x1="635" y1="278" x2="855" y2="278" stroke="#6EE7B7" stroke-width="1"/>
  <text x="635" y="296" font-size="10" fill="#065F46">• K8s 原生 · CRD 管理</text>
  <text x="635" y="312" font-size="10" fill="#065F46">• v1beta1 生产级稳定</text>
  <text x="635" y="328" font-size="10" fill="#065F46">• MCP Gateway · 安全策略</text>
  <text x="635" y="344" font-size="10" fill="#6B7280">⚠ 学习曲线 · 集群依赖</text>

  <!-- ===== Layer 3: Model Providers ===== -->
  <rect x="30" y="395" width="860" height="85" rx="10" fill="url(#providerGrad)" opacity="0.08" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="420" font-size="14" font-weight="bold" fill="#065F46">模型提供商层 · Model Providers</text>

  <rect x="50" y="435" width="100" height="32" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="100" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">OpenAI</text>

  <rect x="165" y="435" width="100" height="32" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="215" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Anthropic</text>

  <rect x="280" y="435" width="100" height="32" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="330" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Google</text>

  <rect x="395" y="435" width="100" height="32" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="445" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Meta Llama</text>

  <rect x="510" y="435" width="100" height="32" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="560" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">Qwen</text>

  <rect x="625" y="435" width="100" height="32" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="675" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">DeepSeek</text>

  <rect x="740" y="435" width="130" height="32" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="805" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">自托管 / vLLM</text>

  <!-- Key Features Callout -->
  <rect x="30" y="500" width="860" height="48" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="460" y="520" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">🔑 2026 关键趋势：MCP Gateway · 跨提供商推理控制 · Token 级成本追踪 · 安全合规审计 · 语义缓存</text>
  <text x="460" y="538" text-anchor="middle" font-size="10" fill="#B45309">AI Gateway 从"路由器"进化为"AI 流量控制面"，成为 AI 基础设施栈的必备层</text>
</svg>
