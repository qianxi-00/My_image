<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="580" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">Command A+ MoE 架构全景：218B 总参数 / 25B 激活</text>

  <!-- Left Panel: MoE Layer -->
  <rect x="30" y="55" width="410" height="280" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="55" width="410" height="36" rx="10" fill="url(#g1)"/>
  <text x="235" y="78" text-anchor="middle" fill="white" font-size="14" font-weight="bold">MoE Layer（每层重复）</text>

  <!-- Router -->
  <rect x="155" y="100" width="120" height="32" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="215" y="120" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Sigmoid Router</text>
  <text x="215" y="130" text-anchor="middle" fill="#64748b" font-size="10">token-choice · top-8</text>

  <!-- Arrows from router -->
  <line x1="195" y1="132" x2="80" y2="150" stroke="#60a5fa" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="215" y1="132" x2="215" y2="150" stroke="#60a5fa" stroke-width="1"/>
  <line x1="235" y1="132" x2="350" y2="150" stroke="#60a5fa" stroke-width="1"/>

  <!-- 128 Routed Experts (grid) -->
  <rect x="50" y="150" width="170" height="90" rx="6" fill="#0c1929" stroke="#1e40af" stroke-width="1"/>
  <text x="135" y="168" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">128 路由专家（Routed Experts）</text>
  <!-- Mini grid of experts -->
  <g fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5">
    <rect x="56" y="175" width="14" height="10" rx="2"/><rect x="73" y="175" width="14" height="10" rx="2"/><rect x="90" y="175" width="14" height="10" rx="2"/><rect x="107" y="175" width="14" height="10" rx="2"/>
    <rect x="124" y="175" width="14" height="10" rx="2"/><rect x="141" y="175" width="14" height="10" rx="2"/><rect x="158" y="175" width="14" height="10" rx="2"/><rect x="175" y="175" width="14" height="10" rx="2"/>
    <rect x="192" y="175" width="14" height="10" rx="2"/><rect x="56" y="188" width="14" height="10" rx="2"/><rect x="73" y="188" width="14" height="10" rx="2"/><rect x="90" y="188" width="14" height="10" rx="2"/>
    <rect x="107" y="188" width="14" height="10" rx="2"/><rect x="124" y="188" width="14" height="10" rx="2"/><rect x="141" y="188" width="14" height="10" rx="2"/><rect x="158" y="188" width="14" height="10" rx="2"/>
  </g>
  <!-- Highlight 8 active -->
  <g fill="#3b82f6" stroke="#60a5fa" stroke-width="1" opacity="0.9">
    <rect x="56" y="175" width="14" height="10" rx="2"/><rect x="107" y="175" width="14" height="10" rx="2"/><rect x="158" y="175" width="14" height="10" rx="2"/>
    <rect x="73" y="188" width="14" height="10" rx="2"/><rect x="124" y="188" width="14" height="10" rx="2"/><rect x="175" y="175" width="14" height="10" rx="2"/>
    <rect x="141" y="188" width="14" height="10" rx="2"/><rect x="90" y="188" width="14" height="10" rx="2"/>
  </g>
  <text x="135" y="218" text-anchor="middle" fill="#60a5fa" font-size="10">每 token 激活 top-8（彩色）</text>
  <text x="135" y="232" text-anchor="middle" fill="#475569" font-size="10">128 个中取 8 个 · 稀疏率 6.25%</text>

  <!-- Shared Expert -->
  <rect x="260" y="150" width="160" height="90" rx="6" fill="#0c291b" stroke="#10b981" stroke-width="1.5"/>
  <text x="340" y="170" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">共享专家（Shared Expert）</text>
  <rect x="290" y="182" width="100" height="30" rx="4" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="200" text-anchor="middle" fill="#a7f3d0" font-size="11">始终激活 · 1 个</text>
  <text x="340" y="230" text-anchor="middle" fill="#6ee7b7" font-size="10">所有 token 共享</text>

  <!-- Merge arrow -->
  <line x1="135" y1="240" x2="135" y2="265" stroke="#475569" stroke-width="1"/>
  <line x1="340" y1="240" x2="340" y2="265" stroke="#475569" stroke-width="1"/>
  <line x1="135" y1="265" x2="340" y2="265" stroke="#475569" stroke-width="1"/>
  <rect x="200" y="258" width="80" height="18" rx="4" fill="#334155"/>
  <text x="240" y="270" text-anchor="middle" fill="#e2e8f0" font-size="10">加权合并</text>

  <!-- Output -->
  <rect x="200" y="285" width="80" height="22" rx="4" fill="url(#g2)"/>
  <text x="240" y="300" text-anchor="middle" fill="white" font-size="10">FFN 输出</text>

  <!-- Right Panel: Attention Pattern -->
  <rect x="460" y="55" width="410" height="280" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="460" y="55" width="410" height="36" rx="10" fill="url(#g5)"/>
  <text x="665" y="78" text-anchor="middle" fill="white" font-size="14" font-weight="bold">注意力层交替模式（3:1）</text>

  <!-- 4 layers shown -->
  <g>
    <!-- Layer type 1: Sliding Window -->
    <rect x="485" y="100" width="170" height="42" rx="6" fill="#1a0f2e" stroke="#8b5cf6" stroke-width="1"/>
    <text x="570" y="118" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">滑动窗口注意力</text>
    <text x="570" y="132" text-anchor="middle" fill="#7c3aed" font-size="10">窗口 4096 · 局部依赖</text>

    <rect x="670" y="100" width="170" height="42" rx="6" fill="#1a0f2e" stroke="#8b5cf6" stroke-width="1"/>
    <text x="755" y="118" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">滑动窗口注意力</text>
    <text x="755" y="132" text-anchor="middle" fill="#7c3aed" font-size="10">窗口 4096 · 局部依赖</text>

    <rect x="485" y="150" width="170" height="42" rx="6" fill="#1a0f2e" stroke="#8b5cf6" stroke-width="1"/>
    <text x="570" y="168" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">滑动窗口注意力</text>
    <text x="570" y="182" text-anchor="middle" fill="#7c3aed" font-size="10">窗口 4096 · 局部依赖</text>

    <!-- Layer type 2: Global Attention -->
    <rect x="670" y="150" width="170" height="42" rx="6" fill="#0f2e1a" stroke="#10b981" stroke-width="1.5"/>
    <text x="755" y="168" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">全局注意力</text>
    <text x="755" y="182" text-anchor="middle" fill="#10b981" font-size="10">全序列 · 长距离依赖</text>
  </g>

  <!-- Ratio annotation -->
  <rect x="510" y="205" width="330" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="675" y="222" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">比例：每 3 层滑动窗口 → 1 层全局注意力</text>
  <text x="675" y="236" text-anchor="middle" fill="#94a3b8" font-size="10">降低长序列计算开销 · O(n·w) vs O(n²)</text>

  <!-- KV Cache savings -->
  <rect x="510" y="255" width="330" height="65" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="675" y="273" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">KV Cache 优化</text>
  <text x="675" y="289" text-anchor="middle" fill="#94a3b8" font-size="10">滑动窗口层只需缓存窗口内 KV · 内存占用 ↓60%</text>
  <text x="675" y="305" text-anchor="middle" fill="#94a3b8" font-size="10">全局层使用 GQA (Grouped Query Attention) 进一步压缩</text>

  <!-- Bottom Panel: Deployment -->
  <rect x="30" y="355" width="840" height="210" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="355" width="840" height="36" rx="10" fill="url(#g4)"/>
  <text x="450" y="378" text-anchor="middle" fill="white" font-size="14" font-weight="bold">量化与部署：W4A4 量化感知蒸馏 → 2×H100 运行 218B 模型</text>

  <!-- Quantization flow -->
  <rect x="55" y="400" width="150" height="50" rx="6" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="130" y="420" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="bold">BF16 训练权重</text>
  <text x="130" y="436" text-anchor="middle" fill="#6366f1" font-size="10">218B params · 436GB</text>

  <line x1="205" y1="425" x2="240" y2="425" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="222" y="418" text-anchor="middle" fill="#f59e0b" font-size="9">QAT蒸馏</text>

  <rect x="240" y="400" width="150" height="50" rx="6" fill="#2e1e1e" stroke="#f59e0b" stroke-width="1"/>
  <text x="315" y="420" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="bold">W4A4 量化权重</text>
  <text x="315" y="436" text-anchor="middle" fill="#f59e0b" font-size="10">4-bit 权重+激活 · ~109GB</text>

  <line x1="390" y1="425" x2="425" y2="425" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="425" y="400" width="180" height="50" rx="6" fill="#0c291b" stroke="#10b981" stroke-width="1.5"/>
  <text x="515" y="420" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">2×H100 80GB 部署</text>
  <text x="515" y="436" text-anchor="middle" fill="#10b981" font-size="10">张量并行 · 约 109GB &lt; 160GB</text>

  <!-- Performance bar -->
  <rect x="640" y="400" width="210" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="745" y="418" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">推理性能（近 BF16 无损）</text>
  <text x="745" y="438" text-anchor="middle" fill="#94a3b8" font-size="10">MMLU · HumanEval · 企业任务 均 &lt;1% 退化</text>

  <!-- Comparison strip -->
  <text x="450" y="475" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">2026 年开源 MoE 部署门槛对比</text>
  <!-- Bars -->
  <rect x="80" y="490" width="160" height="18" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="90" y="503" fill="#93c5fd" font-size="10">DeepSeek V4-Pro 1.6T</text>
  <text x="230" y="503" fill="#60a5fa" font-size="9">8×H100</text>

  <rect x="80" y="512" width="200" height="18" rx="3" fill="#1e293b" stroke="#6366f1" stroke-width="0.5"/>
  <text x="90" y="525" fill="#a5b4fc" font-size="10">Llama 4 Maverick 400B</text>
  <text x="270" y="525" fill="#818cf8" font-size="9">4×H100</text>

  <rect x="80" y="534" width="100" height="18" rx="3" fill="#0c291b" stroke="#10b981" stroke-width="1"/>
  <text x="90" y="547" fill="#6ee7b7" font-size="10">Command A+ 218B</text>
  <text x="172" y="547" fill="#10b981" font-size="9" font-weight="bold">2×H100 ✓</text>

  <rect x="380" y="490" width="140" height="18" rx="3" fill="#2e1e1e" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="390" y="503" fill="#fcd34d" font-size="10">Qwen 3 235B-MoE</text>
  <text x="510" y="503" fill="#f59e0b" font-size="9">4×H100</text>

  <rect x="380" y="512" width="180" height="18" rx="3" fill="#1e1e2e" stroke="#6366f1" stroke-width="0.5"/>
  <text x="390" y="525" fill="#a5b4fc" font-size="10">Gemma 4 26B-A4B</text>
  <text x="560" y="525" fill="#818cf8" font-size="9">单卡可跑</text>

  <rect x="380" y="534" width="120" height="18" rx="3" fill="#0f172a" stroke="#475569" stroke-width="0.5"/>
  <text x="390" y="547" fill="#94a3b8" font-size="10">Mixtral 8x7B (2023)</text>
  <text x="492" y="547" fill="#64748b" font-size="9">单卡</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>
</svg>