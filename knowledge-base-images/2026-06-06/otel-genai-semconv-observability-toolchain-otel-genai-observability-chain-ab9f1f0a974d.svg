<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><rect width="1200" height="520" fill="#f7fafc"/><style>text{font-family:Arial,'Microsoft YaHei';fill:#102a43}.b{fill:#e6fffa;stroke:#0f766e;stroke-width:2}.a{fill:#eef2ff;stroke:#4338ca;stroke-width:2}.t{font-size:25px;font-weight:bold}.s{font-size:19px}.l{stroke:#64748b;stroke-width:3;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0L10,3L0,6z" fill="#64748b"/></marker></defs><text x="55" y="55" class="t">GenAI 可观测性：从一次调用到一次可解释的业务结果</text><rect x="50" y="140" width="220" height="150" rx="16" class="a"/><text x="95" y="205" class="t">应用 / Agent</text><text x="86" y="240" class="s">请求、工具、会话</text><rect x="350" y="140" width="220" height="150" rx="16" class="b"/><text x="394" y="205" class="t">统一语义层</text><text x="378" y="240" class="s">Trace · Metric · Event</text><rect x="650" y="140" width="220" height="150" rx="16" class="a"/><text x="696" y="205" class="t">采集与关联</text><text x="678" y="240" class="s">SDK · Collector</text><rect x="950" y="140" width="200" height="150" rx="16" class="b"/><text x="988" y="205" class="t">分析闭环</text><text x="975" y="240" class="s">告警、成本、评估</text><line x1="270" y1="215" x2="345" y2="215" class="l"/><line x1="570" y1="215" x2="645" y2="215" class="l"/><line x1="870" y1="215" x2="945" y2="215" class="l"/><text x="55" y="405" class="s">关键不是“多打一条日志”，而是让模型、工具、检索、人工确认与最终业务结果共享同一条可查询因果链。</text></svg>