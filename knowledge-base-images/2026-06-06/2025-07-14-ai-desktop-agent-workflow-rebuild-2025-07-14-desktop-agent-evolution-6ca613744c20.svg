<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <rect width="960" height="360" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-family="Noto Sans CJK SC, sans-serif">桌面 Agent 形态演进：从对话到执行</text>
  <rect x="40" y="90" width="240" height="180" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="160" y="130" text-anchor="middle" fill="#38bdf8" font-size="18" font-family="Noto Sans CJK SC, sans-serif">第一代</text>
  <text x="160" y="165" text-anchor="middle" fill="#f8fafc" font-size="20" font-family="Noto Sans CJK SC, sans-serif">ChatBot 助手</text>
  <text x="160" y="200" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Noto Sans CJK SC, sans-serif">问答建议</text>
  <text x="160" y="225" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Noto Sans CJK SC, sans-serif">用户手工执行</text>
  <path d="M290 180 L330 180" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <rect x="350" y="90" width="240" height="180" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="470" y="130" text-anchor="middle" fill="#a78bfa" font-size="18" font-family="Noto Sans CJK SC, sans-serif">第二代</text>
  <text x="470" y="165" text-anchor="middle" fill="#f8fafc" font-size="20" font-family="Noto Sans CJK SC, sans-serif">Tool-Calling</text>
  <text x="470" y="200" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Noto Sans CJK SC, sans-serif">API/工具调用</text>
  <text x="470" y="225" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Noto Sans CJK SC, sans-serif">沙箱/业务系统</text>
  <path d="M600 180 L640 180" stroke="#64748b" stroke-width="3"/>
  <rect x="660" y="90" width="260" height="180" rx="14" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="790" y="130" text-anchor="middle" fill="#34d399" font-size="18" font-family="Noto Sans CJK SC, sans-serif">第三代</text>
  <text x="790" y="165" text-anchor="middle" fill="#f8fafc" font-size="20" font-family="Noto Sans CJK SC, sans-serif">桌面/浏览器 Agent</text>
  <text x="790" y="200" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Noto Sans CJK SC, sans-serif">GUI 感知与操作</text>
  <text x="790" y="225" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Noto Sans CJK SC, sans-serif">跨应用真实执行</text>
  <text x="480" y="320" text-anchor="middle" fill="#64748b" font-size="13" font-family="Noto Sans CJK SC, sans-serif">核心跃迁：从“建议答案”到“接管任务执行层”</text>
