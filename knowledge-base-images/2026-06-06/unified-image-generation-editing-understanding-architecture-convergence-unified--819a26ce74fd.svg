<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f8f9fd"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">图像生成模型「理解-生成-编辑」统一架构收敛示意图</text>

  <!-- Era labels -->
  <text x="130" y="75" text-anchor="middle" font-size="12" fill="#888">2022–2024 分离阶段</text>
  <text x="450" y="75" text-anchor="middle" font-size="12" fill="#888">2024–2025 外挂补丁阶段</text>
  <text x="770" y="75" text-anchor="middle" font-size="12" fill="#888">2026 统一架构阶段</text>

  <!-- Phase 1: Separate boxes -->
  <rect x="30" y="95" width="200" height="65" rx="8" fill="#e8eaf6" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#3f51b5">纯生成模型</text>
  <text x="130" y="142" text-anchor="middle" font-size="11" fill="#666">SD / DALL-E / MJ</text>

  <rect x="30" y="180" width="200" height="65" rx="8" fill="#fce4ec" stroke="#e57373" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">独立编辑模型</text>
  <text x="130" y="227" text-anchor="middle" font-size="11" fill="#666">InstructPix2Pix / ControlNet</text>

  <rect x="30" y="265" width="200" height="65" rx="8" fill="#e0f2f1" stroke="#4db6ac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695c">视觉理解模型</text>
  <text x="130" y="312" text-anchor="middle" font-size="11" fill="#666">Qwen-VL / LLaVA / InternVL</text>

  <!-- Phase 2: Patched together -->
  <rect x="330" y="120" width="240" height="170" rx="10" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="450" y="110" text-anchor="middle" font-size="11" fill="#e65100">外挂式组合</text>

  <rect x="350" y="135" width="200" height="50" rx="7" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="450" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">生成模型</text>
  <text x="450" y="175" text-anchor="middle" font-size="10" fill="#888">基础生成管道</text>

  <rect x="350" y="200" width="200" height="50" rx="7" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="450" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">编辑模块（外挂）</text>
  <text x="450" y="240" text-anchor="middle" font-size="10" fill="#888">ControlNet / IP-Adapter</text>

  <!-- Problems callout -->
  <rect x="330" y="310" width="240" height="70" rx="8" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/>
  <text x="345" y="330" font-size="10" fill="#f57f17">⚠ 风格一致性损失</text>
  <text x="345" y="346" font-size="10" fill="#f57f17">⚠ 推理延迟叠加</text>
  <text x="345" y="362" font-size="10" fill="#f57f17">⚠ 指令理解割裂</text>

  <!-- Arrows Phase 1 → Phase 2 -->
  <line x1="230" y1="127" x2="348" y2="155" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="230" y1="212" x2="348" y2="220" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Phase 3: Unified center -->
  <rect x="660" y="140" width="220" height="80" rx="12" fill="url(#center)" filter="url(#shadow)"/>
  <text x="770" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">统一基础模型</text>
  <text x="770" y="190" text-anchor="middle" font-size="11" fill="#fff">理解 + 生成 + 编辑</text>
  <text x="770" y="208" text-anchor="middle" font-size="10" fill="#e0ffe0">单模型 · 单权重 · 单推理</text>

  <!-- Three source paths into unified -->
  <rect x="660" y="250" width="105" height="55" rx="7" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="712" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Qwen-Image</text>
  <text x="712" y="293" text-anchor="middle" font-size="9" fill="#e8e0ff">VLM条件编码</text>

  <rect x="775" y="250" width="105" height="55" rx="7" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="827" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Seedream 5.0</text>
  <text x="827" y="293" text-anchor="middle" font-size="9" fill="#ffe0e8">DiT+CoT推理</text>

  <rect x="660" y="320" width="105" height="55" rx="7" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="712" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Gemini Omni</text>
  <text x="712" y="363" text-anchor="middle" font-size="9" fill="#e0f8ff">多模态统一</text>

  <rect x="775" y="320" width="105" height="55" rx="7" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="827" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">FLUX.2</text>
  <text x="827" y="363" text-anchor="middle" font-size="9" fill="#888">扩散变换器</text>

  <!-- Arrows into unified -->
  <line x1="712" y1="250" x2="760" y2="222" stroke="#667eea" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="827" y1="250" x2="790" y2="222" stroke="#f5576c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="712" y1="320" x2="740" y2="222" stroke="#4facfe" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="827" y1="320" x2="780" y2="222" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow Phase 2 → Phase 3 -->
  <line x1="570" y1="205" x2="658" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Capabilities callout -->
  <rect x="660" y="400" width="220" height="100" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="670" y="420" font-size="11" font-weight="bold" fill="#2e7d32">统一架构核心能力：</text>
  <text x="670" y="440" font-size="10" fill="#333">• 文本→图像生成</text>
  <text x="670" y="456" font-size="10" fill="#333">• 图像理解与语义分析</text>
  <text x="670" y="472" font-size="10" fill="#333">• 指令驱动精准编辑</text>
  <text x="670" y="488" font-size="10" fill="#333">• 多轮交互一致性保持</text>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" font-size="10" fill="#aaa">数据来源：arXiv:2605.10730 · ByteDance Seed · Google I/O 2026 · Black Forest Labs</text>
</svg>