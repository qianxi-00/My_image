<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650"><rect width="1200" height="650" fill="#f8fafc"/><text x="55" y="65" font-family="sans-serif" font-size="34" font-weight="bold" fill="#183153">稳定训练 MoE 的控制回路：模型、并行与观测一起治理</text><rect x="65" y="170" width="220" height="130" rx="16" fill="#dbeafe"/><text x="115" y="225" font-family="sans-serif" font-size="27" fill="#1e3a8a">路由器</text><text x="92" y="267" font-family="sans-serif" font-size="20" fill="#1e3a8a">温度 / 噪声 / Top-k</text><rect x="490" y="170" width="220" height="130" rx="16" fill="#dcfce7"/><text x="540" y="225" font-family="sans-serif" font-size="27" fill="#166534">专家池</text><text x="516" y="267" font-family="sans-serif" font-size="20" fill="#166534">容量 / 并行 / 梯度</text><rect x="915" y="170" width="220" height="130" rx="16" fill="#fef3c7"/><text x="950" y="225" font-family="sans-serif" font-size="27" fill="#92400e">损失函数</text><text x="944" y="267" font-family="sans-serif" font-size="20" fill="#92400e">任务 + 均衡 + 正则</text><path d="M285 235 L485 235 M710 235 L910 235" stroke="#2563eb" stroke-width="8" marker-end="url(#a)"/><rect x="350" y="430" width="500" height="125" rx="16" fill="#ede9fe"/><text x="462" y="480" font-family="sans-serif" font-size="29" fill="#5b21b6">可观测性与控制器</text><text x="415" y="522" font-family="sans-serif" font-size="21" fill="#5b21b6">负载、溢出率、熵、专家利用率、通信尾延迟</text><path d="M1025 305 C1050 410 870 455 850 455 M490 455 C300 425 205 370 205 305" fill="none" stroke="#7c3aed" stroke-width="7" marker-end="url(#a)"/><text x="62" y="620" font-family="sans-serif" font-size="21" fill="#64748b">图示：稳定性不是单一辅助损失的功劳；它要求路由、专家更新、分布式通信和在线诊断构成闭环。</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs></svg>