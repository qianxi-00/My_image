<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Microsoft Copilot 超级应用：产品整合架构</text>
  <!-- Center hub -->
  <circle cx="450" cy="260" r="75" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="450" y="250" text-anchor="middle" fill="#0078d4" font-size="15" font-weight="bold">Copilot</text>
  <text x="450" y="272" text-anchor="middle" fill="#0078d4" font-size="15" font-weight="bold">Super App</text>
  <text x="450" y="292" text-anchor="middle" fill="#666" font-size="11">统一入口</text>
  <!-- GitHub Copilot -->
  <rect x="80" y="90" width="180" height="90" rx="10" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="170" y="125" text-anchor="middle" fill="#0078d4" font-size="14" font-weight="bold">GitHub Copilot</text>
  <text x="170" y="148" text-anchor="middle" fill="#555" font-size="11">AI 编程助手</text>
  <text x="170" y="166" text-anchor="middle" fill="#888" font-size="10">470万+ 付费用户</text>
  <line x1="260" y1="135" x2="375" y2="235" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <!-- Copilot Chat -->
  <rect x="640" y="90" width="180" height="90" rx="10" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="730" y="125" text-anchor="middle" fill="#0078d4" font-size="14" font-weight="bold">Copilot Chat</text>
  <text x="730" y="148" text-anchor="middle" fill="#555" font-size="11">通用 AI 对话</text>
  <text x="730" y="166" text-anchor="middle" fill="#888" font-size="10">对标 ChatGPT / Gemini</text>
  <line x1="640" y1="135" x2="525" y2="235" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <!-- Copilot Cowork -->
  <rect x="80" y="340" width="180" height="90" rx="10" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="170" y="375" text-anchor="middle" fill="#0078d4" font-size="14" font-weight="bold">Copilot Cowork</text>
  <text x="170" y="398" text-anchor="middle" fill="#555" font-size="11">企业级任务代理</text>
  <text x="170" y="416" text-anchor="middle" fill="#888" font-size="10">基于 Anthropic Claude</text>
  <line x1="260" y1="385" x2="375" y2="285" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <!-- Autopilot -->
  <rect x="640" y="340" width="180" height="90" rx="10" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="730" y="375" text-anchor="middle" fill="#0078d4" font-size="14" font-weight="bold">Autopilot</text>
  <text x="730" y="398" text-anchor="middle" fill="#555" font-size="11">Agentic 工作流</text>
  <text x="730" y="416" text-anchor="middle" fill="#888" font-size="10">全新自动化能力</text>
  <line x1="640" y1="385" x2="525" y2="285" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <!-- Bottom note -->
  <text x="450" y="478" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">2026年夏季目标上线 · 负责人 Jacob Andreou · 部分功能或于 Build 大会预览</text>
</svg>