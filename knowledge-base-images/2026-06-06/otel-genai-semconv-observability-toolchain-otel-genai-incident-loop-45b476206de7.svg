<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#f8fafc"/><style>text{font-family:Arial,'Microsoft YaHei';fill:#172554}.h{font-size:30px;font-weight:bold}.t{font-size:22px;font-weight:bold}.s{font-size:18px}.b{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.l{stroke:#2563eb;stroke-width:3;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0L10,3L0,6z" fill="#2563eb"/></marker></defs><text x="50" y="55" class="h">一次“质量事故”的最小闭环：以证据驱动，而不是以猜测驱动</text><rect x="55" y="130" width="220" height="135" rx="14" class="b"/><text x="90" y="185" class="t">1. 发现信号</text><text x="75" y="220" class="s">投诉 / 评估 / 异常</text><rect x="340" y="130" width="220" height="135" rx="14" class="b"/><text x="375" y="185" class="t">2. 回放路径</text><text x="357" y="220" class="s">trace + 输入快照</text><rect x="625" y="130" width="220" height="135" rx="14" class="b"/><text x="660" y="185" class="t">3. 定位变量</text><text x="650" y="220" class="s">模型 / 工具 / 数据</text><rect x="910" y="130" width="220" height="135" rx="14" class="b"/><text x="945" y="185" class="t">4. 受控修复</text><text x="940" y="220" class="s">实验 / 灰度 / 回滚</text><line x1="275" y1="198" x2="335" y2="198" class="l"/><line x1="560" y1="198" x2="620" y2="198" class="l"/><line x1="845" y1="198" x2="905" y2="198" class="l"/><rect x="300" y="350" width="600" height="120" rx="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/><text x="420" y="405" class="t">5. 将结果回写为可观测规则</text><text x="355" y="440" class="s">新增属性、阈值、评估集或采样策略，让下一次更快被发现</text><path d="M1020 265 C1020 330,900 330,900 350" fill="none" class="l"/><path d="M300 410 C180 410,165 300,165 270" fill="none" class="l"/></svg>