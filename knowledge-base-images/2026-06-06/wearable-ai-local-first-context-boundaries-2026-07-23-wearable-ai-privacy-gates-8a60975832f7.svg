<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620"><rect width="1200" height="620" fill="#fffdf7"/><text x="600" y="66" text-anchor="middle" font-size="34" fill="#5a3d12">常开不是常上传：四道隐私闸门</text><g font-size="25" text-anchor="middle" fill="#5a4524"><rect x="70" y="190" width="240" height="210" rx="20" fill="#fde5b8"/><text x="190" y="250">一：本地唤醒</text><text x="190" y="295">不触发即丢弃</text><text x="190" y="340">降低默认采集</text><rect x="340" y="190" width="240" height="210" rx="20" fill="#d9efdf"/><text x="460" y="250">二：显式提示</text><text x="460" y="295">灯 / 声 / 显示</text><text x="460" y="340">让旁人可感知</text><rect x="610" y="190" width="240" height="210" rx="20" fill="#dce9fa"/><text x="730" y="250">三：权限边界</text><text x="730" y="295">用途与保留期</text><text x="730" y="340">可撤销、可审计</text><rect x="880" y="190" width="240" height="210" rx="20" fill="#f3dce8"/><text x="1000" y="250">四：人工兜底</text><text x="1000" y="295">敏感场所禁用</text><text x="1000" y="340">一键物理关闭</text></g><text x="600" y="510" text-anchor="middle" font-size="24" fill="#765e39">产品可信度来自可验证的边界，而不是一份冗长的隐私政策</text></svg>