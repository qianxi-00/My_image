<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="24" fill="url(#bg2)"/>
  <text x="48" y="52" fill="#f3f4f6" font-size="26" font-family="system-ui,sans-serif" font-weight="700">Activation Loop · 五步闭环</text>
  <text x="48" y="82" fill="#9ca3af" font-size="14" font-family="system-ui,sans-serif">Observe → Diagnose → Orchestrate → Deliver → Verify &amp; Learn</text>

  <!-- 5 boxes in a cycle-ish row with arrows -->
  <g font-family="system-ui,sans-serif">
    <rect x="40" y="180" width="150" height="120" rx="14" fill="#0ea5e9" opacity="0.9"/>
    <text x="115" y="230" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">1 Observe</text>
    <text x="115" y="258" text-anchor="middle" fill="#e0f2fe" font-size="12">事件/健康分</text>
    <text x="115" y="278" text-anchor="middle" fill="#e0f2fe" font-size="12">账号上下文</text>

    <rect x="220" y="180" width="150" height="120" rx="14" fill="#8b5cf6" opacity="0.95"/>
    <text x="295" y="230" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">2 Diagnose</text>
    <text x="295" y="258" text-anchor="middle" fill="#ede9fe" font-size="12">卡点假设</text>
    <text x="295" y="278" text-anchor="middle" fill="#ede9fe" font-size="12">证据包</text>

    <rect x="400" y="180" width="150" height="120" rx="14" fill="#10b981" opacity="0.95"/>
    <text x="475" y="230" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">3 Orchestrate</text>
    <text x="475" y="258" text-anchor="middle" fill="#d1fae5" font-size="12">策略路径</text>
    <text x="475" y="278" text-anchor="middle" fill="#d1fae5" font-size="12">动作序列</text>

    <rect x="580" y="180" width="150" height="120" rx="14" fill="#f59e0b" opacity="0.95"/>
    <text x="655" y="230" text-anchor="middle" fill="#111" font-size="16" font-weight="700">4 Deliver</text>
    <text x="655" y="258" text-anchor="middle" fill="#422006" font-size="12">触达/配置</text>
    <text x="655" y="278" text-anchor="middle" fill="#422006" font-size="12">销售任务</text>

    <rect x="760" y="180" width="150" height="120" rx="14" fill="#ef4444" opacity="0.92"/>
    <text x="835" y="230" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">5 Verify</text>
    <text x="835" y="258" text-anchor="middle" fill="#fee2e2" font-size="12">里程碑验收</text>
    <text x="835" y="278" text-anchor="middle" fill="#fee2e2" font-size="12">学习回灌</text>
  </g>

  <!-- arrows -->
  <path d="M190 240 H220" stroke="#94a3b8" stroke-width="3" marker-end="url(#a)"/>
  <path d="M370 240 H400" stroke="#94a3b8" stroke-width="3"/>
  <path d="M550 240 H580" stroke="#94a3b8" stroke-width="3"/>
  <path d="M730 240 H760" stroke="#94a3b8" stroke-width="3"/>
  <path d="M835 320 V380 H115 V300" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
  <text x="480" y="410" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif">未达标则回退 Diagnose / 重新编排 · 达标则推进下一里程碑</text>

  <rect x="80" y="440" width="800" height="60" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="480" y="475" text-anchor="middle" fill="#e2e8f0" font-size="14" font-family="system-ui,sans-serif">交付物不是“发了一封激活邮件”，而是账号状态达到可验证的激活目标态</text>
</svg>
