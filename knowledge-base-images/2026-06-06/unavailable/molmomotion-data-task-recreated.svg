<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.55" stop-color="#f0f7ff"/>
      <stop offset="1" stop-color="#edf7ef"/>
    </linearGradient>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #202f3a; }
      .title { font-size: 44px; font-weight: 800; }
      .sub { font-size: 23px; fill: #566975; }
      .head { font-size: 28px; font-weight: 800; }
      .body { font-size: 20px; fill: #5a6870; }
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="90" y="92" class="title">MolmoMotion 数据与任务关系示意图</text>
  <text x="90" y="134" class="sub">模型、数据和基准围绕同一个核心任务组织：语言条件下的对象 3D 运动预测。</text>
  <g transform="translate(92 214)">
    <rect width="360" height="300" rx="30" fill="#ffffff" stroke="#d0a85b" stroke-width="3"/>
    <text x="36" y="62" class="head">训练数据</text>
    <rect x="38" y="96" width="112" height="78" rx="14" fill="#f5d69a"/>
    <rect x="172" y="96" width="112" height="78" rx="14" fill="#e9bf75"/>
    <path d="M58 212 H300" stroke="#b47625" stroke-width="10" stroke-linecap="round"/>
    <path d="M58 246 H244" stroke="#b47625" stroke-width="10" stroke-linecap="round" opacity="0.65"/>
    <text x="36" y="276" class="body">视频、对象点、语言描述</text>
  </g>
  <g transform="translate(520 214)">
    <rect width="360" height="300" rx="30" fill="#ffffff" stroke="#6ca6c8" stroke-width="3"/>
    <text x="36" y="62" class="head">模型任务</text>
    <circle cx="112" cy="148" r="42" fill="#5a9bc0"/>
    <circle cx="218" cy="148" r="42" fill="#8cc6df"/>
    <path d="M112 148 C148 92 184 204 218 148" fill="none" stroke="#1f5268" stroke-width="10" stroke-linecap="round"/>
    <text x="36" y="232" class="body">输入：观察 + 指令</text>
    <text x="36" y="266" class="body">输出：未来 3D 点轨迹</text>
  </g>
  <g transform="translate(948 214)">
    <rect width="360" height="300" rx="30" fill="#ffffff" stroke="#76b982" stroke-width="3"/>
    <text x="36" y="62" class="head">评测基准</text>
    <rect x="44" y="104" width="250" height="34" rx="17" fill="#cce9d0"/>
    <rect x="44" y="158" width="202" height="34" rx="17" fill="#90cf9a"/>
    <rect x="44" y="212" width="286" height="34" rx="17" fill="#57a965"/>
    <text x="36" y="276" class="body">PointMotionBench 统一比较</text>
  </g>
  <path d="M452 364 H512" stroke="#566975" stroke-width="8" stroke-linecap="round"/>
  <path d="M880 364 H940" stroke="#566975" stroke-width="8" stroke-linecap="round"/>
  <rect x="90" y="596" width="1220" height="82" rx="24" fill="#ffffff" opacity="0.78" stroke="#d5dfdb"/>
  <text x="126" y="648" class="sub">关键不只是发布材料多，而是训练、模型任务、评测和下游应用被放在同一条主线上。</text>
</svg>
