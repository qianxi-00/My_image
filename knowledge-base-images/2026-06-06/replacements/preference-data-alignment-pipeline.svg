<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="55%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .h1 { font-size: 30px; font-weight: 800; }
      .subtitle { font-size: 17px; fill: #475569; }
      .title { font-size: 20px; font-weight: 700; }
      .body { font-size: 15px; fill: #475569; }
      .small { font-size: 13px; fill: #64748b; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="54" class="h1">偏好数据如何进入对齐流程</text>
  <text x="60" y="84" class="subtitle">偏好不是最终目标本身，而是把人类选择转成训练信号的中间层。</text>
  

  <rect x="60" y="230" width="150" height="78" rx="18" fill="#e0f2fe" stroke="#334155" stroke-width="2"/>
  <text x="135.0" y="264" text-anchor="middle" class="title">Prompt</text>
  <text x="135.0" y="288" text-anchor="middle" class="body">任务输入</text>


  <rect x="270" y="190" width="170" height="70" rx="18" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
  <text x="355.0" y="224" text-anchor="middle" class="title">Response A</text>
  <text x="355.0" y="248" text-anchor="middle" class="body">候选回答</text>


  <rect x="270" y="300" width="170" height="70" rx="18" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
  <text x="355.0" y="334" text-anchor="middle" class="title">Response B</text>
  <text x="355.0" y="358" text-anchor="middle" class="body">候选回答</text>


  <rect x="520" y="230" width="180" height="90" rx="18" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
  <text x="610.0" y="264" text-anchor="middle" class="title">Human Preference</text>
  <text x="610.0" y="288" text-anchor="middle" class="body">A > B 或 B > A</text>


  <rect x="770" y="210" width="170" height="90" rx="18" fill="#ede9fe" stroke="#334155" stroke-width="2"/>
  <text x="855.0" y="244" text-anchor="middle" class="title">Reward Model</text>
  <text x="855.0" y="268" text-anchor="middle" class="body">学习偏好评分</text>


  <rect x="1010" y="210" width="140" height="90" rx="18" fill="#ffedd5" stroke="#334155" stroke-width="2"/>
  <text x="1080.0" y="244" text-anchor="middle" class="title">RL / DPO</text>
  <text x="1080.0" y="268" text-anchor="middle" class="body">更新模型</text>

<path d="M210,270 C240,270 240,225 270,225" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M210,270 C240,270 240,335 270,335" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M440,225 C480,225 480,260 520,260" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M440,335 C480,335 480,290 520,290" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M700,275 C735,275 735,255 770,255" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M940,255 C975,255 975,255 1010,255" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>

</svg>
