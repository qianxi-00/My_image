<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="55%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .h1 { font-size: 30px; font-weight: 800; }
      .subtitle { font-size: 17px; fill: #475569; }
      .title { font-size: 20px; font-weight: 700; }
      .body { font-size: 15px; fill: #475569; }
      .small { font-size: 13px; fill: #64748b; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="54" class="h1">推理架构演进：从显式思维链到潜空间推理</text>
  <text x="60" y="84" class="subtitle">推理能力不只来自更长输出，也来自训练目标、搜索、工具和内部表示的共同变化。</text>
  

  <rect x="80" y="230" width="210" height="90" rx="18" fill="#e0f2fe" stroke="#334155" stroke-width="2"/>
  <text x="185.0" y="264" text-anchor="middle" class="title">显式 CoT</text>
  <text x="185.0" y="288" text-anchor="middle" class="body">把中间步骤写出来</text>


  <rect x="380" y="230" width="210" height="90" rx="18" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
  <text x="485.0" y="264" text-anchor="middle" class="title">搜索与验证</text>
  <text x="485.0" y="288" text-anchor="middle" class="body">采样 · verifier · rerank</text>


  <rect x="680" y="230" width="210" height="90" rx="18" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
  <text x="785.0" y="264" text-anchor="middle" class="title">工具 / Agent</text>
  <text x="785.0" y="288" text-anchor="middle" class="body">调用外部环境</text>


  <rect x="980" y="230" width="160" height="90" rx="18" fill="#ede9fe" stroke="#334155" stroke-width="2"/>
  <text x="1060.0" y="264" text-anchor="middle" class="title">潜空间推理</text>
  <text x="1060.0" y="288" text-anchor="middle" class="body">内部规划</text>

<path d="M290,275 C335,275 335,275 380,275" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M590,275 C635,275 635,275 680,275" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M890,275 C935,275 935,275 980,275" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
<text x="610" y="380" text-anchor="middle" class="small">方向不是互斥替代，而是逐步叠加为更稳定的推理系统</text>

</svg>
