<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="55%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .h1 { font-size: 30px; font-weight: 800; }
      .subtitle { font-size: 17px; fill: #475569; }
      .title { font-size: 20px; font-weight: 700; }
      .body { font-size: 15px; fill: #475569; }
      .small { font-size: 13px; fill: #64748b; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="54" class="h1">预训练数据混合：从语料堆积到课程调度</text>
  <text x="60" y="84" class="subtitle">现代预训练更像数据配方工程：不同来源、难度与领域按阶段进入训练。</text>
  

  <rect x="70" y="120" width="190" height="78" rx="18" fill="#e0f2fe" stroke="#334155" stroke-width="2"/>
  <text x="165.0" y="154" text-anchor="middle" class="title">真实网页</text>
  <text x="165.0" y="178" text-anchor="middle" class="body">规模大但噪声高</text>


  <rect x="70" y="230" width="190" height="78" rx="18" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
  <text x="165.0" y="264" text-anchor="middle" class="title">合成数据</text>
  <text x="165.0" y="288" text-anchor="middle" class="body">可控但需过滤</text>


  <rect x="70" y="340" width="190" height="78" rx="18" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
  <text x="165.0" y="374" text-anchor="middle" class="title">领域语料</text>
  <text x="165.0" y="398" text-anchor="middle" class="body">专业但覆盖窄</text>


  <rect x="380" y="210" width="230" height="120" rx="18" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="495.0" y="244" text-anchor="middle" class="title">数据混合调度器</text>
  <text x="495.0" y="268" text-anchor="middle" class="body">比例 · 质量 · 难度 · 去重</text>


  <rect x="730" y="130" width="210" height="82" rx="18" fill="#ede9fe" stroke="#334155" stroke-width="2"/>
  <text x="835.0" y="164" text-anchor="middle" class="title">早期阶段</text>
  <text x="835.0" y="188" text-anchor="middle" class="body">语言与常识覆盖</text>


  <rect x="730" y="260" width="210" height="82" rx="18" fill="#ffedd5" stroke="#334155" stroke-width="2"/>
  <text x="835.0" y="294" text-anchor="middle" class="title">中期阶段</text>
  <text x="835.0" y="318" text-anchor="middle" class="body">知识与推理增强</text>


  <rect x="730" y="390" width="210" height="82" rx="18" fill="#fee2e2" stroke="#334155" stroke-width="2"/>
  <text x="835.0" y="424" text-anchor="middle" class="title">后期阶段</text>
  <text x="835.0" y="448" text-anchor="middle" class="body">领域与偏好靠拢</text>

<path d="M260,159 C320,159 320,250 380,250" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M260,269 C320,269 320,270 380,270" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M260,379 C320,379 320,290 380,290" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M610,250 C670,250 670,171 730,171" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M610,270 C670,270 670,301 730,301" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M610,290 C670,290 670,431 730,431" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>

</svg>
