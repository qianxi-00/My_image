<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="55%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .h1 { font-size: 30px; font-weight: 800; }
      .subtitle { font-size: 17px; fill: #475569; }
      .title { font-size: 20px; font-weight: 700; }
      .body { font-size: 15px; fill: #475569; }
      .small { font-size: 13px; fill: #64748b; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="60" y="54" class="h1">动态规划与 Bellman Backup</text>
  <text x="60" y="84" class="subtitle">已知环境转移时，可以把相邻状态的价值反复向前回传。</text>
  
  <g transform="translate(160,135)">
    <rect width="360" height="360" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
    <g stroke="#cbd5e1" stroke-width="2">
      <path d="M120 0V360M240 0V360M0 120H360M0 240H360"/>
    </g>
    <text x="60" y="70" text-anchor="middle" class="title">V(s)</text>
    <text x="180" y="70" text-anchor="middle" class="title">0.7</text>
    <text x="300" y="70" text-anchor="middle" class="title">1.0</text>
    <text x="60" y="190" text-anchor="middle" class="title">0.4</text>
    <text x="180" y="190" text-anchor="middle" class="title">0.6</text>
    <text x="300" y="190" text-anchor="middle" class="title">0.8</text>
    <text x="60" y="310" text-anchor="middle" class="title">0.2</text>
    <text x="180" y="310" text-anchor="middle" class="title">0.3</text>
    <text x="300" y="310" text-anchor="middle" class="title">Goal</text>
  </g>
  <path d="M650,250 C760,160 850,160 960,250" fill="none" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="805" y="140" text-anchor="middle" class="title">Bellman 方程</text>
  <text x="805" y="300" text-anchor="middle" class="body">用后继状态价值更新当前状态</text>

</svg>
