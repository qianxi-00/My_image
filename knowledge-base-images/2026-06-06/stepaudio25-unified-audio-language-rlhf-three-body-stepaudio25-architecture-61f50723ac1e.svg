<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="backbone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="asr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
    <linearGradient id="tts" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
    <linearGradient id="dialog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0984e3"/>
      <stop offset="100%" stop-color="#74b9ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#dfe6e9" font-size="18" font-weight="bold">StepAudio 2.5 统一架构：共享骨干 + RLHF 任务特化</text>

  <!-- Audio Input -->
  <rect x="30" y="200" width="120" height="70" rx="10" fill="#2d3436" stroke="#636e72" stroke-width="2"/>
  <text x="90" y="228" text-anchor="middle" fill="#dfe6e9" font-size="13" font-weight="bold">🎤 音频输入</text>
  <text x="90" y="248" text-anchor="middle" fill="#b2bec3" font-size="11">语音 / 文本指令</text>

  <!-- Arrow from input to backbone -->
  <line x1="150" y1="235" x2="210" y2="235" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#636e72"/></marker></defs>

  <!-- Shared Backbone -->
  <rect x="210" y="120" width="280" height="230" rx="16" fill="url(#backbone)" opacity="0.9" filter="url(#glow)"/>
  <text x="350" y="155" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">共享 Transformer 骨干</text>
  <text x="350" y="180" text-anchor="middle" fill="#f0f0f0" font-size="12">音频编码器 + LLM 解码器</text>

  <!-- RLHF Label -->
  <rect x="260" y="200" width="180" height="40" rx="8" fill="#2d3436" opacity="0.85"/>
  <text x="350" y="225" text-anchor="middle" fill="#fdcb6e" font-size="13" font-weight="bold">⚙️ RLHF 后训练特化</text>

  <!-- Shared representations -->
  <rect x="250" y="255" width="200" height="35" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="350" y="277" text-anchor="middle" fill="#dfe6e9" font-size="11">多模态共享隐空间表示</text>

  <!-- Arrow from backbone to branches -->
  <line x1="490" y1="185" x2="560" y2="105" stroke="#00b894" stroke-width="2.5"/>
  <line x1="490" y1="235" x2="560" y2="235" stroke="#e17055" stroke-width="2.5"/>
  <line x1="490" y1="285" x2="560" y2="365" stroke="#0984e3" stroke-width="2.5"/>

  <!-- ASR Branch -->
  <rect x="560" y="65" width="150" height="80" rx="12" fill="url(#asr)" opacity="0.9"/>
  <text x="635" y="95" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">ASR 分支</text>
  <text x="635" y="115" text-anchor="middle" fill="#f0f0f0" font-size="11">语音 → 文本</text>
  <text x="635" y="133" text-anchor="middle" fill="#2d3436" font-size="10" font-weight="bold">WER 2.9%</text>

  <!-- TTS Branch -->
  <rect x="560" y="195" width="150" height="80" rx="12" fill="url(#tts)" opacity="0.9"/>
  <text x="635" y="225" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">TTS 分支</text>
  <text x="635" y="245" text-anchor="middle" fill="#f0f0f0" font-size="11">文本 + 控制 → 语音</text>
  <text x="635" y="263" text-anchor="middle" fill="#2d3436" font-size="10" font-weight="bold">MOS 4.57</text>

  <!-- Realtime Branch -->
  <rect x="560" y="325" width="150" height="80" rx="12" fill="url(#dialog)" opacity="0.9"/>
  <text x="635" y="355" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">实时对话分支</text>
  <text x="635" y="375" text-anchor="middle" fill="#f0f0f0" font-size="11">端到端语音交互</text>
  <text x="635" y="393" text-anchor="middle" fill="#2d3436" font-size="10" font-weight="bold">延迟 &lt; 200ms</text>

  <!-- Outputs -->
  <rect x="760" y="75" width="110" height="55" rx="8" fill="#2d3436" stroke="#00b894" stroke-width="1.5"/>
  <text x="815" y="98" text-anchor="middle" fill="#00b894" font-size="12" font-weight="bold">📝 文本转录</text>
  <text x="815" y="116" text-anchor="middle" fill="#b2bec3" font-size="10">精准 · 高效</text>

  <rect x="760" y="205" width="110" height="55" rx="8" fill="#2d3436" stroke="#e17055" stroke-width="1.5"/>
  <text x="815" y="228" text-anchor="middle" fill="#e17055" font-size="12" font-weight="bold">🔊 自然语音</text>
  <text x="815" y="246" text-anchor="middle" fill="#b2bec3" font-size="10">富有表现力</text>

  <rect x="760" y="335" width="110" height="55" rx="8" fill="#2d3436" stroke="#0984e3" stroke-width="1.5"/>
  <text x="815" y="358" text-anchor="middle" fill="#0984e3" font-size="12" font-weight="bold">💬 实时回复</text>
  <text x="815" y="376" text-anchor="middle" fill="#b2bec3" font-size="10">低延迟 · 情感</text>

  <!-- Arrows from branches to outputs -->
  <line x1="710" y1="105" x2="760" y2="100" stroke="#00b894" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="710" y1="235" x2="760" y2="232" stroke="#e17055" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <line x1="710" y1="365" x2="760" y2="362" stroke="#0984e3" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#00b894"/></marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e17055"/></marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0984e3"/></marker>
  </defs>

  <!-- Bottom legend -->
  <text x="450" y="470" text-anchor="middle" fill="#636e72" font-size="11">核心思想：任务特化不是架构问题，而是推理方向问题 —— RLHF 是关键杠杆</text>
  <text x="450" y="495" text-anchor="middle" fill="#636e72" font-size="10">数据来源：StepAudio 2.5 Technical Report (arXiv:2605.23463) · 阶跃星辰 StepFun</text>
</svg>
