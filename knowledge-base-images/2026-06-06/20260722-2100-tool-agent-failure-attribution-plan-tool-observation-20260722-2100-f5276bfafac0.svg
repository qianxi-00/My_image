<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="o" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="60" y="68" fill="#e2e8f0" font-size="30" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">Tool-Agent 失败归因三角：计划错 / 工具错 / 观察错</text>
  <text x="60" y="108" fill="#94a3b8" font-size="18" font-family="Noto Sans CJK SC, sans-serif">后训练不能把所有失败一锅炖成「回答差」——错误类型决定训练信号</text>

  <!-- pipeline -->
  <rect x="60" y="160" width="1080" height="90" rx="14" fill="#111827" stroke="#334155"/>
  <text x="90" y="195" fill="#cbd5e1" font-size="16" font-family="Noto Sans CJK SC, sans-serif">任务输入 → 计划 Plan → 工具调用 Tool Call → 观察 Observation → 状态更新 / 下一步</text>
  <text x="90" y="225" fill="#64748b" font-size="14" font-family="Noto Sans CJK SC, sans-serif">失败可发生在任一环节；归因错误会把惩罚打到错误 token / 错误模块上</text>

  <!-- three boxes -->
  <rect x="60" y="290" width="340" height="320" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  <rect x="60" y="290" width="340" height="48" rx="16" fill="url(#p)"/>
  <text x="230" y="322" text-anchor="middle" fill="#0f172a" font-size="20" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">计划错 Plan</text>
  <text x="80" y="370" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 目标分解错误</text>
  <text x="80" y="400" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 步骤顺序错误</text>
  <text x="80" y="430" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 过度/不足规划</text>
  <text x="80" y="460" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 权限边界误判</text>
  <text x="80" y="510" fill="#94a3b8" font-size="15" font-family="Noto Sans CJK SC, sans-serif">训练重点：</text>
  <text x="80" y="540" fill="#7dd3fc" font-size="15" font-family="Noto Sans CJK SC, sans-serif">轨迹偏好 / 过程奖励</text>
  <text x="80" y="570" fill="#7dd3fc" font-size="15" font-family="Noto Sans CJK SC, sans-serif">计划 SFT / 批评模型</text>

  <rect x="430" y="290" width="340" height="320" rx="16" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <rect x="430" y="290" width="340" height="48" rx="16" fill="url(#t)"/>
  <text x="600" y="322" text-anchor="middle" fill="#0f172a" font-size="20" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">工具错 Tool</text>
  <text x="450" y="370" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 选错工具/API</text>
  <text x="450" y="400" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 参数 schema 错误</text>
  <text x="450" y="430" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 权限越界调用</text>
  <text x="450" y="460" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 重试/超时策略差</text>
  <text x="450" y="510" fill="#94a3b8" font-size="15" font-family="Noto Sans CJK SC, sans-serif">训练重点：</text>
  <text x="450" y="540" fill="#fcd34d" font-size="15" font-family="Noto Sans CJK SC, sans-serif">Tool-Use SFT / 格式约束</text>
  <text x="450" y="570" fill="#fcd34d" font-size="15" font-family="Noto Sans CJK SC, sans-serif">可验证奖励 / 权限对齐</text>

  <rect x="800" y="290" width="340" height="320" rx="16" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <rect x="800" y="290" width="340" height="48" rx="16" fill="url(#o)"/>
  <text x="970" y="322" text-anchor="middle" fill="#0f172a" font-size="20" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">观察错 Observation</text>
  <text x="820" y="370" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 误读返回结果</text>
  <text x="820" y="400" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 忽略错误码/噪声</text>
  <text x="820" y="430" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 状态更新错误</text>
  <text x="820" y="460" fill="#e2e8f0" font-size="16" font-family="Noto Sans CJK SC, sans-serif">· 过早宣称成功</text>
  <text x="820" y="510" fill="#94a3b8" font-size="15" font-family="Noto Sans CJK SC, sans-serif">训练重点：</text>
  <text x="820" y="540" fill="#6ee7b7" font-size="15" font-family="Noto Sans CJK SC, sans-serif">观察-解读 SFT</text>
  <text x="820" y="570" fill="#6ee7b7" font-size="15" font-family="Noto Sans CJK SC, sans-serif">过程批评 / 恢复训练</text>

  <text x="60" y="680" fill="#64748b" font-size="14" font-family="Noto Sans CJK SC, sans-serif">2100 后训练线 · Tool-Agent 失败归因 · 同一失败结果，错误类型不同则训练处方不同</text>
</svg>