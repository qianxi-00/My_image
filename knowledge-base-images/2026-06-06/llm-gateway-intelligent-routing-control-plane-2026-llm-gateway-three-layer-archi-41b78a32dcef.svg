<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00695c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">LLM Gateway 2026 三层架构分化</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#666">From Unified API Proxy → Intelligent Routing Control Plane</text>

  <!-- User icon -->
  <rect x="400" y="80" width="100" height="36" rx="18" fill="#455a64" filter="url(#shadow)"/>
  <text x="450" y="104" text-anchor="middle" font-size="13" fill="white" font-weight="bold">👤 用户请求</text>

  <!-- Arrow down -->
  <line x1="450" y1="116" x2="450" y2="140" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon points="445,138 455,138 450,146" fill="#999"/>

  <!-- Layer 3: Governance Control Plane -->
  <rect x="60" y="150" width="780" height="130" rx="10" fill="url(#g1)" filter="url(#shadow)" opacity="0.95"/>
  <text x="70" y="175" font-size="14" fill="#b3e5fc" font-weight="bold">Layer 3 · 治理控制面 Governance Control Plane</text>

  <!-- Portkey -->
  <rect x="90" y="190" width="200" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="190" y="215" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Portkey</text>
  <text x="190" y="235" text-anchor="middle" font-size="10" fill="#b3e5fc">Guardrails · Observability</text>
  <text x="190" y="250" text-anchor="middle" font-size="10" fill="#b3e5fc">Budget · Compliance</text>

  <!-- Kong -->
  <rect x="350" y="190" width="200" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="450" y="215" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Kong AI Gateway</text>
  <text x="450" y="235" text-anchor="middle" font-size="10" fill="#b3e5fc">API Gateway + AI Plugin</text>
  <text x="450" y="250" text-anchor="middle" font-size="10" fill="#b3e5fc">Rate Limit · Auth · Log</text>

  <!-- Cloudflare -->
  <rect x="610" y="190" width="200" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="710" y="215" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Cloudflare AI Gateway</text>
  <text x="710" y="235" text-anchor="middle" font-size="10" fill="#b3e5fc">Edge Cache · Workers</text>
  <text x="710" y="250" text-anchor="middle" font-size="10" fill="#b3e5fc">全球分布式推理入口</text>

  <!-- Arrow down -->
  <line x1="450" y1="280" x2="450" y2="300" stroke="#999" stroke-width="2"/>
  <polygon points="445,298 455,298 450,306" fill="#999"/>

  <!-- Layer 2: Intelligent Routing -->
  <rect x="60" y="310" width="780" height="130" rx="10" fill="url(#g2)" filter="url(#shadow)" opacity="0.95"/>
  <text x="70" y="335" font-size="14" fill="#b2dfdb" font-weight="bold">Layer 2 · 智能路由层 Intelligent Routing Layer</text>

  <!-- Bifrost -->
  <rect x="90" y="350" width="170" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="175" y="375" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Bifrost</text>
  <text x="175" y="395" text-anchor="middle" font-size="10" fill="#b2dfdb">Go 高性能网关</text>
  <text x="175" y="410" text-anchor="middle" font-size="10" fill="#b2dfdb">μs 级延迟路由</text>

  <!-- LiteLLM -->
  <rect x="285" y="350" width="170" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="370" y="375" text-anchor="middle" font-size="14" fill="white" font-weight="bold">LiteLLM</text>
  <text x="370" y="395" text-anchor="middle" font-size="10" fill="#b2dfdb">Python Proxy Server</text>
  <text x="370" y="410" text-anchor="middle" font-size="10" fill="#b2dfdb">100+ LLM 统一接口</text>

  <!-- vLLM SR -->
  <rect x="480" y="350" width="190" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="575" y="375" text-anchor="middle" font-size="14" fill="white" font-weight="bold">vLLM Semantic Router</text>
  <text x="575" y="395" text-anchor="middle" font-size="10" fill="#b2dfdb">语义感知路由</text>
  <text x="575" y="410" text-anchor="middle" font-size="10" fill="#b2dfdb">推理引擎内置调度</text>

  <!-- Cost/Failover -->
  <rect x="695" y="350" width="120" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="755" y="375" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Cost</text>
  <text x="755" y="395" text-anchor="middle" font-size="10" fill="#b2dfdb">Optimization</text>
  <text x="755" y="410" text-anchor="middle" font-size="10" fill="#b2dfdb">Failover · Fallback</text>

  <!-- Arrow down -->
  <line x1="450" y1="440" x2="450" y2="460" stroke="#999" stroke-width="2"/>
  <polygon points="445,458 455,458 450,466" fill="#999"/>

  <!-- Layer 1: Unified Access -->
  <rect x="60" y="470" width="780" height="100" rx="10" fill="url(#g3)" filter="url(#shadow)" opacity="0.95"/>
  <text x="70" y="495" font-size="14" fill="#ffe0b2" font-weight="bold">Layer 1 · 统一接入层 Unified Access Layer</text>

  <!-- OpenRouter -->
  <rect x="200" y="505" width="500" height="50" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)"/>
  <text x="450" y="530" text-anchor="middle" font-size="16" fill="white" font-weight="bold">OpenRouter</text>
  <text x="450" y="548" text-anchor="middle" font-size="11" fill="#ffe0b2">300+ 模型一键接入 · API Proxy · Model Marketplace · 统一 Billing</text>

  <!-- Model icons at bottom -->
  <rect x="60" y="590" width="780" height="25" rx="5" fill="#37474f"/>
  <text x="150" y="607" text-anchor="middle" font-size="11" fill="#b0bec5">Claude</text>
  <text x="270" y="607" text-anchor="middle" font-size="11" fill="#b0bec5">GPT-4o</text>
  <text x="380" y="607" text-anchor="middle" font-size="11" fill="#b0bec5">Gemini Flash</text>
  <text x="510" y="607" text-anchor="middle" font-size="11" fill="#b0bec5">Llama 4</text>
  <text x="620" y="607" text-anchor="middle" font-size="11" fill="#b0bec5">DeepSeek</text>
  <text x="740" y="607" text-anchor="middle" font-size="11" fill="#b0bec5">自托管模型</text>
</svg>