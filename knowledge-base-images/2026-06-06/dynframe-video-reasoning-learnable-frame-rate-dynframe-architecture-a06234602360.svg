<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#162d4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="bold">DynFrame 架构总览：可学习帧率的视频推理框架</text>
  <text x="480" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">浙江大学 × 阿里巴巴 | arXiv:2605.26680</text>

  <!-- ====== Stage 1: Video Input ====== -->
  <rect x="30" y="80" width="160" height="200" rx="12" fill="url(#card)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="110" y="105" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="bold">原始视频输入</text>

  <!-- Video frames representation -->
  <rect x="50" y="120" width="40" height="28" rx="3" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="95" y="120" width="40" height="28" rx="3" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="140" y="120" width="40" height="28" rx="3" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="110" y="165" text-anchor="middle" fill="#94a3b8" font-size="10">密集原始帧流</text>

  <!-- Variable density sampling -->
  <rect x="50" y="185" width="30" height="22" rx="3" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="1"/>
  <rect x="95" y="185" width="20" height="22" rx="3" fill="#06b6d4" opacity="0.5" stroke="#06b6d4" stroke-width="1"/>
  <rect x="130" y="185" width="30" height="22" rx="3" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="1"/>
  <text x="110" y="225" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="bold">可变密度采样</text>
  <text x="110" y="240" text-anchor="middle" fill="#64748b" font-size="9">模型自主决定</text>
  <text x="110" y="252" text-anchor="middle" fill="#64748b" font-size="9">帧率与时间窗口</text>

  <!-- Arrow from video to retrieval -->
  <line x1="190" y1="180" x2="230" y2="180" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- ====== Stage 2: Span-Density Retrieval Interface ====== -->
  <rect x="230" y="80" width="220" height="200" rx="12" fill="url(#card)" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <text x="340" y="105" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">创新一：跨度-密度检索接口</text>
  <text x="340" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">Span-Density Retrieval Interface</text>

  <!-- Token types -->
  <rect x="250" y="140" width="80" height="30" rx="6" fill="#1e40af" opacity="0.4" stroke="#3b82f6" stroke-width="1"/>
  <text x="290" y="160" text-anchor="middle" fill="#93c5fd" font-size="11">&lt;span&gt; token</text>
  <text x="290" y="180" text-anchor="middle" fill="#64748b" font-size="9">编码时间窗口位置</text>

  <rect x="350" y="140" width="80" height="30" rx="6" fill="#1e40af" opacity="0.4" stroke="#3b82f6" stroke-width="1"/>
  <text x="390" y="160" text-anchor="middle" fill="#93c5fd" font-size="11">&lt;density&gt; token</text>
  <text x="390" y="180" text-anchor="middle" fill="#64748b" font-size="9">编码采样密度</text>

  <!-- Generated as native tokens -->
  <rect x="260" y="200" width="160" height="35" rx="6" fill="#06474d" stroke="#06b6d4" stroke-width="1"/>
  <text x="340" y="215" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="bold">原生生成 Token</text>
  <text x="340" y="228" text-anchor="middle" fill="#67e8f9" font-size="9">单次自回归推理中生成</text>

  <text x="340" y="260" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">核心突破：帧率不再是超参数</text>
  <text x="340" y="274" text-anchor="middle" fill="#94a3b8" font-size="9">而是模型的推理决策</text>

  <!-- Arrow from retrieval to LLM -->
  <line x1="450" y1="180" x2="490" y2="180" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- ====== Stage 3: LLM Backbone + Dynamic Injection ====== -->
  <rect x="490" y="80" width="220" height="200" rx="12" fill="url(#card)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="600" y="105" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">创新二：动态帧注入</text>
  <text x="600" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">Dynamic Frame Injection</text>

  <!-- LLM block -->
  <rect x="520" y="140" width="160" height="45" rx="8" fill="#4c1d95" opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="160" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">Qwen3-VL 骨干网络</text>
  <text x="600" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">4B / 8B 参数</text>

  <!-- Visual token injection arrows -->
  <text x="540" y="205" text-anchor="middle" fill="#a78bfa" font-size="9">↓ 视觉Token注入 ↓</text>
  <text x="660" y="205" text-anchor="middle" fill="#a78bfa" font-size="9">↓ 文本Token ↓</text>

  <rect x="520" y="215" width="160" height="30" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="600" y="235" text-anchor="middle" fill="#a5b4fc" font-size="10">自回归推理生成</text>

  <text x="600" y="265" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">边推理边检索视觉证据</text>

  <!-- Arrow from LLM to training -->
  <line x1="600" y1="280" x2="600" y2="310" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <!-- ====== Stage 4: SD-GRPO Training ====== -->
  <rect x="230" y="310" width="480" height="110" rx="12" fill="url(#card)" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="338" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">创新三：段解耦 GRPO（Segment-Decoupled GRPO）</text>

  <!-- Training components -->
  <rect x="255" y="355" width="130" height="50" rx="6" fill="#78350f" opacity="0.4" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="375" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">检索段优化</text>
  <text x="320" y="390" text-anchor="middle" fill="#94a3b8" font-size="9">学习最优帧率策略</text>

  <rect x="415" y="355" width="130" height="50" rx="6" fill="#78350f" opacity="0.4" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="375" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">推理段优化</text>
  <text x="480" y="390" text-anchor="middle" fill="#94a3b8" font-size="9">提升答案生成质量</text>

  <rect x="575" y="355" width="115" height="50" rx="6" fill="#78350f" opacity="0.4" stroke="#f59e0b" stroke-width="1"/>
  <text x="632" y="375" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">解耦奖励</text>
  <text x="632" y="390" text-anchor="middle" fill="#94a3b8" font-size="9">分别计算梯度信号</text>

  <!-- ====== Results Banner ====== -->
  <rect x="30" y="450" width="900" height="70" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="475" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">实验结果：DynFrame-4B (4B参数) 匹敌 7B-8B 级别基线 | DynFrame-8B 刷新多项 SOTA</text>
  <text x="480" y="498" text-anchor="middle" fill="#6ee7b7" font-size="11">六大基准测试覆盖：VideoMME · MVBench · EgoSchema · LongVideoBench · MLVU · Video-MMMU</text>
  <text x="480" y="513" text-anchor="middle" fill="#94a3b8" font-size="10">推理 token 开销降低约 30% · 单次前向传播完成自适应帧检索 · 无需外部检索模块</text>

  <!-- Subtle branding -->
  <text x="480" y="536" text-anchor="middle" fill="#334155" font-size="9">DynFrame: Learnable Frame Rate for Video Reasoning | 2026</text>
</svg>
