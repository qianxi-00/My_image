<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600"><rect width="1200" height="600" fill="#f8fafc"/><text x="55" y="60" font-family="sans-serif" font-size="34" font-weight="bold" fill="#183153">MoE 梯度噪声：稀疏采样让每个专家看到的世界不同</text><line x1="130" y1="460" x2="1080" y2="460" stroke="#334155" stroke-width="4"/><line x1="130" y1="120" x2="130" y2="460" stroke="#334155" stroke-width="4"/><text x="70" y="130" font-family="sans-serif" font-size="24" fill="#475569">梯度方差</text><text x="1010" y="510" font-family="sans-serif" font-size="24" fill="#475569">训练步数</text><polyline points="150,390 230,300 310,400 390,250 470,410 550,225 630,380 710,205 790,420 870,180 950,360 1040,160" fill="none" stroke="#dc2626" stroke-width="7"/><polyline points="150,370 230,350 310,360 390,325 470,350 550,310 630,330 710,295 790,320 870,280 950,300 1040,265" fill="none" stroke="#2563eb" stroke-width="7"/><rect x="175" y="150" width="265" height="75" rx="12" fill="#fee2e2"/><text x="205" y="196" font-family="sans-serif" font-size="25" fill="#991b1b">低负载专家：红线</text><rect x="670" y="115" width="280" height="75" rx="12" fill="#dbeafe"/><text x="700" y="161" font-family="sans-serif" font-size="25" fill="#1e40af">充分采样专家：蓝线</text><text x="150" y="555" font-family="sans-serif" font-size="21" fill="#64748b">图示：每个专家的有效 batch 更小、token 分布更偏；通信与容量截断还会让更新噪声进一步放大。</text></svg>