<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620"><rect width="1200" height="620" fill="#f7fbfa"/><text x="600" y="65" text-anchor="middle" font-size="34" fill="#164b43">从聊天入口到情境入口：可穿戴助手的服务节奏</text><g fill="#e0f2ee" stroke="#4b9485" stroke-width="3"><circle cx="165" cy="315" r="95"/><circle cx="410" cy="315" r="95"/><circle cx="655" cy="315" r="95"/><circle cx="900" cy="315" r="95"/></g><g font-size="24" fill="#164b43" text-anchor="middle"><text x="165" y="302">感知情境</text><text x="165" y="337">谁、何时、何地</text><text x="410" y="302">提出假设</text><text x="410" y="337">是否值得打扰</text><text x="655" y="302">征求确认</text><text x="655" y="337">低风险建议</text><text x="900" y="302">执行并记忆</text><text x="900" y="337">可撤销、可追溯</text></g><g stroke="#4b9485" stroke-width="7"><path d="M260 315H305"/><path d="M505 315H550"/><path d="M750 315H795"/></g><text x="600" y="520" text-anchor="middle" font-size="24" fill="#426b65">真正的交互升级，不是更频繁开口，而是在正确时刻给出可拒绝的帮助</text></svg>