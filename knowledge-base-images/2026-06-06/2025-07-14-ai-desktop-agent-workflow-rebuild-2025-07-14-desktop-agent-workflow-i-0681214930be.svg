<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <rect width="960" height="380" fill="#111827"/>
  <text x="480" y="40" text-anchor="middle" fill="#f9fafb" font-size="22" font-family="Noto Sans CJK SC, sans-serif">四大工作流重构方向</text>
  <g font-family="Noto Sans CJK SC, sans-serif">
    <rect x="40" y="80" width="200" height="230" rx="14" fill="#1f2937" stroke="#f59e0b"/>
    <text x="140" y="120" text-anchor="middle" fill="#fbbf24" font-size="18">研究检索</text>
    <text x="140" y="160" text-anchor="middle" fill="#e5e7eb" font-size="14">多站点浏览</text>
    <text x="140" y="185" text-anchor="middle" fill="#e5e7eb" font-size="14">证据摘录</text>
    <text x="140" y="210" text-anchor="middle" fill="#e5e7eb" font-size="14">交叉核验</text>
    <text x="140" y="250" text-anchor="middle" fill="#9ca3af" font-size="13">从人工切换标签</text>
    <text x="140" y="275" text-anchor="middle" fill="#9ca3af" font-size="13">到 Agent 并行采集</text>
    <rect x="270" y="80" width="200" height="230" rx="14" fill="#1f2937" stroke="#22d3ee"/>
    <text x="370" y="120" text-anchor="middle" fill="#67e8f9" font-size="18">代码开发</text>
    <text x="370" y="160" text-anchor="middle" fill="#e5e7eb" font-size="14">读文档/改代码</text>
    <text x="370" y="185" text-anchor="middle" fill="#e5e7eb" font-size="14">本地验证</text>
    <text x="370" y="210" text-anchor="middle" fill="#e5e7eb" font-size="14">提交与复盘</text>
    <text x="370" y="250" text-anchor="middle" fill="#9ca3af" font-size="13">从建议补丁</text>
    <text x="370" y="275" text-anchor="middle" fill="#9ca3af" font-size="13">到端到端改动</text>
    <rect x="500" y="80" width="200" height="230" rx="14" fill="#1f2937" stroke="#a3e635"/>
    <text x="600" y="120" text-anchor="middle" fill="#bef264" font-size="18">办公协作</text>
    <text x="600" y="160" text-anchor="middle" fill="#e5e7eb" font-size="14">邮件/表格/IM</text>
    <text x="600" y="185" text-anchor="middle" fill="#e5e7eb" font-size="14">跨应用流转</text>
    <text x="600" y="210" text-anchor="middle" fill="#e5e7eb" font-size="14">流程回写</text>
    <text x="600" y="250" text-anchor="middle" fill="#9ca3af" font-size="13">从单点助手</text>
    <text x="600" y="275" text-anchor="middle" fill="#9ca3af" font-size="13">到流程代理</text>
    <rect x="730" y="80" width="200" height="230" rx="14" fill="#1f2937" stroke="#f472b6"/>
    <text x="830" y="120" text-anchor="middle" fill="#f9a8d4" font-size="18">内容创作</text>
    <text x="830" y="160" text-anchor="middle" fill="#e5e7eb" font-size="14">素材收集</text>
    <text x="830" y="185" text-anchor="middle" fill="#e5e7eb" font-size="14">草稿编排</text>
    <text x="830" y="210" text-anchor="middle" fill="#e5e7eb" font-size="14">发布前校验</text>
    <text x="830" y="250" text-anchor="middle" fill="#9ca3af" font-size="13">从写段落</text>
    <text x="830" y="275" text-anchor="middle" fill="#9ca3af" font-size="13">到交付链路</text>
  </g>
  <text x="480" y="350" text-anchor="middle" fill="#6b7280" font-size="13" font-family="Noto Sans CJK SC, sans-serif">共性：GUI 成为统一 API，任务从“人在回路复制粘贴”转向“Agent 连续执行”</text>
</svg>
