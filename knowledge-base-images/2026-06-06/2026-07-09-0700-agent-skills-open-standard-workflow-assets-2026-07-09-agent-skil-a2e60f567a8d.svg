<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Progressive disclosure loop"><rect width="1280" height="720" fill="#fbfaf7"/><text x="640" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#222831">Progressive disclosure loop</text><g font-family="Arial, sans-serif" font-size="20"><circle cx="250" cy="230" r="90" fill="#fff" stroke="#5c6b73" stroke-width="3"/><text x="250" y="220" text-anchor="middle" font-weight="700" fill="#23313a">Level 1</text><text x="250" y="255" text-anchor="middle" fill="#50616c">metadata</text><circle cx="640" cy="230" r="95" fill="#eaf6ff" stroke="#0077b6" stroke-width="3"/><text x="640" y="220" text-anchor="middle" font-weight="700" fill="#123047">Level 2</text><text x="640" y="255" text-anchor="middle" fill="#1f4b66">SKILL.md</text><circle cx="1030" cy="230" r="95" fill="#edf8f5" stroke="#2a9d8f" stroke-width="3"/><text x="1030" y="220" text-anchor="middle" font-weight="700" fill="#12443d">Level 3+</text><text x="1030" y="255" text-anchor="middle" fill="#3d645f">scripts/resources</text><path d="M350 230 H530" stroke="#7b8a93" stroke-width="5" marker-end="url(#arrow)"/><path d="M745 230 H920" stroke="#0077b6" stroke-width="5" marker-end="url(#arrow2)"/><rect x="220" y="450" width="840" height="120" rx="8" fill="#ffffff" stroke="#c1cad1" stroke-width="2"/><text x="640" y="500" text-anchor="middle" font-size="24" font-weight="700" fill="#222831">Only load what the task needs</text><text x="640" y="540" text-anchor="middle" fill="#56636d">Lower context cost, more deterministic execution, easier audit</text></g><defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#7b8a93"/></marker><marker id="arrow2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0077b6"/></marker></defs></svg>