<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">MCP 2026 路线图：四大优先方向</text>

  <!-- MCP Core Circle -->
  <circle cx="400" cy="200" r="60" fill="url(#g1)" opacity="0.9"/>
  <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="white">MCP</text>
  <text x="400" y="215" text-anchor="middle" font-size="11" fill="white">核心协议</text>

  <!-- Direction 1: Transport -->
  <rect x="30" y="80" width="200" height="120" rx="12" fill="url(#g1)" opacity="0.85"/>
  <text x="130" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">方向一：传输层演进</text>
  <text x="130" y="135" text-anchor="middle" font-size="11" fill="white">无状态化 · 可扩展</text>
  <text x="130" y="155" text-anchor="middle" font-size="11" fill="white">负载均衡兼容</text>
  <text x="130" y="175" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">预计 2026.06</text>
  <!-- Connection line -->
  <line x1="230" y1="140" x2="340" y2="200" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Direction 2: Server Cards -->
  <rect x="570" y="80" width="200" height="120" rx="12" fill="url(#g2)" opacity="0.85"/>
  <text x="670" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">方向二：服务器发现</text>
  <text x="670" y="135" text-anchor="middle" font-size="11" fill="white">Server Cards</text>
  <text x="670" y="155" text-anchor="middle" font-size="11" fill="white">.well-known 元数据</text>
  <text x="670" y="175" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">自动发现 · 注册表</text>
  <!-- Connection line -->
  <line x1="460" y1="200" x2="570" y2="140" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Direction 3: Tasks -->
  <rect x="30" y="310" width="200" height="120" rx="12" fill="url(#g3)" opacity="0.85"/>
  <text x="130" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="white">方向三：Tasks 原语</text>
  <text x="130" y="365" text-anchor="middle" font-size="11" fill="white">长运行任务管理</text>
  <text x="130" y="385" text-anchor="middle" font-size="11" fill="white">重试 · 生命周期</text>
  <text x="130" y="405" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Agent-to-Agent 协作</text>
  <!-- Connection line -->
  <line x1="230" y1="370" x2="340" y2="260" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Direction 4: Enterprise -->
  <rect x="570" y="310" width="200" height="120" rx="12" fill="url(#g4)" opacity="0.85"/>
  <text x="670" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="white">方向四：企业就绪</text>
  <text x="670" y="365" text-anchor="middle" font-size="11" fill="white">SSO · 审计追踪</text>
  <text x="670" y="385" text-anchor="middle" font-size="11" fill="white">网关 · 配置可移植</text>
  <text x="670" y="405" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">扩展而非核心变更</text>
  <!-- Connection line -->
  <line x1="460" y1="260" x2="570" y2="370" stroke="#43e97b" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Bottom annotation -->
  <rect x="200" y="460" width="400" height="30" rx="6" fill="#f0f0f5"/>
  <text x="400" y="480" text-anchor="middle" font-size="11" fill="#555">从"证明协议有必要存在" → "让协议在生产环境可靠运行"</text>
</svg>
