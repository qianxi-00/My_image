<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">语音AI三条架构路线对比</text>

  <!-- Cascade Pipeline -->
  <rect x="30" y="70" width="280" height="380" rx="12" fill="#e8f4fd" stroke="#2196F3" stroke-width="2"/>
  <text x="170" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#1565C0">级联管线 Cascade</text>
  <rect x="70" y="120" width="200" height="36" rx="6" fill="#bbdefb" stroke="#2196F3"/>
  <text x="170" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0d47a1">🎤 语音输入</text>
  <text x="170" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#2196F3">⬇</text>
  <rect x="70" y="185" width="200" height="36" rx="6" fill="#bbdefb" stroke="#2196F3"/>
  <text x="170" y="209" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0d47a1">📝 ASR 语音识别</text>
  <text x="170" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#2196F3">⬇</text>
  <rect x="70" y="250" width="200" height="36" rx="6" fill="#bbdefb" stroke="#2196F3"/>
  <text x="170" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0d47a1">🧠 LLM 文本推理</text>
  <text x="170" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#2196F3">⬇</text>
  <rect x="70" y="315" width="200" height="36" rx="6" fill="#bbdefb" stroke="#2196F3"/>
  <text x="170" y="339" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0d47a1">🔊 TTS 语音合成</text>
  <text x="170" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#2196F3">⬇</text>
  <rect x="70" y="380" width="200" height="36" rx="6" fill="#bbdefb" stroke="#2196F3"/>
  <text x="170" y="404" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#0d47a1">🔈 语音输出</text>
  <text x="170" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">✅ 高任务遵从度 · 高延迟 · 三模块</text>

  <!-- Half-Cascade -->
  <rect x="340" y="70" width="280" height="380" rx="12" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2"/>
  <text x="480" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#2e7d32">半级联 S2S</text>
  <rect x="380" y="120" width="200" height="36" rx="6" fill="#c8e6c9" stroke="#4CAF50"/>
  <text x="480" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1b5e20">🎤 语音输入</text>
  <text x="480" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#4CAF50">⬇</text>
  <rect x="380" y="185" width="200" height="36" rx="6" fill="#c8e6c9" stroke="#4CAF50"/>
  <text x="480" y="209" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1b5e20">🔄 语音编码器</text>
  <text x="480" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#4CAF50">⬇</text>
  <rect x="380" y="250" width="200" height="48" rx="6" fill="#c8e6c9" stroke="#4CAF50"/>
  <text x="480" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1b5e20">🧠 LLM 直接处理</text>
  <text x="480" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1b5e20">音频 token + 文本</text>
  <text x="480" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#4CAF50">⬇</text>
  <rect x="380" y="325" width="200" height="36" rx="6" fill="#c8e6c9" stroke="#4CAF50"/>
  <text x="480" y="349" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1b5e20">🔊 语音合成</text>
  <text x="480" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#4CAF50">⬇</text>
  <rect x="380" y="390" width="200" height="36" rx="6" fill="#c8e6c9" stroke="#4CAF50"/>
  <text x="480" y="414" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1b5e20">🔈 语音输出</text>
  <text x="480" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">⚖️ 平衡延迟与控制 · 双模块</text>

  <!-- Native Audio E2E -->
  <rect x="650" y="70" width="280" height="380" rx="12" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="790" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e65100">原生音频 E2E</text>
  <rect x="690" y="120" width="200" height="36" rx="6" fill="#ffe0b2" stroke="#FF9800"/>
  <text x="790" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bf360c">🎤 语音输入</text>
  <text x="790" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#FF9800">⬇</text>
  <rect x="690" y="185" width="200" height="80" rx="6" fill="#ffe0b2" stroke="#FF9800"/>
  <text x="790" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bf360c">🧠 原生音频模型</text>
  <text x="790" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#bf360c">同时听和说</text>
  <text x="790" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#bf360c">全双工交互</text>
  <text x="790" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#FF9800">⬇</text>
  <rect x="690" y="295" width="200" height="36" rx="6" fill="#ffe0b2" stroke="#FF9800"/>
  <text x="790" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bf360c">🔈 语音输出</text>
  <text x="790" y="360" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">⚡ 最低延迟 · 控制力弱</text>
  <text x="790" y="378" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">单模块端到端</text>

  <!-- Bottom legend -->
  <text x="480" y="500" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#777">2026年语音AI架构选型：延迟见顶后，任务遵从度成为决定性战场</text>
  <text x="480" y="525" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#999">数据来源：Moshi (2024) · PersonaPlex (2026) · Qwen2.5-Omni (2025) · Nova 2 Sonic (2026) · Step-Audio R1.1 (2026)</text>
</svg>
