<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">World Model 核心架构：在脑子里试错</text>

  <!-- Agent Box -->
  <rect x="330" y="70" width="240" height="80" rx="12" fill="#3b82f6" opacity="0.9"/>
  <text x="450" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="white">智能体 Agent</text>
  <text x="450" y="130" text-anchor="middle" font-size="12" fill="#dbeafe">策略 π(a|s) + 价值函数 V(s)</text>

  <!-- Real Environment Box -->
  <rect x="60" y="250" width="220" height="80" rx="12" fill="#10b981" opacity="0.9"/>
  <text x="170" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="white">真实环境 Environment</text>
  <text x="170" y="310" text-anchor="middle" font-size="12" fill="#d1fae5">提供真实 s, r, done</text>

  <!-- World Model Box -->
  <rect x="620" y="250" width="220" height="80" rx="12" fill="#8b5cf6" opacity="0.9"/>
  <text x="730" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="white">世界模型 World Model</text>
  <text x="730" y="310" text-anchor="middle" font-size="12" fill="#ede9fe">学习到的环境模型 p̂(s'|s,a)</text>

  <!-- Imagined Rollouts Box -->
  <rect x="330" y="380" width="240" height="80" rx="12" fill="#f59e0b" opacity="0.9"/>
  <text x="450" y="415" text-anchor="middle" font-size="18" font-weight="bold" fill="white">想象推演 Imagined Rollouts</text>
  <text x="450" y="440" text-anchor="middle" font-size="12" fill="#fef3c7">在模型中模拟 s→a→r→s' 循环</text>

  <!-- Arrow: Agent → Real Env (collect data) -->
  <path d="M 350 150 Q 200 200 180 250" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="210" y="195" font-size="11" fill="#555">交互采集数据</text>

  <!-- Arrow: Real Env → Agent (reward/obs) -->
  <path d="M 260 250 Q 330 200 380 150" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="280" y="195" font-size="11" fill="#555">观测与奖励</text>

  <!-- Arrow: Real Env → World Model (train) -->
  <path d="M 280 290 L 620 290" stroke="#8b5cf6" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-blue)" stroke-dasharray="8,4"/>
  <text x="450" y="278" text-anchor="middle" font-size="11" fill="#8b5cf6">训练世界模型 (监督学习)</text>

  <!-- Arrow: World Model → Imagined Rollouts -->
  <path d="M 680 330 Q 580 370 570 380" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="610" y="365" font-size="11" fill="#b45309">生成模拟轨迹</text>

  <!-- Arrow: Imagined Rollouts → Agent (improve policy) -->
  <path d="M 400 380 Q 380 300 370 150" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-blue)"/>
  <text x="340" y="280" font-size="11" fill="#3b82f6">更新策略 (无需真实交互)</text>

  <!-- Key insight box -->
  <rect x="60" y="400" width="250" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="185" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">核心价值</text>
  <text x="185" y="448" text-anchor="middle" font-size="11" fill="#78350f">用学到的模型替代真实交互，</text>
  <text x="185" y="463" text-anchor="middle" font-size="11" fill="#78350f">大幅降低样本需求</text>
</svg>