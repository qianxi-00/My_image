<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gModule" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="gFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="960" height="580" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">OpenAI Codex 桌面 Agent 工作流架构</text>
  <!-- Core Engine -->
  <rect x="370" y="200" width="220" height="80" rx="16" fill="url(#gCore)" filter="url(#shadow)"/>
  <text x="480" y="235" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Codex Agent</text>
  <text x="480" y="260" text-anchor="middle" fill="#d1fae5" font-size="12">核心调度引擎</text>
  <!-- Module 1: Desktop Control -->
  <rect x="80" y="70" width="170" height="70" rx="12" fill="url(#gModule)" filter="url(#shadow)"/>
  <text x="165" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">🖥️ 桌面操控</text>
  <text x="165" y="120" text-anchor="middle" fill="#c7d2fe" font-size="11">屏幕识别 · 应用操控</text>
  <!-- Module 2: Plugins -->
  <rect x="290" y="70" width="170" height="70" rx="12" fill="url(#gModule)" filter="url(#shadow)"/>
  <text x="375" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">🔌 插件生态</text>
  <text x="375" y="120" text-anchor="middle" fill="#c7d2fe" font-size="11">90+ 工具集成</text>
  <!-- Module 3: Memory -->
  <rect x="500" y="70" width="170" height="70" rx="12" fill="url(#gModule)" filter="url(#shadow)"/>
  <text x="585" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">🧠 记忆系统</text>
  <text x="585" y="120" text-anchor="middle" fill="#c7d2fe" font-size="11">跨会话 · 持久偏好</text>
  <!-- Module 4: Scheduling -->
  <rect x="710" y="70" width="170" height="70" rx="12" fill="url(#gModule)" filter="url(#shadow)"/>
  <text x="795" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">📅 跨天调度</text>
  <text x="795" y="120" text-anchor="middle" fill="#c7d2fe" font-size="11">自主安排 · 持续工作</text>
  <!-- Module 5: Browser + Image -->
  <rect x="170" y="340" width="180" height="70" rx="12" fill="url(#gModule)" filter="url(#shadow)"/>
  <text x="260" y="370" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">🌐 原生浏览器</text>
  <text x="260" y="390" text-anchor="middle" fill="#c7d2fe" font-size="11">网页浏览 · 信息抓取</text>
  <!-- Module 6: Image Gen -->
  <rect x="610" y="340" width="180" height="70" rx="12" fill="url(#gModule)" filter="url(#shadow)"/>
  <text x="700" y="370" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">🎨 图像生成</text>
  <text x="700" y="390" text-anchor="middle" fill="#c7d2fe" font-size="11">DALL·E · 视觉输出</text>
  <!-- Connection lines -->
  <line x1="165" y1="140" x2="420" y2="200" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <line x1="375" y1="140" x2="440" y2="200" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <line x1="585" y1="140" x2="520" y2="200" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <line x1="795" y1="140" x2="540" y2="200" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <line x1="260" y1="340" x2="410" y2="280" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <line x1="700" y1="340" x2="550" y2="280" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <!-- Developer Workflow Bar -->
  <rect x="120" y="470" width="720" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="480" y="460" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">开发者工作流覆盖</text>
  <!-- Flow steps -->
  <rect x="140" y="482" width="110" height="36" rx="8" fill="#1e3a5f"/>
  <text x="195" y="505" text-anchor="middle" fill="#38bdf8" font-size="12">代码编写</text>
  <text x="265" y="505" text-anchor="middle" fill="#f59e0b" font-size="16">→</text>
  <rect x="285" y="482" width="110" height="36" rx="8" fill="#1e3a5f"/>
  <text x="340" y="505" text-anchor="middle" fill="#38bdf8" font-size="12">测试执行</text>
  <text x="410" y="505" text-anchor="middle" fill="#f59e0b" font-size="16">→</text>
  <rect x="430" y="482" width="110" height="36" rx="8" fill="#1e3a5f"/>
  <text x="485" y="505" text-anchor="middle" fill="#38bdf8" font-size="12">部署上线</text>
  <text x="555" y="505" text-anchor="middle" fill="#f59e0b" font-size="16">→</text>
  <rect x="575" y="482" width="110" height="36" rx="8" fill="#1e3a5f"/>
  <text x="630" y="505" text-anchor="middle" fill="#38bdf8" font-size="12">监控运维</text>
  <text x="700" y="505" text-anchor="middle" fill="#f59e0b" font-size="16">→</text>
  <rect x="720" y="482" width="110" height="36" rx="8" fill="#1e3a5f"/>
  <text x="775" y="505" text-anchor="middle" fill="#38bdf8" font-size="12">持续迭代</text>
  <!-- Bottom label -->
  <text x="480" y="555" text-anchor="middle" fill="#64748b" font-size="11">数据来源：OpenAI 官方博客 · 2026 年 5 月</text>
</svg>
