<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bgLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bgRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="480" fill="#0d1117" rx="12"/>
  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">AI 编程 Agent 代码探索模式对比</text>
  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="460" stroke="#30363d" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- LEFT: Before -->
  <rect x="20" y="55" width="410" height="395" fill="url(#bgLeft)" rx="10" opacity="0.5"/>
  <text x="225" y="82" text-anchor="middle" fill="#f85149" font-size="16" font-weight="bold">❌ 盲扫模式（Before）</text>
  <!-- Agent icon -->
  <rect x="155" y="100" width="140" height="40" rx="8" fill="#21262d" stroke="#f85149"/>
  <text x="225" y="126" text-anchor="middle" fill="#e6edf3" font-size="13">🤖 AI Agent</text>
  <!-- Commands -->
  <rect x="60" y="165" width="100" height="32" rx="6" fill="#1c2128" stroke="#484f58"/>
  <text x="110" y="186" text-anchor="middle" fill="#8b949e" font-size="11">find . -type f</text>
  <rect x="175" y="165" width="100" height="32" rx="6" fill="#1c2128" stroke="#484f58"/>
  <text x="225" y="186" text-anchor="middle" fill="#8b949e" font-size="11">grep "keyword"</text>
  <rect x="290" y="165" width="100" height="32" rx="6" fill="#1c2128" stroke="#484f58"/>
  <text x="340" y="186" text-anchor="middle" fill="#8b949e" font-size="11">Read file</text>
  <!-- Arrows down -->
  <line x1="110" y1="197" x2="110" y2="230" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="225" y1="197" x2="225" y2="230" stroke="#484f58" stroke-width="1.5"/>
  <line x1="340" y1="197" x2="340" y2="230" stroke="#484f58" stroke-width="1.5"/>
  <!-- Files scattered -->
  <rect x="60" y="235" width="80" height="25" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="100" y="252" text-anchor="middle" fill="#6e7681" font-size="10">auth.py</text>
  <rect x="155" y="235" width="80" height="25" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="195" y="252" text-anchor="middle" fill="#6e7681" font-size="10">payment.py</text>
  <rect x="250" y="235" width="80" height="25" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="290" y="252" text-anchor="middle" fill="#6e7681" font-size="10">models.py</text>
  <rect x="60" y="270" width="80" height="25" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="100" y="287" text-anchor="middle" fill="#6e7681" font-size="10">utils.py</text>
  <rect x="155" y="270" width="80" height="25" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="195" y="287" text-anchor="middle" fill="#6e7681" font-size="10">routes.py</text>
  <rect x="250" y="270" width="80" height="25" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="290" y="287" text-anchor="middle" fill="#6e7681" font-size="10">config.py</text>
  <!-- Cost stats -->
  <text x="225" y="330" text-anchor="middle" fill="#f85149" font-size="13" font-weight="bold">资源消耗</text>
  <text x="225" y="355" text-anchor="middle" fill="#e6edf3" font-size="12">Token: ~12,000-50,000</text>
  <text x="225" y="375" text-anchor="middle" fill="#e6edf3" font-size="12">工具调用: 15-30次</text>
  <text x="225" y="395" text-anchor="middle" fill="#e6edf3" font-size="12">耗时: 2-5分钟</text>
  <text x="225" y="420" text-anchor="middle" fill="#f85149" font-size="14" font-weight="bold">成本: $$$</text>
  <!-- RIGHT: After -->
  <rect x="470" y="55" width="410" height="395" fill="url(#bgRight)" rx="10" opacity="0.5"/>
  <text x="675" y="82" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="bold">✅ 预索引模式（After）</text>
  <!-- CodeGraph -->
  <rect x="605" y="100" width="140" height="40" rx="8" fill="#21262d" stroke="#3fb950"/>
  <text x="675" y="126" text-anchor="middle" fill="#e6edf3" font-size="13">📊 CodeGraph</text>
  <!-- Knowledge Graph -->
  <rect x="550" y="160" width="250" height="60" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="675" y="185" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">代码知识图谱</text>
  <text x="675" y="205" text-anchor="middle" fill="#8b949e" font-size="10">符号 · 依赖 · 调用关系 · 结构</text>
  <!-- Arrow to Agent -->
  <line x1="675" y1="220" x2="675" y2="250" stroke="#3fb950" stroke-width="2"/>
  <!-- Direct answer -->
  <rect x="570" y="250" width="210" height="35" rx="6" fill="#0d2818" stroke="#3fb950"/>
  <text x="675" y="273" text-anchor="middle" fill="#3fb950" font-size="12">🎯 直接定位目标代码</text>
  <!-- Cost stats -->
  <text x="675" y="320" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">资源消耗</text>
  <text x="675" y="345" text-anchor="middle" fill="#e6edf3" font-size="12">Token: 减少 59%</text>
  <text x="675" y="365" text-anchor="middle" fill="#e6edf3" font-size="12">工具调用: 减少 70%</text>
  <text x="675" y="385" text-anchor="middle" fill="#e6edf3" font-size="12">耗时: 减少 35-52%</text>
  <text x="675" y="410" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">成本: $</text>
</svg>