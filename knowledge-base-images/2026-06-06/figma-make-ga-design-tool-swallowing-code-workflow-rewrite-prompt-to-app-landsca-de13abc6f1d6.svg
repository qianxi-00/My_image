<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>

  <rect width="900" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a2e">Prompt-to-App 竞品格局：不同切入点，同一终点</text>

  <!-- Central target -->
  <circle cx="450" cy="250" r="65" fill="none" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="450" cy="250" r="45" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="450" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">产品开发</text>
  <text x="450" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">统一入口</text>

  <!-- Figma Make - Top -->
  <rect x="370" y="55" width="160" height="70" rx="10" fill="#ffffff" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#7b1fa2">Figma Make</text>
  <text x="450" y="95" text-anchor="middle" font-size="9" fill="#9c27b0">设计文件 → 可运行产品</text>
  <text x="450" y="110" text-anchor="middle" font-size="8" fill="#ba68c8">从设计端切入</text>
  <line x1="450" y1="125" x2="450" y2="185" stroke="#ce93d8" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- v0 - Right top -->
  <rect x="690" y="100" width="160" height="70" rx="10" fill="#ffffff" stroke="#2196f3" stroke-width="2" filter="url(#shadow)"/>
  <text x="770" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Vercel v0</text>
  <text x="770" y="140" text-anchor="middle" font-size="9" fill="#2196f3">Prompt → 全栈应用</text>
  <text x="770" y="155" text-anchor="middle" font-size="8" fill="#64b5f6">从代码端切入</text>
  <line x1="720" y1="155" x2="510" y2="230" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Bolt.new - Right bottom -->
  <rect x="710" y="280" width="160" height="70" rx="10" fill="#ffffff" stroke="#ff9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">Bolt.new</text>
  <text x="790" y="320" text-anchor="middle" font-size="9" fill="#ff9800">Prompt → 全栈 + 托管</text>
  <text x="790" y="335" text-anchor="middle" font-size="8" fill="#ffb74d">从构建端切入</text>
  <line x1="720" y1="310" x2="510" y2="265" stroke="#ffcc80" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Lovable - Left bottom -->
  <rect x="30" y="280" width="160" height="70" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">Lovable</text>
  <text x="110" y="320" text-anchor="middle" font-size="9" fill="#4caf50">Prompt → Web 应用</text>
  <text x="110" y="335" text-anchor="middle" font-size="8" fill="#81c784">从非技术用户切入</text>
  <line x1="190" y1="310" x2="390" y2="265" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Replit Agent - Left top -->
  <rect x="50" y="100" width="160" height="70" rx="10" fill="#ffffff" stroke="#f44336" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">Replit Agent</text>
  <text x="130" y="140" text-anchor="middle" font-size="9" fill="#f44336">Prompt → 完整应用</text>
  <text x="130" y="155" text-anchor="middle" font-size="8" fill="#ef9a9a">从开发环境切入</text>
  <line x1="210" y1="155" x2="390" y2="230" stroke="#ef9a9a" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Convergence arrow -->
  <text x="450" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#616161">⬆ 各工具正在向"产品开发统一入口"收敛</text>

  <!-- Legend -->
  <rect x="150" y="420" width="600" height="45" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="438" text-anchor="middle" font-size="10" font-weight="600" fill="#424242">核心竞争维度</text>
  <text x="200" y="455" text-anchor="middle" font-size="9" fill="#7b1fa2">● 设计保真度</text>
  <text x="330" y="455" text-anchor="middle" font-size="9" fill="#1565c0">● 开发者生态</text>
  <text x="460" y="455" text-anchor="middle" font-size="9" fill="#e65100">● 全栈能力</text>
  <text x="580" y="455" text-anchor="middle" font-size="9" fill="#2e7d32">● 低门槛</text>
  <text x="700" y="455" text-anchor="middle" font-size="9" fill="#c62828">● 完整环境</text>
</svg>
