<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="newGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="bold">AI 产业商业模式转型：从订阅制到按量计费</text>
  <text x="400" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">2026 年编码 Agent 定价模式集体切换全景</text>

  <!-- Old Model Box -->
  <rect x="40" y="90" width="340" height="280" rx="10" fill="url(#oldGrad)" opacity="0.15" stroke="#64748b" stroke-width="1.5"/>
  <text x="210" y="118" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold">旧模式：订阅制（2024-2025）</text>

  <!-- Old model icons -->
  <rect x="70" y="140" width="280" height="45" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="85" y="158" fill="#cbd5e1" font-size="11" font-weight="bold">🏢 企业版</text>
  <text x="85" y="175" fill="#94a3b8" font-size="10">固定座席费 $20-60/月·人</text>
  <text x="335" y="168" text-anchor="end" fill="#64748b" font-size="10">成本可预测</text>

  <rect x="70" y="195" width="280" height="45" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="85" y="213" fill="#cbd5e1" font-size="11" font-weight="bold">💬 消息计费</text>
  <text x="85" y="230" fill="#94a3b8" font-size="10">按消息条数收费（OpenAI Codex）</text>
  <text x="335" y="223" text-anchor="end" fill="#64748b" font-size="10">用量封顶</text>

  <rect x="70" y="250" width="280" height="45" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="85" y="268" fill="#cbd5e1" font-size="11" font-weight="bold">📦 包含用量</text>
  <text x="85" y="285" fill="#94a3b8" font-size="10">"典型工作日"用量含在座席费内</text>
  <text x="335" y="278" text-anchor="end" fill="#64748b" font-size="10">供应商担风险</text>

  <!-- Pain point -->
  <rect x="70" y="310" width="280" height="40" rx="8" fill="#7f1d1d" opacity="0.4" stroke="#ef4444" stroke-width="1"/>
  <text x="210" y="330" text-anchor="middle" fill="#fca5a5" font-size="11">⚠️ 编码 Agent token 消耗量激增，旧模式不可持续</text>

  <!-- Arrow -->
  <line x1="400" y1="200" x2="440" y2="200" stroke="url(#accentGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="420" y="190" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold">转型</text>

  <!-- New Model Box -->
  <rect x="420" y="90" width="340" height="280" rx="10" fill="url(#newGrad)" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="590" y="118" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="bold">新模式：按量计费（2025.11-2026）</text>

  <rect x="450" y="140" width="280" height="45" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="465" y="158" fill="#bfdbfe" font-size="11" font-weight="bold">🔗 座席费 + API 按量</text>
  <text x="465" y="175" fill="#93c5fd" font-size="10">Anthropic: $20/月基础费 + token 用量</text>
  <text x="715" y="168" text-anchor="end" fill="#60a5fa" font-size="10">收入弹性增长</text>

  <rect x="450" y="195" width="280" height="45" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="465" y="213" fill="#bfdbfe" font-size="11" font-weight="bold">💳 Credit 制度</text>
  <text x="465" y="230" fill="#93c5fd" font-size="10">OpenAI: credit ≡ API token 价格</text>
  <text x="715" y="223" text-anchor="end" fill="#60a5fa" font-size="10">成本对齐用量</text>

  <rect x="450" y="250" width="280" height="45" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="465" y="268" fill="#bfdbfe" font-size="11" font-weight="bold">📊 企业销售扩张</text>
  <text x="465" y="285" fill="#93c5fd" font-size="10">OpenAI 32.6% / Anthropic 26.9% 销售岗</text>
  <text x="715" y="278" text-anchor="end" fill="#60a5fa" font-size="10">押注企业端</text>

  <!-- Benefit -->
  <rect x="450" y="310" width="280" height="40" rx="8" fill="#064e3b" opacity="0.4" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="330" text-anchor="middle" fill="#6ee7b7" font-size="11">✅ Anthropic Q2 营收 $109 亿，首季盈利</text>

  <!-- Bottom stats -->
  <rect x="40" y="390" width="220" height="45" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="150" y="410" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">$1,200/月</text>
  <text x="150" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">开发者 Claude Code 月均消耗</text>

  <rect x="290" y="390" width="220" height="45" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="410" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">9 亿+</text>
  <text x="400" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">OpenAI 周活跃用户数</text>

  <rect x="540" y="390" width="220" height="45" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="650" y="410" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">PMF ✓</text>
  <text x="650" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">编码 Agent = AI 产业产品契合点</text>
</svg>
