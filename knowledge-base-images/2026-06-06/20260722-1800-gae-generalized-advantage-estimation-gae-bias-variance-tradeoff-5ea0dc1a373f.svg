<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="28" font-weight="700" fill="#0f172a">GAE 中的偏差–方差权衡</text>
  <text x="600" y="82" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="16" fill="#475569">λ 从 0 到 1：用同一公式连续插值 TD 与 Monte Carlo</text>
  <line x1="140" y1="480" x2="1060" y2="480" stroke="#334155" stroke-width="3"/>
  <line x1="140" y1="480" x2="140" y2="140" stroke="#334155" stroke-width="3"/>
  <text x="600" y="530" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="16" fill="#0f172a">λ（广义优势估计的平滑系数）</text>
  <text x="70" y="320" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="16" fill="#0f172a" transform="rotate(-90 70 320)">估计误差特征</text>
  <path d="M180 220 C 320 200, 480 280, 640 340 S 900 420, 1020 450" fill="none" stroke="#dc2626" stroke-width="4"/>
  <path d="M180 430 C 320 400, 480 320, 640 260 S 900 180, 1020 160" fill="none" stroke="#2563eb" stroke-width="4"/>
  <circle cx="180" cy="220" r="8" fill="#dc2626"/>
  <circle cx="1020" cy="450" r="8" fill="#dc2626"/>
  <circle cx="180" cy="430" r="8" fill="#2563eb"/>
  <circle cx="1020" cy="160" r="8" fill="#2563eb"/>
  <text x="200" y="200" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="15" fill="#dc2626">偏差较高（依赖 V 近似）</text>
  <text x="820" y="470" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="15" fill="#dc2626">偏差更低（更接近真实回报）</text>
  <text x="200" y="460" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="15" fill="#2563eb">方差较低（短视差分）</text>
  <text x="820" y="145" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="15" fill="#2563eb">方差升高（长程累计噪声）</text>
  <rect x="430" y="300" width="220" height="90" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="540" y="340" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="18" font-weight="700" fill="#a16207">实用区：λ≈0.9–0.99</text>
  <text x="540" y="370" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="14" fill="#854d0e">PPO / Actor-Critic 常见默认</text>
  <text x="180" y="560" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="14" fill="#64748b">λ=0 · TD(0)</text>
  <text x="600" y="560" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="14" fill="#64748b">中间 λ · GAE 折中</text>
  <text x="1020" y="560" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="14" fill="#64748b">λ=1 · Monte Carlo</text>
  <rect x="900" y="200" width="18" height="18" fill="#dc2626"/>
  <text x="930" y="214" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="14" fill="#334155">偏差曲线</text>
  <rect x="900" y="230" width="18" height="18" fill="#2563eb"/>
  <text x="930" y="244" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="14" fill="#334155">方差曲线</text>
</svg>
