<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#e2e8f0" font-size="28" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">端侧 MoE：理论省算力 vs 实际成本账本</text>
  <text x="600" y="82" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Noto Sans CJK SC, sans-serif">稀疏激活只降低「被算的 FLOPs」，不自动降低存储、带宽、内核与调度成本</text>

  <rect x="60" y="130" width="500" height="520" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  <text x="310" y="170" text-anchor="middle" fill="#7dd3fc" font-size="20" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">理论账：稀疏激活承诺</text>
  <rect x="90" y="200" width="440" height="70" rx="10" fill="#164e63"/>
  <text x="310" y="230" text-anchor="middle" fill="#ecfeff" font-size="16" font-family="Noto Sans CJK SC, sans-serif">总参数大 → 能力容量高</text>
  <text x="310" y="255" text-anchor="middle" fill="#a5f3fc" font-size="14" font-family="Noto Sans CJK SC, sans-serif">例如 8×7B 专家，只激活 2</text>
  <rect x="90" y="290" width="440" height="70" rx="10" fill="#1e3a5f"/>
  <text x="310" y="320" text-anchor="middle" fill="#e0f2fe" font-size="16" font-family="Noto Sans CJK SC, sans-serif">每 token FLOPs ≈ 稠密子网</text>
  <text x="310" y="345" text-anchor="middle" fill="#93c5fd" font-size="14" font-family="Noto Sans CJK SC, sans-serif">激活专家数 × 专家宽度决定算力</text>
  <rect x="90" y="380" width="440" height="70" rx="10" fill="#312e81"/>
  <text x="310" y="410" text-anchor="middle" fill="#e0e7ff" font-size="16" font-family="Noto Sans CJK SC, sans-serif">路由实现条件计算</text>
  <text x="310" y="435" text-anchor="middle" fill="#c7d2fe" font-size="14" font-family="Noto Sans CJK SC, sans-serif">Token 只走相关专家路径</text>
  <rect x="90" y="470" width="440" height="70" rx="10" fill="#14532d"/>
  <text x="310" y="500" text-anchor="middle" fill="#dcfce7" font-size="16" font-family="Noto Sans CJK SC, sans-serif">结论看起来很诱人</text>
  <text x="310" y="525" text-anchor="middle" fill="#86efac" font-size="14" font-family="Noto Sans CJK SC, sans-serif">「大模型能力，小模型算力」</text>
  <text x="310" y="610" text-anchor="middle" fill="#fbbf24" font-size="15" font-family="Noto Sans CJK SC, sans-serif">↑ 仅在「参数已在片上且路由极便宜」时成立</text>

  <rect x="640" y="130" width="500" height="520" rx="16" fill="#0f172a" stroke="#f97316" stroke-width="2"/>
  <text x="890" y="170" text-anchor="middle" fill="#fdba74" font-size="20" font-family="Noto Sans CJK SC, sans-serif" font-weight="700">端侧现实：成本重新抬头</text>
  <rect x="670" y="200" width="440" height="60" rx="10" fill="#7c2d12"/>
  <text x="890" y="235" text-anchor="middle" fill="#ffedd5" font-size="15" font-family="Noto Sans CJK SC, sans-serif">1) 全量专家权重仍需存储 / 加载</text>
  <rect x="670" y="275" width="440" height="60" rx="10" fill="#9a3412"/>
  <text x="890" y="310" text-anchor="middle" fill="#ffedd5" font-size="15" font-family="Noto Sans CJK SC, sans-serif">2) 路由切换导致权重抖动与带宽风暴</text>
  <rect x="670" y="350" width="440" height="60" rx="10" fill="#b45309"/>
  <text x="890" y="385" text-anchor="middle" fill="#fffbeb" font-size="15" font-family="Noto Sans CJK SC, sans-serif">3) 小 batch / 单请求使稀疏并行优势消失</text>
  <rect x="670" y="425" width="440" height="60" rx="10" fill="#a16207"/>
  <text x="890" y="460" text-anchor="middle" fill="#fefce8" font-size="15" font-family="Noto Sans CJK SC, sans-serif">4) 内核碎片化、调度与量化耦合复杂</text>
  <rect x="670" y="500" width="440" height="60" rx="10" fill="#7f1d1d"/>
  <text x="890" y="535" text-anchor="middle" fill="#fee2e2" font-size="15" font-family="Noto Sans CJK SC, sans-serif">5) 热专家 + 冷专家缓存策略决定体验</text>
  <text x="890" y="610" text-anchor="middle" fill="#fca5a5" font-size="15" font-family="Noto Sans CJK SC, sans-serif">↑ 端侧瓶颈常在内存与带宽，而非峰值 FLOPs</text>
</svg>