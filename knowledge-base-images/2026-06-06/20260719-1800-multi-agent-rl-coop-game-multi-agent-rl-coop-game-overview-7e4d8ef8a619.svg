<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#f8fafc"/><text x="600" y="52" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, sans-serif" font-size="28" fill="#0f172a" font-weight="700">Multi-Agent RL：从单智能体最优到协作与博弈</text><rect x="80" y="130" width="280" height="140" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="220" y="190" text-anchor="middle" font-size="21" font-family="Noto Sans CJK SC, sans-serif" fill="#1e3a8a" font-weight="700">单智能体 RL</text><text x="220" y="225" text-anchor="middle" font-size="15" font-family="Noto Sans CJK SC, sans-serif" fill="#1e40af">环境近似静态，策略改进目标清晰</text><rect x="460" y="130" width="280" height="140" rx="16" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/><text x="600" y="190" text-anchor="middle" font-size="21" font-family="Noto Sans CJK SC, sans-serif" fill="#312e81" font-weight="700">多智能体耦合</text><text x="600" y="225" text-anchor="middle" font-size="15" font-family="Noto Sans CJK SC, sans-serif" fill="#3730a3">每个策略更新都会改变其他人的环境</text><rect x="840" y="130" width="280" height="140" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2"/><text x="980" y="190" text-anchor="middle" font-size="21" font-family="Noto Sans CJK SC, sans-serif" fill="#064e3b" font-weight="700">协作与博弈</text><text x="980" y="225" text-anchor="middle" font-size="15" font-family="Noto Sans CJK SC, sans-serif" fill="#065f46">信用分配、均衡、通信与非平稳性</text><path d="M365 200 L455 200" stroke="#334155" stroke-width="3" marker-end="url(#a)"/><path d="M745 200 L835 200" stroke="#334155" stroke-width="3" marker-end="url(#a)"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect x="160" y="390" width="880" height="150" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="600" y="450" text-anchor="middle" font-size="22" font-family="Noto Sans CJK SC, sans-serif" fill="#9a3412" font-weight="700">难度陡增的根因</text><text x="600" y="495" text-anchor="middle" font-size="17" font-family="Noto Sans CJK SC, sans-serif" fill="#c2410c">环境非平稳 + 奖励耦合 + 信用分配 + 博弈均衡 + 通信约束</text></svg>