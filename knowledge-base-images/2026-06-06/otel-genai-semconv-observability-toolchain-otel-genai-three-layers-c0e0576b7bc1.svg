<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="570" viewBox="0 0 1200 570"><rect width="1200" height="570" fill="#fffdf7"/><style>text{font-family:Arial,'Microsoft YaHei';fill:#3f2d20}.h{font-size:30px;font-weight:bold}.t{font-size:22px;font-weight:bold}.s{font-size:18px}.box{stroke-width:2}.good{fill:#ecfdf5;stroke:#047857}.warn{fill:#fffbeb;stroke:#b45309}.bad{fill:#fef2f2;stroke:#b91c1c}</style><text x="55" y="55" class="h">把指标分层：先回答“系统能否服务”，再回答“回答是否值得信任”</text><rect x="55" y="110" width="330" height="350" rx="16" class="box good"/><text x="100" y="160" class="t">运行层：可靠性</text><text x="90" y="205" class="s">• 请求量、错误率、延迟</text><text x="90" y="245" class="s">• 限流、重试、超时</text><text x="90" y="285" class="s">• 下游依赖与容量</text><text x="90" y="340" class="s">问题：服务是否可用？</text><text x="90" y="390" class="s">动作：扩容、熔断、回滚</text><rect x="435" y="110" width="330" height="350" rx="16" class="box warn"/><text x="480" y="160" class="t">AI 层：行为与成本</text><text x="470" y="205" class="s">• 模型、token、停止原因</text><text x="470" y="245" class="s">• 工具调用、检索、缓存</text><text x="470" y="285" class="s">• 回合、上下文、版本</text><text x="470" y="340" class="s">问题：为什么这样生成？</text><text x="470" y="390" class="s">动作：路由、提示、预算</text><rect x="815" y="110" width="330" height="350" rx="16" class="box bad"/><text x="860" y="160" class="t">结果层：质量与风险</text><text x="850" y="205" class="s">• 任务成功、人工接管</text><text x="850" y="245" class="s">• 引用、拒答、合规命中</text><text x="850" y="285" class="s">• 延迟反馈、在线评估</text><text x="850" y="340" class="s">问题：是否产生正确价值？</text><text x="850" y="390" class="s">动作：评测、治理、迭代</text><text x="55" y="525" class="s">三层必须通过 trace / session / request 等关联键连起来；否则仪表盘越多，定位路径越断裂。</text></svg>