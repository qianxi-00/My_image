<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gCache" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gRoute" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gPrice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <rect x="30" y="20" width="1040" height="50" rx="8" fill="url(#gHeader)" opacity="0.9"/>
  <text x="550" y="51" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">LLM 定价幻觉：KV 缓存经济学 × 路由聚合层 × 成本重构</text>

  <!-- Layer 1: Developer / Agent (top) -->
  <rect x="50" y="90" width="200" height="70" rx="8" fill="#334155" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="120" text-anchor="middle" fill="#c7d2fe" font-size="14" font-weight="bold">开发者 / Agent</text>
  <text x="150" y="142" text-anchor="middle" fill="#94a3b8" font-size="11">发送请求（98% 输入 token）</text>

  <!-- Arrow: Developer → Router -->
  <line x1="250" y1="125" x2="330" y2="125" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Layer 2: OpenRouter / Router Aggregation -->
  <rect x="330" y="80" width="240" height="90" rx="10" fill="url(#gRoute)" opacity="0.15" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="108" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="bold">🔀 路由聚合层</text>
  <text x="450" y="128" text-anchor="middle" fill="#fbbf24" font-size="11">OpenRouter / SiliconFlow</text>
  <text x="450" y="148" text-anchor="middle" fill="#d97706" font-size="10">统一 API → 智能路由 → 缓存亲和性</text>
  <text x="450" y="162" text-anchor="middle" fill="#92400e" font-size="9">决定模型采纳的关键枢纽</text>

  <!-- Arrow: Router → KV Cache -->
  <line x1="570" y1="135" x2="650" y2="200" stroke="#10b981" stroke-width="2"/>
  <line x1="570" y1="115" x2="650" y2="115" stroke="#ef4444" stroke-width="2"/>
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Layer 3: KV Cache (core) -->
  <rect x="640" y="180" width="260" height="100" rx="10" fill="url(#gCache)" opacity="0.15" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="770" y="210" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="bold">💾 KV 缓存层</text>
  <text x="770" y="232" text-anchor="middle" fill="#34d399" font-size="11">DeepSeek: 读取成本 = 行业 1/10</text>
  <text x="770" y="250" text-anchor="middle" fill="#a7f3d0" font-size="10">缓存命中 → 输入 token 成本骤降</text>
  <text x="770" y="268" text-anchor="middle" fill="#6ee7b7" font-size="9">标价 vs 实际成本：巨大鸿沟</text>

  <!-- Layer 3b: Pricing Illusion -->
  <rect x="640" y="90" width="260" height="70" rx="10" fill="url(#gPrice)" opacity="0.12" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="115" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="bold">💰 定价幻觉</text>
  <text x="770" y="135" text-anchor="middle" fill="#f87171" font-size="10">标价 ≠ 实际成本 | 缓存折扣 × 路由折扣</text>
  <text x="770" y="150" text-anchor="middle" fill="#fca5a5" font-size="9">Hy3 标价平平，实际成本碾压同行</text>

  <!-- Arrow: KV Cache → Models -->
  <line x1="770" y1="280" x2="770" y2="340" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Layer 4: Model Providers -->
  <rect x="400" y="340" width="160" height="70" rx="8" fill="#334155" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="370" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="bold">Hy3 Preview</text>
  <text x="480" y="390" text-anchor="middle" fill="#94a3b8" font-size="10">腾讯 | benchmark 平平</text>
  <text x="480" y="403" text-anchor="middle" fill="#6366f1" font-size="9">但用量登顶 📈</text>

  <rect x="590" y="340" width="160" height="70" rx="8" fill="#334155" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="370" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="bold">DeepSeek V4</text>
  <text x="670" y="390" text-anchor="middle" fill="#94a3b8" font-size="10">KV 缓存成本极低</text>
  <text x="670" y="403" text-anchor="middle" fill="#10b981" font-size="9">缓存读取 = 行业 1/10</text>

  <rect x="780" y="340" width="160" height="70" rx="8" fill="#334155" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="860" y="370" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="bold">Claude / GPT</text>
  <text x="860" y="390" text-anchor="middle" fill="#94a3b8" font-size="10">标价高，缓存折扣小</text>
  <text x="860" y="403" text-anchor="middle" fill="#ef4444" font-size="9">实际成本差距 10-50×</text>

  <!-- Bottom: Key Insights -->
  <rect x="50" y="440" width="1000" height="160" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <text x="70" y="465" fill="#fcd34d" font-size="14" font-weight="bold">🔑 核心洞察</text>

  <rect x="70" y="480" width="280" height="50" rx="6" fill="#334155"/>
  <text x="85" y="498" fill="#6ee7b7" font-size="12" font-weight="bold">① Token 经济学翻转</text>
  <text x="85" y="518" fill="#94a3b8" font-size="10">98% 输入 / 2% 输出 → 缓存命中率决定成本</text>

  <rect x="370" y="480" width="300" height="50" rx="6" fill="#334155"/>
  <text x="385" y="498" fill="#6ee7b7" font-size="12" font-weight="bold">② KV 缓存 = 定价护城河</text>
  <text x="385" y="518" fill="#94a3b8" font-size="10">DeepSeek 缓存架构压低成本 10×，标价无意义</text>

  <rect x="690" y="480" width="340" height="50" rx="6" fill="#334155"/>
  <text x="705" y="498" fill="#6ee7b7" font-size="12" font-weight="bold">③ 路由层决定模型命运</text>
  <text x="705" y="518" fill="#94a3b8" font-size="10">OpenRouter 聚合 → 用户不选模型，路由替用户选</text>

  <text x="70" y="560" fill="#fbbf24" font-size="11">结论：2026 年 LLM 竞争的胜负手不在 benchmark，而在缓存架构 × 路由亲和性 × 定价策略的系统设计中</text>

  <!-- Footer -->
  <text x="550" y="610" text-anchor="middle" fill="#475569" font-size="10">小英子 · AI 热点深度分析 · 2026-05-29</text>
</svg>
