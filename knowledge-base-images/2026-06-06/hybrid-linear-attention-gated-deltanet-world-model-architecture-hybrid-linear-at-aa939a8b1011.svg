<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="softmax-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="linear-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="hybrid-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">三种注意力机制架构路线对比</text>

  <!-- Panel 1: Pure Softmax -->
  <rect x="20" y="55" width="270" height="440" rx="12" fill="url(#softmax-bg)" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="155" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#3730a3">纯 Softmax 注意力</text>

  <!-- Q K V -->
  <rect x="45" y="105" width="50" height="30" rx="6" fill="#6366f1" opacity="0.8"/>
  <text x="70" y="125" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Q</text>
  <rect x="110" y="105" width="50" height="30" rx="6" fill="#6366f1" opacity="0.8"/>
  <text x="135" y="125" text-anchor="middle" font-size="13" fill="white" font-weight="bold">K</text>
  <rect x="175" y="105" width="50" height="30" rx="6" fill="#6366f1" opacity="0.8"/>
  <text x="200" y="125" text-anchor="middle" font-size="13" fill="white" font-weight="bold">V</text>

  <!-- Arrow down -->
  <line x1="155" y1="140" x2="155" y2="165" stroke="#4338ca" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <defs><marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4338ca"/></marker></defs>

  <!-- Softmax box -->
  <rect x="80" y="170" width="150" height="40" rx="8" fill="#4338ca"/>
  <text x="155" y="195" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Softmax(QKᵀ)V</text>

  <line x1="155" y1="215" x2="155" y2="240" stroke="#4338ca" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Full KV Cache -->
  <rect x="65" y="245" width="180" height="35" rx="6" fill="#4338ca" opacity="0.15" stroke="#4338ca" stroke-width="1"/>
  <text x="155" y="267" text-anchor="middle" font-size="12" fill="#3730a3">完整 KV Cache: O(n·d)</text>

  <!-- Complexity badge -->
  <rect x="55" y="300" width="200" height="50" rx="10" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="155" y="322" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="bold">计算复杂度 O(n²d)</text>
  <text x="155" y="340" text-anchor="middle" font-size="11" fill="#b91c1c">内存占用 O(n²)</text>

  <!-- Characteristics -->
  <text x="40" y="380" font-size="12" fill="#4338ca">✅ 全局信息交互能力最强</text>
  <text x="40" y="400" font-size="12" fill="#4338ca">✅ 注意力分布精确（尖锐）</text>
  <text x="40" y="420" font-size="12" fill="#dc2626">❌ 长序列计算成本极高</text>
  <text x="40" y="440" font-size="12" fill="#dc2626">❌ 推理延迟随序列增长</text>
  <text x="40" y="460" font-size="12" fill="#dc2626">❌ 大规模视频/世界模型难以承受</text>

  <!-- Panel 2: Pure Linear -->
  <rect x="315" y="55" width="270" height="440" rx="12" fill="url(#linear-bg)" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#065f46">纯线性注意力</text>

  <!-- Q K V -->
  <rect x="340" y="105" width="50" height="30" rx="6" fill="#059669" opacity="0.8"/>
  <text x="365" y="125" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Q</text>
  <rect x="405" y="105" width="50" height="30" rx="6" fill="#059669" opacity="0.8"/>
  <text x="430" y="125" text-anchor="middle" font-size="13" fill="white" font-weight="bold">K</text>
  <rect x="470" y="105" width="50" height="30" rx="6" fill="#059669" opacity="0.8"/>
  <text x="495" y="125" text-anchor="middle" font-size="13" fill="white" font-weight="bold">V</text>

  <line x1="450" y1="140" x2="450" y2="165" stroke="#047857" stroke-width="2" marker-end="url(#arrow-green)"/>
  <defs><marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#047857"/></marker></defs>

  <!-- Kernel function -->
  <rect x="355" y="170" width="190" height="40" rx="8" fill="#047857"/>
  <text x="450" y="195" text-anchor="middle" font-size="13" fill="white" font-weight="bold">φ(Q)·(φ(K)ᵀV) 递推</text>

  <line x1="450" y1="215" x2="450" y2="240" stroke="#047857" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Fixed state -->
  <rect x="355" y="245" width="190" height="35" rx="6" fill="#059669" opacity="0.15" stroke="#059669" stroke-width="1"/>
  <text x="450" y="267" text-anchor="middle" font-size="12" fill="#065f46">固定隐状态: O(d²)</text>

  <!-- Complexity badge -->
  <rect x="350" y="300" width="200" height="50" rx="10" fill="#10b981" opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="322" text-anchor="middle" font-size="14" fill="#059669" font-weight="bold">计算复杂度 O(nd²)</text>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#047857">推理内存 O(1)</text>

  <!-- Characteristics -->
  <text x="335" y="380" font-size="12" fill="#059669">✅ 线性复杂度，高效长序列</text>
  <text x="335" y="400" font-size="12" fill="#059669">✅ RNN 递推推理，内存恒定</text>
  <text x="335" y="420" font-size="12" fill="#dc2626">❌ 信息回忆能力不足</text>
  <text x="335" y="440" font-size="12" fill="#dc2626">❌ 精确回忆任务表现脆弱</text>
  <text x="335" y="460" font-size="12" fill="#dc2626">❌ 难以替代 Softmax 的精度</text>

  <!-- Panel 3: Hybrid -->
  <rect x="610" y="55" width="270" height="440" rx="12" fill="url(#hybrid-bg)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="745" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">混合注意力（Hybrid）</text>

  <!-- Two branches -->
  <rect x="630" y="105" width="110" height="28" rx="6" fill="#d97706" opacity="0.8"/>
  <text x="685" y="124" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Gated DeltaNet</text>
  <rect x="755" y="105" width="110" height="28" rx="6" fill="#6366f1" opacity="0.6"/>
  <text x="810" y="124" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Softmax Attn</text>

  <!-- Main branch label -->
  <text x="685" y="150" text-anchor="middle" font-size="10" fill="#92400e">主分支（大部分层）</text>
  <text x="810" y="150" text-anchor="middle" font-size="10" fill="#4338ca">辅助分支（少数层）</text>

  <line x1="685" y1="158" x2="685" y2="175" stroke="#d97706" stroke-width="2"/>
  <line x1="810" y1="158" x2="810" y2="175" stroke="#6366f1" stroke-width="2"/>

  <!-- Processing boxes -->
  <rect x="635" y="178" width="100" height="32" rx="6" fill="#b45309"/>
  <text x="685" y="199" text-anchor="middle" font-size="11" fill="white">线性递推 O(nd²)</text>
  <rect x="760" y="178" width="100" height="32" rx="6" fill="#4338ca"/>
  <text x="810" y="199" text-anchor="middle" font-size="11" fill="white">精确回忆 O(n²d)</text>

  <line x1="685" y1="215" x2="745" y2="240" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="810" y1="215" x2="745" y2="240" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <defs><marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d97706"/></marker></defs>

  <!-- Merge -->
  <rect x="680" y="243" width="130" height="35" rx="8" fill="#d97706"/>
  <text x="745" y="265" text-anchor="middle" font-size="13" fill="white" font-weight="bold">融合输出</text>

  <line x1="745" y1="282" x2="745" y2="305" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Complexity badge -->
  <rect x="645" y="308" width="200" height="50" rx="10" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="745" y="330" text-anchor="middle" font-size="14" fill="#059669" font-weight="bold">综合效率最优</text>
  <text x="745" y="348" text-anchor="middle" font-size="11" fill="#047857">36× 吞吐量提升（SANA-WM）</text>

  <!-- Characteristics -->
  <text x="630" y="380" font-size="12" fill="#059669">✅ 线性复杂度处理长序列</text>
  <text x="630" y="400" font-size="12" fill="#059669">✅ 保留 Softmax 精确回忆</text>
  <text x="630" y="420" font-size="12" fill="#059669">✅ 适合视频/世界模型场景</text>
  <text x="630" y="440" font-size="12" fill="#d97706">⚠️ 混合比例需调优</text>
  <text x="630" y="460" font-size="12" fill="#d97706">⚠️ 工程实现复杂度较高</text>

  <!-- Bottom annotation -->
  <text x="450" y="515" text-anchor="middle" font-size="12" fill="#64748b">图：三种注意力机制架构路线对比（Softmax → 线性 → 混合）</text>
</svg>