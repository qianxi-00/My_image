<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">强化学习学习路线图</title>
  <desc id="desc">从 MDP、Bellman、TD、策略梯度、PPO、GRPO 到后 GRPO 方法的学习路线</desc>
  <defs>
    <style>
      .bg{fill:#f7fbff}.card{fill:#ffffff;stroke:#1f4e79;stroke-width:2;rx:18}.core{fill:#eaf4ff;stroke:#1f4e79}.front{fill:#fff4e6;stroke:#c76b00}.txt{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#17324d}.small{font-size:21px}.mid{font-size:25px;font-weight:700}.title{font-size:34px;font-weight:800}.arrow{stroke:#1f4e79;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#c76b00;stroke-width:3;fill:none;stroke-dasharray:8 7;marker-end:url(#arrow2)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1f4e79"/></marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#c76b00"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text class="txt title" x="60" y="58">强化学习从基础到后 GRPO 的学习路线</text>
  <text class="txt small" x="62" y="92">先建立序列决策直觉，再理解策略优化，最后进入大模型推理 RL 前沿。</text>
  <rect class="card core" x="70" y="145" width="180" height="92"/>
  <text class="txt mid" x="112" y="181">MDP</text>
  <text class="txt small" x="92" y="211">状态/动作/奖励</text>
  <rect class="card core" x="300" y="145" width="190" height="92"/>
  <text class="txt mid" x="340" y="181">Bellman</text>
  <text class="txt small" x="318" y="211">价值递归</text>
  <rect class="card core" x="540" y="145" width="190" height="92"/>
  <text class="txt mid" x="594" y="181">MC / TD</text>
  <text class="txt small" x="565" y="211">采样与更新</text>
  <rect class="card core" x="780" y="145" width="190" height="92"/>
  <text class="txt mid" x="816" y="181">DQN / AC</text>
  <text class="txt small" x="802" y="211">深度强化学习</text>
  <rect class="card core" x="1020" y="145" width="190" height="92"/>
  <text class="txt mid" x="1064" y="181">PPO</text>
  <text class="txt small" x="1038" y="211">限制策略更新</text>
  <path class="arrow" d="M250 191 H300"/>
  <path class="arrow" d="M490 191 H540"/>
  <path class="arrow" d="M730 191 H780"/>
  <path class="arrow" d="M970 191 H1020"/>
  <rect class="card core" x="240" y="350" width="220" height="96"/>
  <text class="txt mid" x="296" y="389">RLHF</text>
  <text class="txt small" x="268" y="418">奖励模型 + PPO</text>
  <rect class="card core" x="520" y="350" width="220" height="96"/>
  <text class="txt mid" x="588" y="389">GRPO</text>
  <text class="txt small" x="548" y="418">组内相对优势</text>
  <rect class="card front" x="800" y="350" width="240" height="96"/>
  <text class="txt mid" x="852" y="389">后 GRPO</text>
  <text class="txt small" x="824" y="418">稳定性/效率/缩放</text>
  <path class="arrow" d="M1115 237 C1115 300 370 300 350 350"/>
  <path class="arrow" d="M460 398 H520"/>
  <path class="dash" d="M740 398 H800"/>
  <rect class="card front" x="120" y="545" width="230" height="82"/>
  <text class="txt mid" x="184" y="580">DAPO</text>
  <text class="txt small" x="144" y="608">采样/裁剪/长度</text>
  <rect class="card front" x="410" y="545" width="230" height="82"/>
  <text class="txt mid" x="474" y="580">GSPO</text>
  <text class="txt small" x="426" y="608">序列级 ratio</text>
  <rect class="card front" x="700" y="545" width="230" height="82"/>
  <text class="txt mid" x="756" y="580">ScaleRL</text>
  <text class="txt small" x="718" y="608">compute scaling</text>
  <rect class="card front" x="990" y="545" width="230" height="82"/>
  <text class="txt mid" x="1046" y="580">Dr.GRPO</text>
  <text class="txt small" x="1006" y="608">长度与偏差</text>
  <path class="dash" d="M920 446 C920 500 235 500 235 545"/>
  <path class="dash" d="M920 446 C920 500 525 500 525 545"/>
  <path class="dash" d="M920 446 C920 500 815 500 815 545"/>
  <path class="dash" d="M920 446 C920 500 1105 500 1105 545"/>
</svg>
