<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#0b1020}
      .card{rx:24;ry:24}
      .title{font:700 44px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#f8fafc}
      .subtitle{font:400 22px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#cbd5e1}
      .h{font:700 28px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#0f172a}
      .t{font:500 22px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#1e293b}
      .small{font:500 20px 'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#334155}
      .arrow{stroke:#94a3b8;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <text x="70" y="80" class="title">主权 AI 基础设施正在变成一整套运行栈竞争</text>
  <text x="70" y="122" class="subtitle">最近升温的不是单一“主权云”概念，而是数据边界、行政控制、隔离执行、热态恢复与开放模型供给同时上桌。</text>

  <rect x="70" y="180" width="1460" height="120" fill="#dbeafe" class="card"/>
  <text x="100" y="228" class="h">第一层：政策与数据中心能力</text>
  <text x="100" y="268" class="t">AI 工厂 / AI 巨型工厂 / Cloud and AI Development Act / 数据中心容量 / 算力投资</text>

  <rect x="70" y="330" width="700" height="150" fill="#dcfce7" class="card"/>
  <text x="100" y="378" class="h">第二层：主权控制面</text>
  <text x="100" y="418" class="t">数据驻留、管理访问控制、外部密钥、审计、本地伙伴运营</text>
  <text x="100" y="452" class="small">Data Boundary / Dedicated / Air-Gapped / 断连后的持续运营能力</text>

  <rect x="830" y="330" width="700" height="150" fill="#fde68a" class="card"/>
  <text x="860" y="378" class="h">第三层：AI 运行时控制</text>
  <text x="860" y="418" class="t">隔离执行、Agent Sandbox、Warm Pool、Pod Snapshots、推理路由</text>
  <text x="860" y="452" class="small">解决“模型生成代码在哪里跑、如何恢复、如何高效扩缩容”</text>

  <rect x="70" y="520" width="1460" height="130" fill="#fecdd3" class="card"/>
  <text x="100" y="570" class="h">第四层：模型与供给选择</text>
  <text x="100" y="610" class="t">开放模型、托管模型、第三方模型与本地主体部署并存；重点不再只是“有没有模型”，而是“模型能否进入主权边界”。</text>

  <rect x="70" y="690" width="1460" height="130" fill="#e9d5ff" class="card"/>
  <text x="100" y="740" class="h">最终竞争对象：可托付的政企 AI 落地环境</text>
  <text x="100" y="780" class="t">云厂商争的已不只是 GPU 和模型 API，而是政企是否愿意把关键 AI 工作负载放进这套边界里长期运行。</text>

  <line x1="800" y1="300" x2="800" y2="325" class="arrow"/>
  <line x1="430" y1="480" x2="430" y2="515" class="arrow"/>
  <line x1="1170" y1="480" x2="1170" y2="515" class="arrow"/>
  <line x1="800" y1="650" x2="800" y2="685" class="arrow"/>
</svg>
