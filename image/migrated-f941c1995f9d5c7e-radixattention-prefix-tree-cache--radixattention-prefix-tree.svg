<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="900" height="520" rx="12" fill="url(#bg)"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">RadixAttention 前缀树缓存架构</text>

  <!-- Root -->
  <rect x="340" y="55" width="220" height="42" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="450" y="82" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">System Prompt（共享根节点）</text>

  <!-- Lines from root -->
  <line x1="400" y1="97" x2="250" y2="145" stroke="#94a3b8" stroke-width="2"/>
  <line x1="500" y1="97" x2="650" y2="145" stroke="#94a3b8" stroke-width="2"/>

  <!-- Branch A -->
  <rect x="130" y="145" width="240" height="42" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="250" y="172" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">用户A 多轮对话历史（共享）</text>

  <!-- Branch B -->
  <rect x="530" y="145" width="240" height="42" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="650" y="172" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">用户B 多轮对话历史（共享）</text>

  <!-- Lines from A -->
  <line x1="200" y1="187" x2="130" y2="235" stroke="#94a3b8" stroke-width="2"/>
  <line x1="300" y1="187" x2="370" y2="235" stroke="#94a3b8" stroke-width="2"/>

  <!-- Lines from B -->
  <line x1="600" y1="187" x2="530" y2="235" stroke="#94a3b8" stroke-width="2"/>
  <line x1="700" y1="187" x2="770" y2="235" stroke="#94a3b8" stroke-width="2"/>

  <!-- Leaf nodes -->
  <rect x="40" y="235" width="180" height="42" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="130" y="255" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Turn 3 新请求</text>
  <text x="130" y="270" text-anchor="middle" font-size="10" fill="#fef3c7">KV Cache 命中 → 跳过 prefill</text>

  <rect x="280" y="235" width="180" height="42" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="370" y="262" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">RAG 检索文档</text>

  <rect x="440" y="235" width="180" height="42" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="530" y="255" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Turn 5 新请求</text>
  <text x="530" y="270" text-anchor="middle" font-size="10" fill="#fef3c7">KV Cache 命中 → 跳过 prefill</text>

  <rect x="680" y="235" width="180" height="42" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="770" y="262" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Few-shot 示例集</text>

  <!-- Cache hit highlight -->
  <rect x="60" y="300" width="780" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="318" text-anchor="middle" font-size="13" fill="#1d4ed8" font-weight="bold">KV Cache 共享层：radix tree 自动匹配最长公共前缀</text>
  <text x="450" y="336" text-anchor="middle" font-size="11" fill="#3b82f6">无需手动指定可缓存段 · 前缀越长命中率越高 · LRU 淘汰策略管理显存</text>

  <!-- Legend -->
  <rect x="60" y="370" width="780" height="130" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">核心机制说明</text>

  <circle cx="100" cy="425" r="8" fill="#3b82f6"/>
  <text x="115" y="430" font-size="12" fill="#475569">共享根节点：所有请求的公共前缀（如 system prompt）</text>

  <circle cx="100" cy="452" r="8" fill="#10b981"/>
  <text x="115" y="457" font-size="12" fill="#475569">分支节点：按请求路径分叉，但同路径的请求共享 KV Cache</text>

  <circle cx="100" cy="479" r="8" fill="#f59e0b"/>
  <text x="115" y="484" font-size="12" fill="#475569">缓存命中：新请求到来时自动查找最长匹配前缀，跳过重复 prefill</text>
</svg>