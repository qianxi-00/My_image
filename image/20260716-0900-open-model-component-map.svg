<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">2026 开源模型关键组件地图</text>
  <rect x="40" y="100" width="360" height="240" rx="12" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>  <text x="220" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">MoE 路由</text>  <text x="56" y="162" fill="#e2e8f0" font-size="15">Top-K / Expert Choice</text>  <text x="56" y="186" fill="#e2e8f0" font-size="15">负载均衡</text>  <text x="56" y="210" fill="#e2e8f0" font-size="15">专家专业化</text>  <rect x="420" y="100" width="360" height="240" rx="12" fill="#0ea5e9" opacity="0.92" filter="url(#shadow)"/>  <text x="600" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">视觉编码器</text>  <text x="436" y="162" fill="#e2e8f0" font-size="15">SigLIP/DINO/Hybrid</text>  <text x="436" y="186" fill="#e2e8f0" font-size="15">MMDiT</text>  <text x="436" y="210" fill="#e2e8f0" font-size="15">动态分辨率</text>  <rect x="800" y="100" width="360" height="240" rx="12" fill="#10b981" opacity="0.92" filter="url(#shadow)"/>  <text x="980" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Tokenizer</text>  <text x="816" y="162" fill="#e2e8f0" font-size="15">BPE 变体</text>  <text x="816" y="186" fill="#e2e8f0" font-size="15">多模态 token</text>  <text x="816" y="210" fill="#e2e8f0" font-size="15">词表升级成本</text>  <rect x="40" y="380" width="360" height="240" rx="12" fill="#f59e0b" opacity="0.92" filter="url(#shadow)"/>  <text x="220" y="412" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Projector</text>  <text x="56" y="442" fill="#e2e8f0" font-size="15">MLP / Q-Former</text>  <text x="56" y="466" fill="#e2e8f0" font-size="15">codec-aligned</text>  <text x="56" y="490" fill="#e2e8f0" font-size="15">跨模态契约</text>  <rect x="420" y="380" width="360" height="240" rx="12" fill="#ec4899" opacity="0.92" filter="url(#shadow)"/>  <text x="600" y="412" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">注意力/稀疏</text>  <text x="436" y="442" fill="#e2e8f0" font-size="15">GQA/MLA/DSA</text>  <text x="436" y="466" fill="#e2e8f0" font-size="15">长上下文代价</text>  <rect x="800" y="380" width="360" height="240" rx="12" fill="#8b5cf6" opacity="0.92" filter="url(#shadow)"/>  <text x="980" y="412" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">服务侧约束</text>  <text x="816" y="442" fill="#e2e8f0" font-size="15">KV Cache</text>  <text x="816" y="466" fill="#e2e8f0" font-size="15">激活参数</text>  <text x="816" y="490" fill="#e2e8f0" font-size="15">可部署性</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">架构竞争已从“堆参数”转向“组件路线”</text></svg>
