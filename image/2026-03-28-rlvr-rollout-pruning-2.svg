<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="800" y="58" text-anchor="middle" font-size="34" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#0f172a" font-weight="700">RLVR 提效路线图：各家都在省 rollout，但省法已经分叉</text>

  <rect x="90" y="120" width="1420" height="640" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>

  <line x1="250" y1="180" x2="250" y2="720" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="640" y1="180" x2="640" y2="720" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="1010" y1="180" x2="1010" y2="720" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="1310" y1="180" x2="1310" y2="720" stroke="#e2e8f0" stroke-width="2"/>

  <text x="170" y="160" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#334155" font-weight="700">路线</text>
  <text x="445" y="160" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#334155" font-weight="700">省的是哪一段</text>
  <text x="825" y="160" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#334155" font-weight="700">核心做法</text>
  <text x="1160" y="160" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#334155" font-weight="700">主要短板</text>
  <text x="1410" y="160" text-anchor="middle" font-size="28" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#334155" font-weight="700">代表工作</text>

  <rect x="110" y="210" width="1250" height="95" rx="18" fill="#fff7ed"/>
  <text x="170" y="250" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#9a3412" font-weight="700">传统 GRPO / DAPO</text>
  <text x="445" y="246" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">几乎不省生成</text>
  <text x="445" y="274" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">完整 rollout 全都先跑完</text>
  <text x="825" y="246" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">靠大组采样形成组内相对优势</text>
  <text x="825" y="274" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">再做 logprob、优势与更新</text>
  <text x="1160" y="246" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">最贵的是生成本身</text>
  <text x="1160" y="274" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">全对/全错时学习信号变弱</text>
  <text x="1410" y="260" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#7c2d12">DeepSeekMath / DAPO</text>

  <rect x="110" y="330" width="1250" height="95" rx="18" fill="#eff6ff"/>
  <text x="170" y="370" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1d4ed8" font-weight="700">后处理裁剪</text>
  <text x="445" y="366" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">主要省更新与优化</text>
  <text x="445" y="394" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">生成阶段大头还在</text>
  <text x="825" y="366" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">rollout 生成完后再删样本</text>
  <text x="825" y="394" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">减少 logprob 与反传计算</text>
  <text x="1160" y="366" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">端到端加速有限</text>
  <text x="1160" y="394" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">无助于最贵的 token 生成</text>
  <text x="1410" y="380" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#1e3a8a">CPPO / PODS（论文所述）</text>

  <rect x="110" y="450" width="1250" height="95" rx="18" fill="#f5f3ff"/>
  <text x="170" y="490" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6d28d9" font-weight="700">推测解码/历史复用</text>
  <text x="445" y="486" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6b21a8">主要省生成延迟</text>
  <text x="445" y="514" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6b21a8">靠 draft 或历史轨迹加速</text>
  <text x="825" y="486" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6b21a8">用 speculative decoding 或复用前几轮信息</text>
  <text x="825" y="514" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6b21a8">让 rollout 更快吐完</text>
  <text x="1160" y="486" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6b21a8">冷启动和小 epoch 场景受限</text>
  <text x="1160" y="514" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6b21a8">不直接解决组内信号稀疏</text>
  <text x="1410" y="500" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#6b21a8">RhymeRL / Spec-RL / FastGRPO</text>

  <rect x="110" y="570" width="1250" height="115" rx="18" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="170" y="612" text-anchor="middle" font-size="24" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534" font-weight="700">在线 rollout 裁剪</text>
  <text x="445" y="608" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">同时省生成、logprob 与更新</text>
  <text x="445" y="638" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">而且顺手修复组内奖励失衡</text>
  <text x="825" y="604" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">在推理引擎内部，生成到检测长度就打分</text>
  <text x="825" y="634" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">低价值轨迹立即移出请求池，幸存者重新编队继续训练</text>
  <text x="1160" y="604" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">仍需先生成到检测阈值</text>
  <text x="1160" y="634" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">目前主要验证在数学 RLVR 场景</text>
  <text x="1410" y="620" text-anchor="middle" font-size="18" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#166534">ARRoL（2026-03）</text>

  <rect x="270" y="790" width="1060" height="72" rx="18" fill="#0f172a"/>
  <text x="800" y="835" text-anchor="middle" font-size="22" font-family="PingFang SC, Microsoft YaHei, Arial" fill="#f8fafc" font-weight="700">下一阶段主问题已经变了：不是“还能再多采几条”，而是“哪条 rollout 值得活到最后”</text>
</svg>