<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><style>.title{font:700 28px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}.h{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}.t{font:15px Arial,"Noto Sans CJK SC",sans-serif;fill:#374151}.small{font:13px Arial,"Noto Sans CJK SC",sans-serif;fill:#4b5563}.box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:16}.blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#ecfdf5;stroke:#059669}.amber{fill:#fffbeb;stroke:#d97706}.purple{fill:#f5f3ff;stroke:#7c3aed}.arrow{stroke:#334155;stroke-width:2.4;marker-end:url(#a);fill:none}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs><rect width="1280" height="720" fill="#f8fafc"/><text x="50" y="58" class="title">工程团队选开放模型时，不该只看排行榜</text><rect x="80" y="120" width="1120" height="90" class="box blue"/><text x="120" y="175" class="h">先问：你的瓶颈在能力上限、上下文长度、调用成本，还是系统可控性？</text><path d="M640 210 L640 275" class="arrow"/><rect x="80" y="300" width="260" height="210" class="box green"/><text x="110" y="345" class="h">高频链路</text><text x="110" y="385" class="t">路由 / 摘要 / RAG glue</text><text x="110" y="425" class="t">优先：小 active MoE</text><text x="110" y="465" class="small">看 latency、吞吐、许可证、私有部署</text><rect x="370" y="300" width="260" height="210" class="box blue"/><text x="400" y="345" class="h">长程 Agent</text><text x="400" y="385" class="t">代码库 / 论文 / 长视频</text><text x="400" y="425" class="t">优先：长上下文 + 工具调用</text><text x="400" y="465" class="small">看真实多步任务与 cache 成本</text><rect x="660" y="300" width="260" height="210" class="box amber"/><text x="690" y="345" class="h">通用助手</text><text x="690" y="385" class="t">问答 / 写作 / 推理 / 编码</text><text x="690" y="425" class="t">优先：成熟生态与稳定 serving</text><text x="690" y="465" class="small">看工具链、微调、社区修复速度</text><rect x="950" y="300" width="260" height="210" class="box purple"/><text x="980" y="345" class="h">数据敏感场景</text><text x="980" y="385" class="t">本地代码 / 企业知识库</text><text x="980" y="425" class="t">优先：权重可得 + 可审计部署</text><text x="980" y="465" class="small">警惕 open-weight 与 open-source 差异</text><text x="125" y="625" class="small">判断标准：能不能嵌入系统、能不能稳定服务、能不能解释成本，而不是单次 benchmark 的名次。</text></svg>