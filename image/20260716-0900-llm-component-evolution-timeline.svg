<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">开源 LLM 关键组件演进：2023 → 2026</text>
  <rect x="40" y="110" width="180" height="450" rx="12" fill="#475569" opacity="0.92" filter="url(#shadow)"/>  <text x="130" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">2023</text>  <text x="56" y="172" fill="#e2e8f0" font-size="15">BPE 主流</text>  <text x="56" y="196" fill="#e2e8f0" font-size="15">RoPE 普及</text>  <text x="56" y="220" fill="#e2e8f0" font-size="15">MHA→GQA</text>  <text x="56" y="244" fill="#e2e8f0" font-size="15">Dense 为主</text>  <rect x="250" y="110" width="180" height="450" rx="12" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>  <text x="340" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">2024</text>  <text x="266" y="172" fill="#e2e8f0" font-size="15">词表扩大</text>  <text x="266" y="196" fill="#e2e8f0" font-size="15">长上下文 RoPE</text>  <text x="266" y="220" fill="#e2e8f0" font-size="15">GQA 标配</text>  <text x="266" y="244" fill="#e2e8f0" font-size="15">MoE 回潮</text>  <rect x="460" y="110" width="180" height="450" rx="12" fill="#0ea5e9" opacity="0.92" filter="url(#shadow)"/>  <text x="550" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">2025</text>  <text x="476" y="172" fill="#e2e8f0" font-size="15">多模态 token</text>  <text x="476" y="196" fill="#e2e8f0" font-size="15">混合注意力</text>  <text x="476" y="220" fill="#e2e8f0" font-size="15">MLA/稀疏</text>  <text x="476" y="244" fill="#e2e8f0" font-size="15">细粒度 MoE</text>  <rect x="670" y="110" width="180" height="450" rx="12" fill="#10b981" opacity="0.92" filter="url(#shadow)"/>  <text x="760" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">2026</text>  <text x="686" y="172" fill="#e2e8f0" font-size="15">组件可替换</text>  <text x="686" y="196" fill="#e2e8f0" font-size="15">服务约束反推</text>  <text x="686" y="220" fill="#e2e8f0" font-size="15">Agent 接口</text>  <text x="686" y="244" fill="#e2e8f0" font-size="15">可部署性优先</text>  <rect x="880" y="110" width="280" height="450" rx="12" fill="#f59e0b" opacity="0.92" filter="url(#shadow)"/>  <text x="1020" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">选型含义</text>  <text x="896" y="172" fill="#e2e8f0" font-size="15">看结构不看榜</text>  <text x="896" y="196" fill="#e2e8f0" font-size="15">KV/激活账</text>  <text x="896" y="220" fill="#e2e8f0" font-size="15">工具调用稳定</text>  <text x="896" y="244" fill="#e2e8f0" font-size="15">端侧/云分流</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">迭代主线是组件工程化，不是推翻 Transformer</text></svg>
