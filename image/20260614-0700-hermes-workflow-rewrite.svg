<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" rx="28" fill="#fff7ed"/><text x="600" y="58" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="34" font-weight="700" fill="#7c2d12">从“人找工具”到“Agent 组织工作流”</text><text x="600" y="98" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="18" fill="#9a3412">Hermes Desktop 把文件、预览、会话、技能和远程执行放进一个连续界面</text><g font-family="Arial,'Noto Sans SC',sans-serif"><rect x="70" y="160" width="220" height="105" rx="18" fill="#fed7aa" stroke="#fb923c" stroke-width="3"/><text x="180" y="204" text-anchor="middle" font-size="23" font-weight="700" fill="#7c2d12">输入任务</text><text x="180" y="236" text-anchor="middle" font-size="16" fill="#7c2d12">文本 / 文件 / 语音</text><rect x="360" y="160" width="220" height="105" rx="18" fill="#fde68a" stroke="#f59e0b" stroke-width="3"/><text x="470" y="204" text-anchor="middle" font-size="23" font-weight="700" fill="#78350f">理解上下文</text><text x="470" y="236" text-anchor="middle" font-size="16" fill="#78350f">记忆 + 会话搜索</text><rect x="650" y="160" width="220" height="105" rx="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="3"/><text x="760" y="204" text-anchor="middle" font-size="23" font-weight="700" fill="#14532d">选择技能</text><text x="760" y="236" text-anchor="middle" font-size="16" fill="#14532d">Skills Hub / MCP</text><rect x="940" y="160" width="220" height="105" rx="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="3"/><text x="1050" y="204" text-anchor="middle" font-size="23" font-weight="700" fill="#1e3a8a">执行与回看</text><text x="1050" y="236" text-anchor="middle" font-size="16" fill="#1e3a8a">工具流 + 侧边预览</text><path d="M292 212 H350" stroke="#9a3412" stroke-width="4" marker-end="url(#a)"/><path d="M582 212 H640" stroke="#9a3412" stroke-width="4" marker-end="url(#a)"/><path d="M872 212 H930" stroke="#9a3412" stroke-width="4" marker-end="url(#a)"/><rect x="170" y="375" width="860" height="190" rx="24" fill="#ffffff" stroke="#fb923c" stroke-width="3"/><text x="600" y="425" text-anchor="middle" font-size="26" font-weight="700" fill="#7c2d12">闭环学习层</text><text x="600" y="470" text-anchor="middle" font-size="19" fill="#7c2d12">执行结果 → 写入记忆 → 生成 / 改进技能 → 下次任务复用</text><text x="600" y="512" text-anchor="middle" font-size="19" fill="#7c2d12">桌面 GUI 降低使用门槛，远程网关保留自动化与算力边界</text><path d="M1050 265 C1050 620 160 620 180 270" stroke="#ea580c" stroke-width="5" fill="none" stroke-dasharray="10 8" marker-end="url(#a)"/></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#9a3412"/></marker></defs><text x="600" y="690" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="21" fill="#9a3412">判断标准：它是否能让一次复杂任务沉淀成下一次可复用的流程，而不只是完成一轮对话</text></svg>