<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720"><style>text{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;fill:#122033}.title{font-size:26px;font-weight:700}.h{font-size:18px;font-weight:700}.t{font-size:14px}.s{font-size:12px;fill:#506070}.box{fill:#f7fbff;stroke:#2b6cb0;stroke-width:2;rx:16}.green{fill:#f4fff7;stroke:#2f855a}.orange{fill:#fffaf0;stroke:#c05621}.purple{fill:#faf5ff;stroke:#805ad5}.line{stroke:#435466;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:6 5}</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#435466"/></marker></defs><rect width="1180" height="720" fill="#ffffff"/><text x="50" y="55" class="title">实时语音/视觉 Agent 的状态机：难点在“打断后仍可控”</text><rect x="70" y="140" width="190" height="90" class="box"/><text x="105" y="178" class="h">监听</text><text x="105" y="205" class="s">持续音频/视频流</text><rect x="340" y="120" width="210" height="120" class="box green"/><text x="375" y="160" class="h">理解上下文</text><text x="375" y="190" class="t">语义 + 语气 + 画面</text><text x="375" y="216" class="s">识别指代与意图</text><rect x="635" y="120" width="210" height="120" class="box purple"/><text x="670" y="160" class="h">规划动作</text><text x="670" y="190" class="t">回答 / 工具 / 追问</text><text x="670" y="216" class="s">风险与权限判断</text><rect x="925" y="140" width="190" height="90" class="box orange"/><text x="960" y="178" class="h">流式回应</text><text x="960" y="205" class="s">自然语音 + 文本</text><rect x="340" y="400" width="210" height="120" class="box orange"/><text x="375" y="440" class="h">用户打断</text><text x="375" y="470" class="t">barge-in / 修正意图</text><text x="375" y="496" class="s">旧输出必须停止或回滚</text><rect x="635" y="400" width="210" height="120" class="box"/><text x="670" y="440" class="h">工具回执</text><text x="670" y="470" class="t">成功 / 失败 / 等待</text><text x="670" y="496" class="s">让语音同步解释状态</text><path d="M260 185 L340 185" class="line"/><path d="M550 185 L635 185" class="line"/><path d="M845 185 L925 185" class="line"/><path d="M1015 230 C1015 330 910 388 845 435" class="line dash"/><path d="M635 460 L550 460" class="line"/><path d="M445 400 C360 330 245 300 165 230" class="line dash"/><path d="M740 400 C740 330 740 300 740 240" class="line dash"/><text x="85" y="625" class="s">判断标准：模型能否被打断，不只是体验问题；它决定了工具调用、事实修正、人工接管和审计日志能否在生产环境闭环。</text></svg>