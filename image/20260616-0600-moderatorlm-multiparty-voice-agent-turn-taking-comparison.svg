<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#f8fafc"/><text x="600" y="55" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#0f172a">三类语音 Agent 路线对比</text><g font-family="Arial"><rect x="70" y="120" width="300" height="500" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="220" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a8a">传统流水线</text><text x="220" y="225" text-anchor="middle" font-size="18" fill="#1e40af">ASR → 文本 Agent → TTS</text><text x="220" y="285" text-anchor="middle" font-size="18" fill="#334155">优点：可控、可审计、易接入</text><text x="220" y="335" text-anchor="middle" font-size="18" fill="#334155">短板：延迟与语气损失明显</text><text x="220" y="385" text-anchor="middle" font-size="18" fill="#334155">适合：审批、工单、存档场景</text><rect x="450" y="120" width="300" height="500" rx="24" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="600" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#4c1d95">端到端实时语音</text><text x="600" y="225" text-anchor="middle" font-size="18" fill="#5b21b6">音频输入 → 单模型回复</text><text x="600" y="285" text-anchor="middle" font-size="18" fill="#334155">优点：自然、低延迟、可打断</text><text x="600" y="335" text-anchor="middle" font-size="18" fill="#334155">短板：多人语境中容易抢话</text><text x="600" y="385" text-anchor="middle" font-size="18" fill="#334155">适合：一对一助手、陪练、热线</text><rect x="830" y="120" width="300" height="500" rx="24" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/><text x="980" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#14532d">角色化多人轮次</text><text x="980" y="225" text-anchor="middle" font-size="18" fill="#166534">音频 chunk + 角色 + 推理</text><text x="980" y="285" text-anchor="middle" font-size="18" fill="#334155">优点：知道何时沉默、何时介入</text><text x="980" y="335" text-anchor="middle" font-size="18" fill="#334155">短板：数据、评测、部署更复杂</text><text x="980" y="385" text-anchor="middle" font-size="18" fill="#334155">适合：会议、课堂、多人客服</text><text x="600" y="700" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">核心差异不是“语音更像真人”，而是“语音 Agent 是否懂得群体互动规则”。</text></g></svg>