<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7f8fb"/>
  <text x="640" y="58" text-anchor="middle" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="32" font-weight="700" fill="#1d2533">开源 VLM 的视觉 Token 预算系统</text>
  <text x="640" y="94" text-anchor="middle" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="18" fill="#596579">核心不再只是视觉编码器，而是像素、路由、压缩、上下文和部署的联合约束</text>
  <g font-family="Arial, 'Noto Sans CJK SC', sans-serif">
    <rect x="70" y="165" width="210" height="120" rx="18" fill="#ffffff" stroke="#2f6fef" stroke-width="3"/>
    <text x="175" y="207" text-anchor="middle" font-size="23" font-weight="700" fill="#1f3f79">输入像素</text>
    <text x="175" y="242" text-anchor="middle" font-size="17" fill="#566277">图片 / 视频 / 文档 / GUI</text>
    <text x="175" y="268" text-anchor="middle" font-size="16" fill="#566277">分辨率与帧数先决定成本</text>

    <rect x="365" y="155" width="230" height="140" rx="18" fill="#ffffff" stroke="#0f9f86" stroke-width="3"/>
    <text x="480" y="198" text-anchor="middle" font-size="23" font-weight="700" fill="#116050">动态视觉路由</text>
    <text x="480" y="233" text-anchor="middle" font-size="17" fill="#566277">按任务分配分辨率</text>
    <text x="480" y="259" text-anchor="middle" font-size="16" fill="#566277">低价值区域少给 token</text>
    <text x="480" y="281" text-anchor="middle" font-size="16" fill="#566277">细节区域保留高密度</text>

    <rect x="680" y="155" width="230" height="140" rx="18" fill="#ffffff" stroke="#d78b00" stroke-width="3"/>
    <text x="795" y="198" text-anchor="middle" font-size="23" font-weight="700" fill="#7c5200">视觉 Token 组织</text>
    <text x="795" y="233" text-anchor="middle" font-size="17" fill="#566277">patch / crop / frame</text>
    <text x="795" y="259" text-anchor="middle" font-size="16" fill="#566277">DeepStack / pooling / projector</text>
    <text x="795" y="281" text-anchor="middle" font-size="16" fill="#566277">决定进入 LLM 的证据粒度</text>

    <rect x="1000" y="165" width="210" height="120" rx="18" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
    <text x="1105" y="207" text-anchor="middle" font-size="23" font-weight="700" fill="#523597">语言模型上下文</text>
    <text x="1105" y="242" text-anchor="middle" font-size="17" fill="#566277">256K / 1M 不等于免费</text>
    <text x="1105" y="268" text-anchor="middle" font-size="16" fill="#566277">KV cache 与延迟仍需预算</text>

    <path d="M280 225 L365 225" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M595 225 L680 225" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M910 225 L1000 225" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="165" y="420" width="265" height="150" rx="18" fill="#eef6ff" stroke="#8ab4f8"/>
    <text x="298" y="462" text-anchor="middle" font-size="22" font-weight="700" fill="#1f3f79">Qwen3-VL 路线</text>
    <text x="298" y="500" text-anchor="middle" font-size="17" fill="#48556a">Pixel Control + DeepStack</text>
    <text x="298" y="528" text-anchor="middle" font-size="16" fill="#48556a">多层 ViT 特征融合</text>
    <text x="298" y="554" text-anchor="middle" font-size="16" fill="#48556a">长视频与 GUI 任务倾向保细节</text>

    <rect x="510" y="420" width="265" height="150" rx="18" fill="#eefcf8" stroke="#61c5ad"/>
    <text x="642" y="462" text-anchor="middle" font-size="22" font-weight="700" fill="#116050">InternVL3.5 路线</text>
    <text x="642" y="500" text-anchor="middle" font-size="17" fill="#48556a">ViR + DvD</text>
    <text x="642" y="528" text-anchor="middle" font-size="16" fill="#48556a">动态分辨率路由</text>
    <text x="642" y="554" text-anchor="middle" font-size="16" fill="#48556a">视觉与语言部署解耦</text>

    <rect x="855" y="420" width="265" height="150" rx="18" fill="#fff8e8" stroke="#e5aa39"/>
    <text x="988" y="462" text-anchor="middle" font-size="22" font-weight="700" fill="#7c5200">工程共同问题</text>
    <text x="988" y="500" text-anchor="middle" font-size="17" fill="#48556a">同样的 token 预算</text>
    <text x="988" y="528" text-anchor="middle" font-size="16" fill="#48556a">换取感知、推理、延迟</text>
    <text x="988" y="554" text-anchor="middle" font-size="16" fill="#48556a">三者之间的平衡</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker></defs>
</svg>
