<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#fbfbfd"/>
<text x="70" y="90" font-size="42" font-family="Arial, Helvetica, sans-serif" fill="#111">长程代理任务中，Opus 4.6 的执行链路</text>
<rect x="80" y="190" width="220" height="120" rx="18" fill="#eef3ff" stroke="#6b7cff" stroke-width="4"/>
<text x="122" y="260" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#222">接收目标</text>
<rect x="380" y="190" width="250" height="120" rx="18" fill="#eefaf4" stroke="#20a070" stroke-width="4"/>
<text x="438" y="245" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#222">自适应思考</text>
<text x="456" y="282" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#333">配合 effort 调节</text>
<rect x="720" y="190" width="250" height="120" rx="18" fill="#fff7e8" stroke="#ff9f1c" stroke-width="4"/>
<text x="795" y="245" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#222">工具调用</text>
<text x="772" y="282" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#333">检索、代码、文档、搜索</text>
<rect x="1060" y="190" width="250" height="120" rx="18" fill="#f8f0ff" stroke="#9b5de5" stroke-width="4"/>
<text x="1100" y="245" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#222">上下文压缩</text>
<text x="1105" y="282" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#333">避免长链路失焦</text>
<rect x="1360" y="190" width="170" height="120" rx="18" fill="#fff" stroke="#444" stroke-width="4"/>
<text x="1392" y="260" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#222">交付</text>
<path d="M300 250 H380" stroke="#555" stroke-width="6" marker-end="url(#a)"/>
<path d="M630 250 H720" stroke="#555" stroke-width="6" marker-end="url(#a)"/>
<path d="M970 250 H1060" stroke="#555" stroke-width="6" marker-end="url(#a)"/>
<path d="M1310 250 H1360" stroke="#555" stroke-width="6" marker-end="url(#a)"/>
<rect x="180" y="430" width="1240" height="280" rx="28" fill="#ffffff" stroke="#d6d6e7" stroke-width="4"/>
<text x="230" y="500" font-size="32" font-family="Arial, Helvetica, sans-serif" fill="#222">这条链路的关键变化</text>
<text x="230" y="560" font-size="26" font-family="Arial, Helvetica, sans-serif" fill="#222">1）模型不再只负责回答，而是负责在长任务里自行决定何时深想、何时行动。</text>
<text x="230" y="610" font-size="26" font-family="Arial, Helvetica, sans-serif" fill="#222">2）工具与搜索能力被产品化，减少“模型懂很多，但拿不到新信息”的断层。</text>
<text x="230" y="660" font-size="26" font-family="Arial, Helvetica, sans-serif" fill="#222">3）compaction 与 agent teams 让单次任务从“几轮对话”延长到“完整工作流”。</text>
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#555"/></marker></defs>
<text x="80" y="820" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#666">示意图：Anthropic 把模型升级、上下文管理、工具接入和多代理协作串成一条可执行链路。</text>
</svg>