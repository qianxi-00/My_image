<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#111827">何时必须把 KV 管理拆成外部层</text>
  <text x="600" y="80" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#4b5563">不是“所有服务都需要 LMCache”，而是当复用范围超过单引擎内存边界时</text>

  <!-- table header -->
  <rect x="60" y="120" width="1080" height="56" rx="8" fill="#1e293b"/>
  <text x="200" y="155" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#f8fafc">场景特征</text>
  <text x="500" y="155" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#f8fafc">只靠引擎内缓存</text>
  <text x="850" y="155" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#f8fafc">外部缓存层更合适</text>

  <!-- rows -->
  <rect x="60" y="176" width="1080" height="70" fill="#ffffff"/>
  <text x="200" y="218" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">单机单实例、短会话</text>
  <text x="500" y="218" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#15803d">通常够用</text>
  <text x="850" y="218" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#64748b">收益有限</text>

  <rect x="60" y="246" width="1080" height="70" fill="#f1f5f9"/>
  <text x="200" y="288" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">多轮 Agent / 长文档</text>
  <text x="500" y="288" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#b45309">显存很快打满</text>
  <text x="850" y="288" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#15803d">分层 offload 价值高</text>

  <rect x="60" y="316" width="1080" height="70" fill="#ffffff"/>
  <text x="200" y="358" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">DP/多进程 MoE 服务</text>
  <text x="500" y="358" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c">缓存碎片、难共享</text>
  <text x="850" y="358" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#15803d">统一 L1 池显著更好</text>

  <rect x="60" y="386" width="1080" height="70" fill="#f1f5f9"/>
  <text x="200" y="428" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">Prefill/Decode 分离</text>
  <text x="500" y="428" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c">跨机传输难统一</text>
  <text x="850" y="428" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#15803d">专门传输后端更稳</text>

  <rect x="60" y="456" width="1080" height="70" fill="#ffffff"/>
  <text x="200" y="498" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">多租户配额与审计</text>
  <text x="500" y="498" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#b45309">策略难集中落地</text>
  <text x="850" y="498" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#15803d">控制面与观测统一</text>

  <rect x="60" y="526" width="1080" height="70" fill="#f1f5f9"/>
  <text x="200" y="568" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">引擎滚动升级/重启</text>
  <text x="500" y="568" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#b91c1c">缓存随进程消失</text>
  <text x="850" y="568" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#15803d">命运解耦，缓存可留</text>

  <rect x="80" y="630" width="1040" height="80" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="665" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#312e81">决策原则：当“可复用范围”超过“单引擎内存边界”，就该拆出外部 KV 层</text>
  <text x="600" y="695" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#4338ca">否则你优化的只是单进程局部效率，不是系统级缓存资产</text>
</svg>