<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#f8fafc"/><text x="600" y="55" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#0f172a">多人实时语音 Agent 的产品落地流程</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker></defs><g font-family="Arial"><rect x="70" y="150" width="190" height="110" rx="18" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/><text x="165" y="195" text-anchor="middle" font-size="21" font-weight="700" fill="#134e4a">采集多人音频</text><text x="165" y="228" text-anchor="middle" font-size="16" fill="#115e59">说话人、重叠、停顿</text><rect x="320" y="150" width="190" height="110" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="415" y="195" text-anchor="middle" font-size="21" font-weight="700" fill="#1e3a8a">流式分块</text><text x="415" y="228" text-anchor="middle" font-size="16" fill="#1e40af">动态 chunk 与上下文</text><rect x="570" y="150" width="190" height="110" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="665" y="195" text-anchor="middle" font-size="21" font-weight="700" fill="#4c1d95">角色判断</text><text x="665" y="228" text-anchor="middle" font-size="16" fill="#5b21b6">主持人/旁听者/助教</text><rect x="820" y="150" width="190" height="110" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="915" y="195" text-anchor="middle" font-size="21" font-weight="700" fill="#78350f">轮次决策</text><text x="915" y="228" text-anchor="middle" font-size="16" fill="#92400e">发言、等待、补充、追问</text><path d="M260 205 L320 205" stroke="#0f766e" stroke-width="4" marker-end="url(#a)"/><path d="M510 205 L570 205" stroke="#0f766e" stroke-width="4" marker-end="url(#a)"/><path d="M760 205 L820 205" stroke="#0f766e" stroke-width="4" marker-end="url(#a)"/><rect x="190" y="390" width="820" height="170" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="600" y="435" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">产品验收指标</text><text x="600" y="480" text-anchor="middle" font-size="19" fill="#334155">少抢话：降低 false-positive interruption</text><text x="600" y="515" text-anchor="middle" font-size="19" fill="#334155">不漏接：降低被点名后的 reactive miss</text><text x="600" y="550" text-anchor="middle" font-size="19" fill="#334155">像角色：主持、协调、记录、助教的行为边界不同</text><text x="600" y="675" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">上线前不要只测延迟和音色，还要测“它是否懂得何时闭嘴”。</text></g></svg>