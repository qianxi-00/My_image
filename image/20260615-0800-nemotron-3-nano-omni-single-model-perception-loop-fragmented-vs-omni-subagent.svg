  <rect x="50" y="130" width="250" height="360" rx="24" fill="#E8F1FF" stroke="#A9B8D0" stroke-width="2"/><text x="72" y="184" font-size="30" font-weight="700" fill="#0F172A">传统链路</text><text x="76" y="210" font-size="25" fill="#263238">• 视觉模型</text><text x="76" y="262" font-size="25" fill="#263238">• ASR</text><text x="76" y="314" font-size="25" fill="#263238">• OCR</text><text x="76" y="366" font-size="25" fill="#263238">• LLM</text><text x="76" y="418" font-size="25" fill="#263238">• 规划器</text><path d="M315 305 L365 305" stroke="#3B82F6" stroke-width="6" marker-end="url(#arrow)"/><rect x="350" y="130" width="250" height="360" rx="24" fill="#EAFBF2" stroke="#A9B8D0" stroke-width="2"/><text x="372" y="184" font-size="30" font-weight="700" fill="#0F172A">主要问题</text><text x="376" y="210" font-size="25" fill="#263238">• 推理跳数多</text><text x="376" y="262" font-size="25" fill="#263238">• 上下文丢失</text><text x="376" y="314" font-size="25" fill="#263238">• 延迟放大</text><text x="376" y="366" font-size="25" fill="#263238">• 治理复杂</text><path d="M615 305 L665 305" stroke="#3B82F6" stroke-width="6" marker-end="url(#arrow)"/><rect x="650" y="130" width="250" height="360" rx="24" fill="#FFF4E5" stroke="#A9B8D0" stroke-width="2"/><text x="672" y="184" font-size="30" font-weight="700" fill="#0F172A">统一链路</text><text x="676" y="210" font-size="25" fill="#263238">• Nemotron 3 Nano Omni</text><text x="676" y="262" font-size="25" fill="#263238">• 感知+上下文子代理</text><text x="676" y="314" font-size="25" fill="#263238">• 执行模型</text><text x="676" y="366" font-size="25" fill="#263238">• 业务工具</text><path d="M915 305 L965 305" stroke="#3B82F6" stroke-width="6" marker-end="url(#arrow)"/><rect x="950" y="130" width="250" height="360" rx="24" fill="#F3EAFF" stroke="#A9B8D0" stroke-width="2"/><text x="972" y="184" font-size="30" font-weight="700" fill="#0F172A">收益</text><text x="976" y="210" font-size="25" fill="#263238">• 更少跳数</text><text x="976" y="262" font-size="25" fill="#263238">• 证据链稳定</text><text x="976" y="314" font-size="25" fill="#263238">• 吞吐更高</text><text x="976" y="366" font-size="25" fill="#263238">• 部署可控</text>
