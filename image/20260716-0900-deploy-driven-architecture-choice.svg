<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">部署驱动的架构选择：云端 / 边缘 / Agent</text>
  <rect x="50" y="120" width="350" height="430" rx="12" fill="#1d4ed8" opacity="0.92" filter="url(#shadow)"/>  <text x="225" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">云端服务</text>  <text x="66" y="182" fill="#e2e8f0" font-size="15">大 MoE + 强缓存</text>  <text x="66" y="206" fill="#e2e8f0" font-size="15">Prefill/Decode 分离</text>  <text x="66" y="230" fill="#e2e8f0" font-size="15">路由与多模型网关</text>  <rect x="430" y="120" width="350" height="430" rx="12" fill="#0f766e" opacity="0.92" filter="url(#shadow)"/>  <text x="605" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">边缘/端侧</text>  <text x="446" y="182" fill="#e2e8f0" font-size="15">Dense 小模型优先</text>  <text x="446" y="206" fill="#e2e8f0" font-size="15">量化与蒸馏</text>  <text x="446" y="230" fill="#e2e8f0" font-size="15">稳定工具格式</text>  <rect x="810" y="120" width="350" height="430" rx="12" fill="#b45309" opacity="0.92" filter="url(#shadow)"/>  <text x="985" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Agent 场景</text>  <text x="826" y="182" fill="#e2e8f0" font-size="15">结构化输出头</text>  <text x="826" y="206" fill="#e2e8f0" font-size="15">长周期记忆接口</text>  <text x="826" y="230" fill="#e2e8f0" font-size="15">可观测与审批</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">同一代组件，在不同部署场景下最优组合不同</text></svg>
