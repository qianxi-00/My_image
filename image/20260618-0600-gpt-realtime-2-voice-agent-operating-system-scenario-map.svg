<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><defs><style>.t{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#172033}.s{font-size:14px;fill:#344054}.h{font-size:26px;font-weight:700;fill:#101828}.box{fill:#f8fbff;stroke:#3b82f6;stroke-width:2;rx:16}.box2{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:16}.box3{fill:#f0fdf4;stroke:#22c55e;stroke-width:2;rx:16}.line{stroke:#475467;stroke-width:2;marker-end:url(#a)}.soft{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475467"/></marker></defs><rect width="1200" height="720" fill="#fff"/><text x="52" y="62" class="h">三类实时音频模型对应三种新交互形态</text><text x="52" y="96" class="s">GPT-Realtime-2、GPT-Realtime-Translate、GPT-Realtime-Whisper 的组合让语音从输入方式变成业务运行层。</text><rect x="75" y="155" width="300" height="365" class="box2"/><text x="130" y="205" class="t">Voice-to-Action</text><text x="110" y="252" class="s">用户自然说出目标</text><text x="110" y="288" class="s">模型理解约束并调用工具</text><text x="110" y="324" class="s">适合：客服、旅行、房产、政企服务</text><text x="110" y="380" class="s">核心指标：任务完成率、工具参数正确率、失败恢复</text><rect x="450" y="155" width="300" height="365" class="box"/><text x="510" y="205" class="t">Voice-to-Voice</text><text x="486" y="252" class="s">实时跨语言沟通</text><text x="486" y="288" class="s">边说边翻译、边显示转写</text><text x="486" y="324" class="s">适合：会议、教育、跨境客服、直播</text><text x="486" y="380" class="s">核心指标：语义保真、延迟、术语稳定、打断处理</text><rect x="825" y="155" width="300" height="365" class="box3"/><text x="878" y="205" class="t">Systems-to-Voice</text><text x="862" y="252" class="s">系统状态主动变成语音</text><text x="862" y="288" class="s">上下文驱动提醒与解释</text><text x="862" y="324" class="s">适合：导航、医疗、现场作业、运维</text><text x="862" y="380" class="s">核心指标：触发时机、信息密度、可打断性、隐私边界</text><line x1="375" y1="338" x2="450" y2="338" class="line"/><line x1="750" y1="338" x2="825" y2="338" class="line"/><rect x="240" y="585" width="720" height="58" fill="#f9fafb" stroke="#d0d5dd" rx="16"/><text x="286" y="621" class="s">下一阶段竞争点：谁能把这三种模式组合成稳定、可审计、可规模化的实时工作流。</text></svg>