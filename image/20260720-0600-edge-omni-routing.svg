<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760"><rect width="1400" height="760" fill="#fffaf0"/><style>text{font-family:"Noto Sans CJK SC",Arial,sans-serif;fill:#422006}.t{font-size:38px;font-weight:700}.h{font-size:27px;font-weight:700}.p{font-size:21px;fill:#713f12}.box{fill:#fff;stroke:#d97706;stroke-width:3;rx:20}.line{stroke:#a16207;stroke-width:5;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12z" fill="#a16207"/></marker></defs><text x="65" y="70" class="t">实时多模态请求的四级路由：按风险，而非按炫技分流</text><rect x="75" y="150" width="275" height="160" class="box"/><text x="110" y="205" class="h">L0：即时反射</text><text x="110" y="250" class="p">唤醒、静音、打断</text><rect x="395" y="150" width="275" height="160" class="box"/><text x="430" y="205" class="h">L1：本地理解</text><text x="430" y="250" class="p">转写、提示、摘要</text><rect x="715" y="150" width="275" height="160" class="box"/><text x="750" y="205" class="h">L2：云端推理</text><text x="750" y="250" class="p">跨模态、长上下文</text><rect x="1035" y="150" width="275" height="160" class="box"/><text x="1070" y="205" class="h">L3：受控执行</text><text x="1070" y="250" class="p">工具、支付、外发</text><path d="M350 230H385" class="line"/><path d="M670 230H705" class="line"/><path d="M990 230H1025" class="line"/><rect x="165" y="460" width="1070" height="150" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" rx="20"/><text x="275" y="520" class="h">关键控制：每一级都要能降级、记录依据、征得用户授权</text><text x="355" y="570" class="p">“实时”不是绕开确认，而是更早给出可撤销的反馈</text></svg>
