<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#0b1220"/>
  <text x="600" y="48" text-anchor="middle" fill="#e8eefc" font-size="28" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">在线 RL 与离线 RL：数据闭环的本质差异</text>
  <!-- Online box -->
  <rect x="40" y="90" width="540" height="520" rx="16" fill="#121a2b" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="130" text-anchor="middle" fill="#60a5fa" font-size="22" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">在线强化学习</text>
  <rect x="90" y="160" width="160" height="70" rx="10" fill="#1e3a5f"/>
  <text x="170" y="202" text-anchor="middle" fill="#dbeafe" font-size="18" font-family="Noto Sans SC, PingFang SC, sans-serif">策略 π</text>
  <rect x="340" y="160" width="160" height="70" rx="10" fill="#1e3a5f"/>
  <text x="420" y="202" text-anchor="middle" fill="#dbeafe" font-size="18" font-family="Noto Sans SC, PingFang SC, sans-serif">环境交互</text>
  <rect x="90" y="300" width="160" height="70" rx="10" fill="#1e3a5f"/>
  <text x="170" y="342" text-anchor="middle" fill="#dbeafe" font-size="18" font-family="Noto Sans SC, PingFang SC, sans-serif">新轨迹数据</text>
  <rect x="340" y="300" width="160" height="70" rx="10" fill="#1e3a5f"/>
  <text x="420" y="342" text-anchor="middle" fill="#dbeafe" font-size="18" font-family="Noto Sans SC, PingFang SC, sans-serif">策略更新</text>
  <path d="M250 195 H340" stroke="#93c5fd" stroke-width="2" marker-end="url(#a)"/>
  <path d="M420 230 V300" stroke="#93c5fd" stroke-width="2" marker-end="url(#a)"/>
  <path d="M340 335 H250" stroke="#93c5fd" stroke-width="2" marker-end="url(#a)"/>
  <path d="M170 300 V230" stroke="#93c5fd" stroke-width="2" marker-end="url(#a)"/>
  <text x="310" y="430" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Noto Sans SC, PingFang SC, sans-serif">数据分布随策略共同演化</text>
  <text x="310" y="470" text-anchor="middle" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">可探索 · 可纠错 · 可再采样</text>
  <text x="310" y="510" text-anchor="middle" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">风险：真实环境试错成本高</text>
  <!-- Offline box -->
  <rect x="620" y="90" width="540" height="520" rx="16" fill="#121a2b" stroke="#f59e0b" stroke-width="2"/>
  <text x="890" y="130" text-anchor="middle" fill="#fbbf24" font-size="22" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">离线强化学习</text>
  <rect x="690" y="180" width="400" height="80" rx="10" fill="#3f2d12"/>
  <text x="890" y="228" text-anchor="middle" fill="#fde68a" font-size="18" font-family="Noto Sans SC, PingFang SC, sans-serif">固定历史数据集 D</text>
  <rect x="690" y="310" width="180" height="70" rx="10" fill="#3f2d12"/>
  <text x="780" y="352" text-anchor="middle" fill="#fde68a" font-size="18" font-family="Noto Sans SC, PingFang SC, sans-serif">约束学习</text>
  <rect x="910" y="310" width="180" height="70" rx="10" fill="#3f2d12"/>
  <text x="1000" y="352" text-anchor="middle" fill="#fde68a" font-size="18" font-family="Noto Sans SC, PingFang SC, sans-serif">策略 π'</text>
  <path d="M890 260 V310" stroke="#fcd34d" stroke-width="2" marker-end="url(#b)"/>
  <path d="M870 345 H910" stroke="#fcd34d" stroke-width="2" marker-end="url(#b)"/>
  <text x="890" y="430" text-anchor="middle" fill="#fcd34d" font-size="16" font-family="Noto Sans SC, PingFang SC, sans-serif">禁止向环境索取新交互</text>
  <text x="890" y="470" text-anchor="middle" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">核心风险：分布偏移与外推误差</text>
  <text x="890" y="510" text-anchor="middle" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">关键：只在数据支持区域优化</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#93c5fd"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#fcd34d"/></marker>
  </defs>
</svg>
