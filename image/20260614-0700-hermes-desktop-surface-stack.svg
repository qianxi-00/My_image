<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".25"/></filter></defs><rect width="1200" height="760" rx="30" fill="url(#bg)"/><text x="600" y="64" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="34" font-weight="700" fill="#fff">Hermes Desktop：把常驻 Agent 从终端搬到工作表面</text><text x="600" y="104" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="18" fill="#cbd5e1">同一记忆、同一技能、同一网关，在桌面 / Web / 消息入口之间复用</text><g filter="url(#shadow)"><rect x="70" y="155" width="1060" height="470" rx="24" fill="#f8fafc"/><rect x="70" y="155" width="1060" height="48" rx="24" fill="#e2e8f0"/><circle cx="105" cy="179" r="8" fill="#ef4444"/><circle cx="132" cy="179" r="8" fill="#f59e0b"/><circle cx="159" cy="179" r="8" fill="#22c55e"/><rect x="100" y="232" width="250" height="348" rx="18" fill="#e0f2fe"/><text x="225" y="272" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="24" font-weight="700" fill="#075985">桌面入口</text><text x="225" y="315" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#0c4a6e">聊天窗口</text><text x="225" y="350" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#0c4a6e">拖拽文件</text><text x="225" y="385" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#0c4a6e">侧边预览</text><text x="225" y="420" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#0c4a6e">语音与设置</text><rect x="475" y="232" width="250" height="348" rx="18" fill="#ede9fe"/><text x="600" y="272" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="24" font-weight="700" fill="#5b21b6">Hermes Agent</text><text x="600" y="315" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#4c1d95">模型选择</text><text x="600" y="350" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#4c1d95">技能系统</text><text x="600" y="385" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#4c1d95">持久记忆</text><text x="600" y="420" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#4c1d95">工具调用</text><rect x="850" y="232" width="250" height="348" rx="18" fill="#dcfce7"/><text x="975" y="272" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="24" font-weight="700" fill="#166534">远程网关</text><text x="975" y="315" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#14532d">云端运行</text><text x="975" y="350" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#14532d">OAuth / 密码登录</text><text x="975" y="385" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#14532d">消息平台</text><text x="975" y="420" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="17" fill="#14532d">定时自动化</text><path d="M360 405 C405 405 420 405 465 405" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)"/><path d="M735 405 C780 405 795 405 840 405" stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)"/></g><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><text x="600" y="680" text-anchor="middle" font-family="Arial,'Noto Sans SC',sans-serif" font-size="22" fill="#e2e8f0">关键变化：GUI 不是皮肤，而是让个人 Agent 进入日常工作流的“表面层”</text></svg>