<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#fbfbf8"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">三种实时传输路径的工程取舍</text>
  <g font-family="Arial, sans-serif" font-size="24" fill="#111827">
    <rect x="70" y="130" width="300" height="430" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="110" y="185" font-size="30" font-weight="700" fill="#075985">WebRTC</text>
    <text x="105" y="250">浏览器/移动端直连</text>
    <text x="105" y="305">网络抖动适应强</text>
    <text x="105" y="360">音视频体验优先</text>
    <text x="105" y="415">适合语音与视频助手</text>
    <rect x="450" y="130" width="300" height="430" rx="16" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
    <text x="490" y="185" font-size="30" font-weight="700" fill="#365314">WebSocket</text>
    <text x="485" y="250">服务端媒体管线</text>
    <text x="485" y="305">事件流控制清晰</text>
    <text x="485" y="360">便于后端编排</text>
    <text x="485" y="415">适合转写/翻译/批处理入口</text>
    <rect x="830" y="130" width="300" height="430" rx="16" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
    <text x="870" y="185" font-size="30" font-weight="700" fill="#701a75">SIP / 房间</text>
    <text x="865" y="250">电话与会议接入</text>
    <text x="865" y="305">多人实时场景</text>
    <text x="865" y="360">需要调度与观测</text>
    <text x="865" y="415">适合客服/医疗/协作</text>
  </g>
  <text x="95" y="625" font-family="Arial, sans-serif" font-size="24" fill="#374151">结论：实时 AI 的竞争不只在模型，也在端、网、会话和运维链路。</text>
</svg>
