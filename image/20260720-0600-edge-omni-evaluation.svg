<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760"><rect width="1400" height="760" fill="#f0fdf4"/><style>text{font-family:"Noto Sans CJK SC",Arial,sans-serif;fill:#14532d}.t{font-size:38px;font-weight:700}.h{font-size:28px;font-weight:700}.p{font-size:21px;fill:#166534}.box{fill:#fff;stroke:#16a34a;stroke-width:3;rx:20}</style><text x="65" y="70" class="t">端侧 Omni 助手的上线验收：从“回答对不对”扩展为“系统稳不稳”</text><rect x="90" y="150" width="360" height="180" class="box"/><text x="130" y="210" class="h">体验指标</text><text x="130" y="255" class="p">首反馈、可打断性、轮次完成</text><rect x="520" y="150" width="360" height="180" class="box"/><text x="560" y="210" class="h">系统指标</text><text x="560" y="255" class="p">端侧命中率、耗电、网络退化</text><rect x="950" y="150" width="360" height="180" class="box"/><text x="990" y="210" class="h">治理指标</text><text x="990" y="255" class="p">权限、留存、升级、可追溯</text><rect x="275" y="470" width="850" height="145" fill="#dcfce7" stroke="#22c55e" stroke-width="3" rx="20"/><text x="365" y="530" class="h">只有三组指标同时合格，实时交互才有资格进入真实场景</text><text x="435" y="575" class="p">单项模型分数不能替代完整的产品验收</text></svg>
