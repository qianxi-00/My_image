<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="1400" height="760" fill="#f6f8fc"/><style>text{font-family:"Noto Sans CJK SC",Arial,sans-serif;fill:#172554}.t{font-size:38px;font-weight:700}.h{font-size:26px;font-weight:700}.p{font-size:21px;fill:#334155}.b{fill:#fff;stroke:#2563eb;stroke-width:3;rx:20}.a{stroke:#64748b;stroke-width:5;marker-end:url(#m)}</style><defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12z" fill="#64748b"/></marker></defs><text x="70" y="70" class="t">端侧 Omni 助手的预算，不是只有“模型参数”</text><rect x="70" y="160" width="260" height="210" class="b"/><text x="105" y="215" class="h">感知入口</text><text x="105" y="260" class="p">麦克风 / 相机</text><text x="105" y="300" class="p">时间戳与权限</text><rect x="570" y="160" width="260" height="210" class="b"/><text x="620" y="215" class="h">端侧快路径</text><text x="620" y="260" class="p">VAD / 预处理</text><text x="620" y="300" class="p">小模型与缓存</text><rect x="1070" y="160" width="260" height="210" class="b"/><text x="1110" y="215" class="h">云端深路径</text><text x="1110" y="260" class="p">复杂推理 / 工具</text><text x="1110" y="300" class="p">可审计结果</text><path d="M330 265H560" class="a"/><path d="M830 265H1060" class="a"/><rect x="280" y="500" width="840" height="135" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" rx="20"/><text x="350" y="555" class="h">设计目标：首个可用反馈留在本地；不可逆动作与高风险判断升级到云端</text><text x="470" y="600" class="p">延迟、隐私、耗电、可靠性必须共同预算</text></svg>
