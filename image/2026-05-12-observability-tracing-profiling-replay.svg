<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="52%" stop-color="#10233b"/>
      <stop offset="100%" stop-color="#16233f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <circle cx="1140" cy="120" r="220" fill="#1d4ed8" opacity="0.12"/>
  <circle cx="210" cy="700" r="240" fill="#059669" opacity="0.10"/>
  <text x="80" y="88" fill="#f8fafc" font-family="Inter, Noto Sans SC, Arial" font-size="40" font-weight="800">LLM 系统可观测性闭环</text>
  <text x="82" y="128" fill="#bfdbfe" font-family="Inter, Noto Sans SC, Arial" font-size="20">Tracing · Profiling · Replay：从黑盒响应到可调试系统</text>

  <g filter="url(#shadow)">
    <rect x="80" y="220" width="230" height="120" rx="22" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="115" y="270" fill="#f8fafc" font-family="Noto Sans SC, Arial" font-size="26" font-weight="700">请求入口</text>
    <text x="115" y="308" fill="#bfdbfe" font-family="Noto Sans SC, Arial" font-size="18">用户 / Agent / API</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="400" y="190" width="260" height="180" rx="24" fill="#0f766e" stroke="#5eead4" stroke-width="2"/>
    <text x="435" y="240" fill="#ecfeff" font-family="Noto Sans SC, Arial" font-size="26" font-weight="700">Trace Span</text>
    <text x="435" y="282" fill="#ccfbf1" font-family="Noto Sans SC, Arial" font-size="18">prompt / tool / RAG</text>
    <text x="435" y="314" fill="#ccfbf1" font-family="Noto Sans SC, Arial" font-size="18">token / cost / latency</text>
    <text x="435" y="346" fill="#ccfbf1" font-family="Noto Sans SC, Arial" font-size="18">因果链路</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="760" y="190" width="260" height="180" rx="24" fill="#7c2d12" stroke="#fb923c" stroke-width="2"/>
    <text x="795" y="240" fill="#fff7ed" font-family="Noto Sans SC, Arial" font-size="26" font-weight="700">Profile</text>
    <text x="795" y="282" fill="#fed7aa" font-family="Noto Sans SC, Arial" font-size="18">TTFT / TPOT</text>
    <text x="795" y="314" fill="#fed7aa" font-family="Noto Sans SC, Arial" font-size="18">队列 / KV / GPU</text>
    <text x="795" y="346" fill="#fed7aa" font-family="Noto Sans SC, Arial" font-size="18">瓶颈定位</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1110" y="220" width="210" height="120" rx="22" fill="#312e81" stroke="#a78bfa" stroke-width="2"/>
    <text x="1145" y="270" fill="#faf5ff" font-family="Noto Sans SC, Arial" font-size="26" font-weight="700">模型服务</text>
    <text x="1145" y="308" fill="#ddd6fe" font-family="Noto Sans SC, Arial" font-size="18">vLLM / SGLang / API</text>
  </g>

  <path d="M310 280 C350 280 360 280 400 280" fill="none" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M660 280 C710 280 710 280 760 280" fill="none" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1020 280 C1060 280 1070 280 1110 280" fill="none" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="185" y="520" width="300" height="150" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
    <text x="225" y="568" fill="#e0f2fe" font-family="Noto Sans SC, Arial" font-size="25" font-weight="700">Replay 数据集</text>
    <text x="225" y="610" fill="#bae6fd" font-family="Noto Sans SC, Arial" font-size="18">输入快照 · 环境版本</text>
    <text x="225" y="642" fill="#bae6fd" font-family="Noto Sans SC, Arial" font-size="18">路由决策 · 输出对比</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="520" width="300" height="150" rx="24" fill="#111827" stroke="#34d399" stroke-width="2"/>
    <text x="600" y="568" fill="#ecfdf5" font-family="Noto Sans SC, Arial" font-size="25" font-weight="700">评测与告警</text>
    <text x="600" y="610" fill="#bbf7d0" font-family="Noto Sans SC, Arial" font-size="18">质量漂移 · 成本异常</text>
    <text x="600" y="642" fill="#bbf7d0" font-family="Noto Sans SC, Arial" font-size="18">延迟退化 · 工具失败</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="935" y="520" width="300" height="150" rx="24" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
    <text x="975" y="568" fill="#fffbeb" font-family="Noto Sans SC, Arial" font-size="25" font-weight="700">架构反馈</text>
    <text x="975" y="610" fill="#fde68a" font-family="Noto Sans SC, Arial" font-size="18">调度策略 · 缓存策略</text>
    <text x="975" y="642" fill="#fde68a" font-family="Noto Sans SC, Arial" font-size="18">模型路由 · 容量规划</text>
  </g>
  <path d="M1215 340 C1215 445 1100 500 1085 520" fill="none" stroke="#c4b5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M935 595 C905 595 890 595 860 595" fill="none" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M560 595 C525 595 520 595 485 595" fill="none" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M335 520 C340 445 455 410 520 370" fill="none" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="80" y="760" fill="#94a3b8" font-family="Noto Sans SC, Arial" font-size="18">核心判断：没有 tracing，系统只能看见结果；没有 profiling，系统不知道慢在哪里；没有 replay，系统无法把一次事故转化为可验证改进。</text>
</svg>
