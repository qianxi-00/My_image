<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><style>
  .bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:18}.title{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:28px;font-weight:700;fill:#0f172a}.label{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;font-weight:700;fill:#0f172a}.text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}.small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#475569}.arrow{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}.muted{fill:#e2e8f0}.blue{fill:#dbeafe;stroke:#60a5fa}.green{fill:#dcfce7;stroke:#4ade80}.orange{fill:#ffedd5;stroke:#fb923c}.purple{fill:#ede9fe;stroke:#a78bfa}.red{fill:#fee2e2;stroke:#f87171}
</style><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker></defs><rect class="bg" width="1200" height="720"/><text x="60" y="58" class="title">开源模型关键组件路线对比</text><rect x="80" y="130" width="300" height="420" class="panel blue"/><text x="115" y="175" class="label">注意力效率路线</text><text x="115" y="220" class="text">代表：DeepSeek DSA</text><text x="115" y="260" class="text">目标：长上下文成本下降</text><text x="115" y="300" class="text">关键问题：少看但看准</text><text x="115" y="340" class="text">适合：长文档、代码库、检索增强</text><rect x="450" y="130" width="300" height="420" class="panel green"/><text x="485" y="175" class="label">专家路由路线</text><text x="485" y="220" class="text">代表：Qwen / DeepSeek MoE</text><text x="485" y="260" class="text">目标：容量与激活成本分离</text><text x="485" y="300" class="text">关键问题：router 与专家均衡</text><text x="485" y="340" class="text">适合：高容量低成本推理</text><rect x="820" y="130" width="300" height="420" class="panel orange"/><text x="855" y="175" class="label">部署封装路线</text><text x="855" y="220" class="text">代表：gpt-oss</text><text x="855" y="260" class="text">目标：模型作为系统组件交付</text><text x="855" y="300" class="text">关键问题：量化、协议、后端适配</text><text x="855" y="340" class="text">适合：企业与开发者生产工作流</text><path d="M380 340 H450" class="arrow"/><path d="M750 340 H820" class="arrow"/><rect x="170" y="610" width="860" height="70" class="panel"/><text x="220" y="651" class="label">趋势判断：</text><text x="350" y="651" class="text">下一阶段胜出者会把注意力效率、专家路由和部署封装合成一套可运维的 AI 基础设施。</text></svg>