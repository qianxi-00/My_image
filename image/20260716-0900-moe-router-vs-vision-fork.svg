<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">两条主分叉：稀疏路由 vs 视觉输入契约</text>
  <rect x="60" y="120" width="520" height="420" rx="12" fill="#1d4ed8" opacity="0.92" filter="url(#shadow)"/>  <text x="320" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">MoE / 稀疏路由分叉</text>  <text x="76" y="182" fill="#e2e8f0" font-size="15">参数规模与激活解耦</text>  <text x="76" y="206" fill="#e2e8f0" font-size="15">路由稳定性决定上限</text>  <text x="76" y="230" fill="#e2e8f0" font-size="15">服务拓扑复杂度上升</text>  <text x="76" y="254" fill="#e2e8f0" font-size="15">适合语言/推理主模型</text>  <rect x="660" y="120" width="500" height="420" rx="12" fill="#0f766e" opacity="0.92" filter="url(#shadow)"/>  <text x="910" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">视觉输入契约分叉</text>  <text x="676" y="182" fill="#e2e8f0" font-size="15">encoder-free vs modular</text>  <text x="676" y="206" fill="#e2e8f0" font-size="15">token 预算决定成本</text>  <text x="676" y="230" fill="#e2e8f0" font-size="15">projector 成为瓶颈</text>  <text x="676" y="254" fill="#e2e8f0" font-size="15">适合多模态/Agent 入口</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">选型先问：你优化的是计算稀疏，还是感知接口</text></svg>
