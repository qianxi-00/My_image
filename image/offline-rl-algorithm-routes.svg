<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0b1220"/>
  <text x="600" y="48" text-anchor="middle" fill="#e8eefc" font-size="28" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">离线强化学习四条主流算法路线</text>
  <text x="600" y="88" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="Noto Sans SC, PingFang SC, sans-serif">共同目标：抑制 OOD 动作的高估，在数据支持下安全改进策略</text>
  <!-- 4 cards -->
  <rect x="40" y="130" width="260" height="500" rx="14" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="170" y="175" text-anchor="middle" fill="#38bdf8" font-size="20" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">策略约束</text>
  <text x="170" y="220" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Noto Sans SC, PingFang SC, sans-serif">BCQ / BEAR / TD3+BC</text>
  <text x="60" y="270" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">把新策略锁在</text>
  <text x="60" y="300" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">行为策略附近</text>
  <text x="60" y="350" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 显式动作过滤</text>
  <text x="60" y="380" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 行为克隆正则</text>
  <text x="60" y="410" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 支持度估计</text>
  <text x="60" y="470" fill="#7dd3fc" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">优点：直观稳妥</text>
  <text x="60" y="500" fill="#fca5a5" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">代价：改进空间受限</text>

  <rect x="330" y="130" width="260" height="500" rx="14" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="460" y="175" text-anchor="middle" fill="#a78bfa" font-size="20" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">值函数正则</text>
  <text x="460" y="220" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Noto Sans SC, PingFang SC, sans-serif">CQL / REM</text>
  <text x="350" y="270" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">惩罚未见动作的</text>
  <text x="350" y="300" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">Q 值高估</text>
  <text x="350" y="350" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 保守下界学习</text>
  <text x="350" y="380" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 数据集内加权</text>
  <text x="350" y="410" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 外推误差抑制</text>
  <text x="350" y="470" fill="#c4b5fd" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">优点：不硬锁策略</text>
  <text x="350" y="500" fill="#fca5a5" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">代价：偏保守/调参难</text>

  <rect x="620" y="130" width="260" height="500" rx="14" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="750" y="175" text-anchor="middle" fill="#34d399" font-size="20" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">隐式 Q 学习</text>
  <text x="750" y="220" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Noto Sans SC, PingFang SC, sans-serif">IQL / AWR 系</text>
  <text x="640" y="270" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">不查询 OOD 动作</text>
  <text x="640" y="300" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">只提升 in-support</text>
  <text x="640" y="350" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· expectile 回归</text>
  <text x="640" y="380" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 优势加权策略</text>
  <text x="640" y="410" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 在线微调友好</text>
  <text x="640" y="470" fill="#6ee7b7" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">优点：工程稳健</text>
  <text x="640" y="500" fill="#fca5a5" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">代价：强依赖数据质量</text>

  <rect x="910" y="130" width="250" height="500" rx="14" fill="#111827" stroke="#f472b6" stroke-width="2"/>
  <text x="1035" y="175" text-anchor="middle" fill="#f472b6" font-size="20" font-family="Noto Sans SC, PingFang SC, sans-serif" font-weight="700">序列建模</text>
  <text x="1035" y="220" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Noto Sans SC, PingFang SC, sans-serif">Decision Transformer</text>
  <text x="930" y="270" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">把 RL 重写为</text>
  <text x="930" y="300" fill="#cbd5e1" font-size="15" font-family="Noto Sans SC, PingFang SC, sans-serif">条件序列生成</text>
  <text x="930" y="350" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 回报条件生成</text>
  <text x="930" y="380" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· Transformer 骨干</text>
  <text x="930" y="410" fill="#94a3b8" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">· 与 LLM 训练同构</text>
  <text x="930" y="470" fill="#f9a8d4" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">优点：扩展性好</text>
  <text x="930" y="500" fill="#fca5a5" font-size="14" font-family="Noto Sans SC, PingFang SC, sans-serif">代价：优化语义变弱</text>
</svg>
