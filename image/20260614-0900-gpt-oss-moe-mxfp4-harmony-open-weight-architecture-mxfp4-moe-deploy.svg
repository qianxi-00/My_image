<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><style>
  .bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:18}.title{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:28px;font-weight:700;fill:#0f172a}.label{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;font-weight:700;fill:#0f172a}.text{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:15px;fill:#334155}.small{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:13px;fill:#475569}.arrow{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}.muted{fill:#e2e8f0}.blue{fill:#dbeafe;stroke:#60a5fa}.green{fill:#dcfce7;stroke:#4ade80}.orange{fill:#ffedd5;stroke:#fb923c}.purple{fill:#ede9fe;stroke:#a78bfa}.red{fill:#fee2e2;stroke:#f87171}
</style><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker></defs><rect class="bg" width="1200" height="680"/><text x="60" y="58" class="title">MXFP4 + MoE：量化从事后压缩变成发布形态</text><rect x="70" y="120" width="270" height="360" class="panel blue"/><text x="105" y="165" class="label">传统开源流程</text><text x="105" y="210" class="text">1. 发布 BF16 / FP16 权重</text><text x="105" y="250" class="text">2. 社区制作量化版本</text><text x="105" y="290" class="text">3. 不同后端格式碎片化</text><text x="105" y="330" class="text">4. 官方评测与实际运行不一致</text><rect x="465" y="120" width="270" height="360" class="panel green"/><text x="500" y="165" class="label">gpt-oss 路径</text><text x="500" y="210" class="text">1. MoE 权重原生 MXFP4</text><text x="500" y="250" class="text">2. 官方评测贴近部署形态</text><text x="500" y="290" class="text">3. 激活参数控制计算成本</text><text x="500" y="330" class="text">4. 单卡 / 本地边界明确</text><rect x="860" y="120" width="270" height="360" class="panel orange"/><text x="895" y="165" class="label">系统结果</text><text x="895" y="210" class="text">显存占用下降</text><text x="895" y="250" class="text">推理框架需要适配 kernel</text><text x="895" y="290" class="text">企业部署可预期性提高</text><text x="895" y="330" class="text">模型发布质量门槛升高</text><path d="M340 300 H465" class="arrow"/><path d="M735 300 H860" class="arrow"/><rect x="190" y="545" width="820" height="70" class="panel"/><text x="235" y="586" class="label">关键变化：</text><text x="365" y="586" class="text">量化不再只是“瘦身包”，而是模型架构、评测和推理生态共同设计的一部分。</text></svg>