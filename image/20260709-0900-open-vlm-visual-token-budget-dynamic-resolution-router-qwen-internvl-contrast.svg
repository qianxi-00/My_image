<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fbfbfd"/>
  <text x="640" y="55" text-anchor="middle" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="31" font-weight="700" fill="#202938">Qwen3-VL 与 InternVL3.5 的视觉预算路线对比</text>
  <text x="640" y="90" text-anchor="middle" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="18" fill="#667085">一个偏“多层特征融合与长上下文承接”，一个偏“动态分辨率路由与部署解耦”</text>
  <g font-family="Arial, 'Noto Sans CJK SC', sans-serif">
    <rect x="70" y="140" width="535" height="500" rx="20" fill="#eef5ff" stroke="#2f6fef" stroke-width="3"/>
    <text x="338" y="185" text-anchor="middle" font-size="28" font-weight="700" fill="#1f3f79">Qwen3-VL</text>
    <text x="338" y="220" text-anchor="middle" font-size="18" fill="#48556a">把视觉细节更充分地交给上下文窗口与特征融合</text>
    <rect x="120" y="270" width="435" height="75" rx="14" fill="#ffffff"/>
    <text x="338" y="301" text-anchor="middle" font-size="20" font-weight="700" fill="#1f3f79">Pixel Control</text>
    <text x="338" y="329" text-anchor="middle" font-size="16" fill="#566277">图片和视频分别控制像素预算，避免所有输入一刀切</text>
    <rect x="120" y="370" width="435" height="75" rx="14" fill="#ffffff"/>
    <text x="338" y="401" text-anchor="middle" font-size="20" font-weight="700" fill="#1f3f79">DeepStack</text>
    <text x="338" y="429" text-anchor="middle" font-size="16" fill="#566277">融合多层 ViT 特征，提升细粒度对齐与 OCR / GUI 理解</text>
    <rect x="120" y="470" width="435" height="75" rx="14" fill="#ffffff"/>
    <text x="338" y="501" text-anchor="middle" font-size="20" font-weight="700" fill="#1f3f79">长上下文承接</text>
    <text x="338" y="529" text-anchor="middle" font-size="16" fill="#566277">256K 原生、可扩展到 1M，用上下文吸收视频和文档证据</text>
    <text x="338" y="590" text-anchor="middle" font-size="18" font-weight="700" fill="#1f3f79">适合：长视频、复杂文档、GUI Agent、空间理解</text>

    <rect x="675" y="140" width="535" height="500" rx="20" fill="#eefcf8" stroke="#0f9f86" stroke-width="3"/>
    <text x="942" y="185" text-anchor="middle" font-size="28" font-weight="700" fill="#116050">InternVL3.5</text>
    <text x="942" y="220" text-anchor="middle" font-size="18" fill="#48556a">把视觉成本更明确地交给路由器和部署拓扑管理</text>
    <rect x="725" y="270" width="435" height="75" rx="14" fill="#ffffff"/>
    <text x="942" y="301" text-anchor="middle" font-size="20" font-weight="700" fill="#116050">ViR</text>
    <text x="942" y="329" text-anchor="middle" font-size="16" fill="#566277">Visual Resolution Router 动态调分辨率，减少无效视觉 token</text>
    <rect x="725" y="370" width="435" height="75" rx="14" fill="#ffffff"/>
    <text x="942" y="401" text-anchor="middle" font-size="20" font-weight="700" fill="#116050">DvD</text>
    <text x="942" y="429" text-anchor="middle" font-size="16" fill="#566277">Decoupled Vision-Language Deployment 分开视觉和语言负载</text>
    <rect x="725" y="470" width="435" height="75" rx="14" fill="#ffffff"/>
    <text x="942" y="501" text-anchor="middle" font-size="20" font-weight="700" fill="#116050">Cascade RL</text>
    <text x="942" y="529" text-anchor="middle" font-size="16" fill="#566277">离线到在线的两阶段强化学习，补足多模态推理与 Agent 能力</text>
    <text x="942" y="590" text-anchor="middle" font-size="18" font-weight="700" fill="#116050">适合：高吞吐服务、推理效率、Agentic 与具身任务</text>
  </g>
</svg>
