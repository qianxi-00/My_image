<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">Token Budget Router：多模态入口的控制层</text>
  <rect x="40" y="110" width="280" height="430" rx="12" fill="#2563eb" opacity="0.92" filter="url(#shadow)"/>  <text x="180" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">来源分类</text>  <text x="56" y="172" fill="#e2e8f0" font-size="15">文档图</text>  <text x="56" y="196" fill="#e2e8f0" font-size="15">自然图</text>  <text x="56" y="220" fill="#e2e8f0" font-size="15">视频帧</text>  <text x="56" y="244" fill="#e2e8f0" font-size="15">GUI 截图</text>  <rect x="350" y="110" width="280" height="430" rx="12" fill="#059669" opacity="0.92" filter="url(#shadow)"/>  <text x="490" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">预算分配</text>  <text x="366" y="172" fill="#e2e8f0" font-size="15">高细节配额</text>  <text x="366" y="196" fill="#e2e8f0" font-size="15">时序采样率</text>  <text x="366" y="220" fill="#e2e8f0" font-size="15">背景降采样</text>  <rect x="660" y="110" width="280" height="430" rx="12" fill="#d97706" opacity="0.92" filter="url(#shadow)"/>  <text x="800" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">路由决策</text>  <text x="676" y="172" fill="#e2e8f0" font-size="15">进 encoder</text>  <text x="676" y="196" fill="#e2e8f0" font-size="15">进 projector</text>  <text x="676" y="220" fill="#e2e8f0" font-size="15">直接丢弃</text>  <rect x="970" y="110" width="190" height="430" rx="12" fill="#7c3aed" opacity="0.92" filter="url(#shadow)"/>  <text x="1065" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">输出</text>  <text x="986" y="172" fill="#e2e8f0" font-size="15">可控 token</text>  <text x="986" y="196" fill="#e2e8f0" font-size="15">稳定延迟</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">没有预算路由，长视频/高清文档会先打爆上下文</text></svg>
