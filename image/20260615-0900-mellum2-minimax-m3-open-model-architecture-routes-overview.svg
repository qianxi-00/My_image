<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><style>.title{font:700 28px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}.h{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}.t{font:15px Arial,"Noto Sans CJK SC",sans-serif;fill:#374151}.small{font:13px Arial,"Noto Sans CJK SC",sans-serif;fill:#4b5563}.box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:16}.blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#ecfdf5;stroke:#059669}.amber{fill:#fffbeb;stroke:#d97706}.purple{fill:#f5f3ff;stroke:#7c3aed}.arrow{stroke:#334155;stroke-width:2.4;marker-end:url(#a);fill:none}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs><rect width="1280" height="720" fill="#f8fafc"/><text x="50" y="58" class="title">2026 开源/开放权重模型的三条架构路线</text><rect x="60" y="120" width="340" height="460" class="box green"/><text x="90" y="165" class="h">路线 A：Focal MoE</text><text x="90" y="205" class="t">代表：JetBrains Mellum2</text><text x="90" y="245" class="t">12B 总参数 / 2.5B active</text><text x="90" y="285" class="t">专注代码、路由、Q&A、子智能体</text><text x="90" y="325" class="t">目标：低延迟、高吞吐、私有部署</text><text x="90" y="365" class="small">关键取舍：放弃多模态与万能叙事，换取系统组件效率</text><rect x="470" y="120" width="340" height="460" class="box blue"/><text x="500" y="165" class="h">路线 B：Frontier bundle</text><text x="500" y="205" class="t">代表：MiniMax M3（页面宣称/待权重）</text><text x="500" y="245" class="t">1M context / MSA 稀疏注意力</text><text x="500" y="285" class="t">Coding + Agentic + Native Multimodal</text><text x="500" y="325" class="t">目标：把闭源旗舰能力带入开放生态</text><text x="500" y="365" class="small">关键取舍：系统能力强，但发布透明度与部署门槛仍待验证</text><rect x="880" y="120" width="340" height="460" class="box amber"/><text x="910" y="165" class="h">路线 C：通用稀疏基座</text><text x="910" y="205" class="t">代表：Qwen3 / DeepSeek / Llama 4 等</text><text x="910" y="245" class="t">MoE + GQA/MLA/稀疏注意力</text><text x="910" y="285" class="t">兼顾通用能力、长上下文、成本</text><text x="910" y="325" class="t">目标：成为可迁移、可蒸馏的基础层</text><text x="910" y="365" class="small">关键取舍：强生态，但产品侧仍要二次组件化</text><path d="M400 350 C430 330 440 330 470 350" class="arrow"/><path d="M810 350 C840 330 850 330 880 350" class="arrow"/><text x="240" y="645" class="small">结论：争夺点从“参数更大”转向“哪个组件该大、哪个组件该快、哪个组件该开放”。</text></svg>