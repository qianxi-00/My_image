<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">开源 VLM 视觉编码器三路线：SigLIP 2 / DINOv2 / Hybrid</text>
  <rect x="40" y="110" width="360" height="430" rx="12" fill="#2563eb" opacity="0.92" filter="url(#shadow)"/>  <text x="220" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">SigLIP 2</text>  <text x="56" y="172" fill="#e2e8f0" font-size="15">pairwise 对比损失</text>  <text x="56" y="196" fill="#e2e8f0" font-size="15">语义对齐强</text>  <text x="56" y="220" fill="#e2e8f0" font-size="15">图文检索友好</text>  <text x="56" y="244" fill="#e2e8f0" font-size="15">细粒度结构一般</text>  <rect x="420" y="110" width="360" height="430" rx="12" fill="#059669" opacity="0.92" filter="url(#shadow)"/>  <text x="600" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">DINOv2</text>  <text x="436" y="172" fill="#e2e8f0" font-size="15">自监督结构表征</text>  <text x="436" y="196" fill="#e2e8f0" font-size="15">空间细节好</text>  <text x="436" y="220" fill="#e2e8f0" font-size="15">文档/UI更稳</text>  <text x="436" y="244" fill="#e2e8f0" font-size="15">语义对齐需二次对齐</text>  <rect x="800" y="110" width="360" height="430" rx="12" fill="#d97706" opacity="0.92" filter="url(#shadow)"/>  <text x="980" y="142" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Hybrid</text>  <text x="816" y="172" fill="#e2e8f0" font-size="15">语义+结构双塔</text>  <text x="816" y="196" fill="#e2e8f0" font-size="15">可按任务路由</text>  <text x="816" y="220" fill="#e2e8f0" font-size="15">token 预算更复杂</text>  <text x="816" y="244" fill="#e2e8f0" font-size="15">工程集成成本最高</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">编码器选择 = 能看见什么 + 消耗多少上下文</text></svg>
