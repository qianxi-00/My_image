<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">TensorZero 统一 LLMOps 平台架构</text>

  <!-- Input Layer -->
  <rect x="40" y="60" width="820" height="50" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">应用层请求（Chat / Agent / Batch）</text>
  <text x="450" y="100" text-anchor="middle" font-size="11" fill="#64748b">OpenAI 兼容 API · 统一入口 · 路由策略</text>

  <!-- Arrow -->
  <line x1="450" y1="110" x2="450" y2="135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs>

  <!-- Gateway Layer -->
  <rect x="40" y="135" width="820" height="65" rx="8" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="450" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">① LLM 网关（Gateway）</text>
  <text x="450" y="180" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">Rust 实现 · &lt;1ms p99 延迟 · 10,000 QPS · 多模型路由 · 负载均衡 · 速率限制 · 缓存</text>

  <!-- Arrow -->
  <line x1="450" y1="200" x2="450" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Middle 4 modules -->
  <g transform="translate(40,220)">
    <!-- Observability -->
    <rect x="0" y="0" width="195" height="90" rx="8" fill="url(#g2)" filter="url(#shadow)"/>
    <text x="97" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">② 可观测性</text>
    <text x="97" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">请求/响应全量记录</text>
    <text x="97" y="63" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Token 用量 · 延迟 · 成本</text>
    <text x="97" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">多维标签索引</text>

    <!-- Evaluation -->
    <rect x="210" y="0" width="195" height="90" rx="8" fill="url(#g3)" filter="url(#shadow)"/>
    <text x="307" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">③ 评估（Evaluation）</text>
    <text x="307" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">LLM-as-Judge · 人工标注</text>
    <text x="307" y="63" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">噪声容忍度研究</text>
    <text x="307" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">离线排序可靠性</text>

    <!-- Optimization -->
    <rect x="420" y="0" width="195" height="90" rx="8" fill="url(#g4)" filter="url(#shadow)"/>
    <text x="517" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">④ 优化（Optimization）</text>
    <text x="517" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Autopilot 自动优化</text>
    <text x="517" y="63" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Prompt 自动调优</text>
    <text x="517" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">3%–612% 性能提升</text>

    <!-- Experimentation -->
    <rect x="630" y="0" width="195" height="90" rx="8" fill="url(#g5)" filter="url(#shadow)"/>
    <text x="727" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⑤ 实验（Experiment）</text>
    <text x="727" y="48" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">A/B 测试 · 多变体对比</text>
    <text x="727" y="63" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">统计显著性检验</text>
    <text x="727" y="78" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">数据驱动迭代</text>
  </g>

  <!-- Feedback loop arrow -->
  <path d="M 860 265 Q 880 310 860 355" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="880" y="315" text-anchor="middle" font-size="9" fill="#10b981" transform="rotate(90,880,315)">闭环反馈</text>

  <!-- Data Store Layer -->
  <rect x="40" y="330" width="820" height="55" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="450" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">统一数据层（ClickHouse）</text>
  <text x="450" y="373" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">推理日志 · 评估结果 · 实验指标 · Token 成本 · 模型性能 — 原生关联，无需多系统拼接</text>

  <!-- Arrow -->
  <line x1="450" y1="385" x2="450" y2="405" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Model Providers -->
  <rect x="40" y="405" width="820" height="50" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="427" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">模型提供商（OpenAI / Anthropic / Google / 本地模型 / 自定义端点）</text>
  <text x="450" y="445" text-anchor="middle" font-size="11" fill="#64748b">统一接口 · 自动 fallback · Tokenizer 效率分析 · 真实成本对比</text>

  <!-- Comparison box -->
  <rect x="40" y="470" width="820" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">vs. 分散方案：LiteLLM（网关）+ Langfuse（可观测）+ Braintrust（评估）+ DSPy（优化）→ 集成成本高，数据割裂</text>
</svg>
