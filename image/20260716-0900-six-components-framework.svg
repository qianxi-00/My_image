<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">六大组件判断框架：Tokenizer / PE / Attention / MoE / Norm / Act</text>
  <rect x="40" y="100" width="360" height="240" rx="12" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>  <text x="220" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Tokenizer</text>  <text x="56" y="162" fill="#e2e8f0" font-size="15">粒度与多语言</text>  <text x="56" y="186" fill="#e2e8f0" font-size="15">多模态扩展</text>  <text x="56" y="210" fill="#e2e8f0" font-size="15">升级兼容成本</text>  <rect x="420" y="100" width="360" height="240" rx="12" fill="#0ea5e9" opacity="0.92" filter="url(#shadow)"/>  <text x="600" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">位置编码</text>  <text x="436" y="162" fill="#e2e8f0" font-size="15">RoPE 变体</text>  <text x="436" y="186" fill="#e2e8f0" font-size="15">长上下文外推</text>  <text x="436" y="210" fill="#e2e8f0" font-size="15">视频时间轴</text>  <rect x="800" y="100" width="360" height="240" rx="12" fill="#10b981" opacity="0.92" filter="url(#shadow)"/>  <text x="980" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">注意力</text>  <text x="816" y="162" fill="#e2e8f0" font-size="15">GQA/MLA/稀疏</text>  <text x="816" y="186" fill="#e2e8f0" font-size="15">KV 成本</text>  <text x="816" y="210" fill="#e2e8f0" font-size="15">长 CoT 友好度</text>  <rect x="40" y="380" width="360" height="240" rx="12" fill="#f59e0b" opacity="0.92" filter="url(#shadow)"/>  <text x="220" y="412" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">MoE</text>  <text x="56" y="442" fill="#e2e8f0" font-size="15">路由稳定</text>  <text x="56" y="466" fill="#e2e8f0" font-size="15">激活参数</text>  <text x="56" y="490" fill="#e2e8f0" font-size="15">服务拓扑</text>  <rect x="420" y="380" width="360" height="240" rx="12" fill="#ec4899" opacity="0.92" filter="url(#shadow)"/>  <text x="600" y="412" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">归一化</text>  <text x="436" y="442" fill="#e2e8f0" font-size="15">Pre-Norm 等</text>  <text x="436" y="466" fill="#e2e8f0" font-size="15">训练稳定</text>  <text x="436" y="490" fill="#e2e8f0" font-size="15">量化友好</text>  <rect x="800" y="380" width="360" height="240" rx="12" fill="#8b5cf6" opacity="0.92" filter="url(#shadow)"/>  <text x="980" y="412" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">激活函数</text>  <text x="816" y="442" fill="#e2e8f0" font-size="15">SwiGLU 等</text>  <text x="816" y="466" fill="#e2e8f0" font-size="15">算子效率</text>  <text x="816" y="490" fill="#e2e8f0" font-size="15">硬件适配</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">选型=在延迟、显存、能力与生态间做组件组合</text></svg>
