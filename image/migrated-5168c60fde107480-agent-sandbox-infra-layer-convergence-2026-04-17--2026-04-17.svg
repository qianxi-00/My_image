<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #123b78; }
      .subtitle { font: 500 18px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #4b6285; }
      .boxTitle { font: 700 24px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #143a72; }
      .boxText { font: 500 18px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #23456f; }
      .small { font: 500 16px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #35557f; }
      .centerTitle { font: 700 30px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .centerText { font: 600 20px 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill: #eaf3ff; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" class="title">同一层基础设施，正在被同时争夺</text>
  <text x="600" y="96" text-anchor="middle" class="subtitle">所谓“沙箱”，已经从安全配角变成智能体默认工作台</text>

  <rect x="70" y="150" rx="20" ry="20" width="250" height="150" fill="#ffffff" stroke="#b7cff7" stroke-width="3"/>
  <text x="195" y="196" text-anchor="middle" class="boxTitle">模型厂商</text>
  <text x="195" y="232" text-anchor="middle" class="boxText">希望把执行方式</text>
  <text x="195" y="262" text-anchor="middle" class="boxText">做成默认开发路径</text>

  <rect x="70" y="340" rx="20" ry="20" width="250" height="150" fill="#ffffff" stroke="#b7cff7" stroke-width="3"/>
  <text x="195" y="386" text-anchor="middle" class="boxTitle">命令行与框架</text>
  <text x="195" y="422" text-anchor="middle" class="boxText">希望把权限确认点</text>
  <text x="195" y="452" text-anchor="middle" class="boxText">和会话恢复留在本地</text>

  <rect x="880" y="150" rx="20" ry="20" width="250" height="150" fill="#ffffff" stroke="#b7cff7" stroke-width="3"/>
  <text x="1005" y="196" text-anchor="middle" class="boxTitle">云平台</text>
  <text x="1005" y="232" text-anchor="middle" class="boxText">希望把隔离执行</text>
  <text x="1005" y="262" text-anchor="middle" class="boxText">做成受管基础设施</text>

  <rect x="880" y="340" rx="20" ry="20" width="250" height="150" fill="#ffffff" stroke="#b7cff7" stroke-width="3"/>
  <text x="1005" y="386" text-anchor="middle" class="boxTitle">社区运行时</text>
  <text x="1005" y="422" text-anchor="middle" class="boxText">希望把沙箱变成</text>
  <text x="1005" y="452" text-anchor="middle" class="boxText">可编程的一等对象</text>

  <rect x="360" y="170" rx="30" ry="30" width="480" height="320" fill="#2a65c8"/>
  <text x="600" y="220" text-anchor="middle" class="centerTitle">智能体沙箱基础设施层</text>
  <rect x="410" y="255" rx="16" ry="16" width="160" height="68" fill="#4f85e1"/>
  <text x="490" y="297" text-anchor="middle" class="centerText">隔离执行</text>
  <rect x="630" y="255" rx="16" ry="16" width="160" height="68" fill="#4f85e1"/>
  <text x="710" y="297" text-anchor="middle" class="centerText">权限审批</text>
  <rect x="410" y="345" rx="16" ry="16" width="160" height="68" fill="#4f85e1"/>
  <text x="490" y="387" text-anchor="middle" class="centerText">状态恢复</text>
  <rect x="630" y="345" rx="16" ry="16" width="160" height="68" fill="#4f85e1"/>
  <text x="710" y="387" text-anchor="middle" class="centerText">产物交付</text>
  <text x="600" y="450" text-anchor="middle" class="small">谁掌握这一层，谁就更接近默认工作台、默认运行时与默认部署入口</text>

  <path d="M320 225 C350 225, 350 225, 360 225" stroke="#6c93d8" stroke-width="5" fill="none"/>
  <polygon points="356,215 376,225 356,235" fill="#6c93d8"/>
  <path d="M320 415 C350 415, 350 415, 360 415" stroke="#6c93d8" stroke-width="5" fill="none"/>
  <polygon points="356,405 376,415 356,425" fill="#6c93d8"/>
  <path d="M880 225 C850 225, 850 225, 840 225" stroke="#6c93d8" stroke-width="5" fill="none"/>
  <polygon points="844,215 824,225 844,235" fill="#6c93d8"/>
  <path d="M880 415 C850 415, 850 415, 840 415" stroke="#6c93d8" stroke-width="5" fill="none"/>
  <polygon points="844,405 824,415 844,425" fill="#6c93d8"/>

  <rect x="190" y="575" rx="26" ry="26" width="820" height="92" fill="#ffffff" stroke="#a9c3ef" stroke-width="3"/>
  <text x="600" y="620" text-anchor="middle" class="boxTitle">最终争夺的不是“谁多一个工具”，而是“谁定义智能体默认执行边界”</text>
  <text x="600" y="650" text-anchor="middle" class="boxText">当模型开始读文件、跑命令、调浏览器、出报告，沙箱就变成新的基础设施主线</text>
</svg>
