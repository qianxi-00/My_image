<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#f8fafc"/><text x="600" y="55" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">多人语音 Agent 的实时轮次决策架构</text><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs><g font-family="Arial, sans-serif"><rect x="55" y="120" width="210" height="110" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="160" y="165" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">多人音频流</text><text x="160" y="198" text-anchor="middle" font-size="17" fill="#1e40af">重叠说话 / 停顿 / 插话</text><rect x="340" y="110" width="220" height="130" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="450" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#075985">分块语音编码</text><text x="450" y="188" text-anchor="middle" font-size="17" fill="#0369a1">0.5–3 秒动态 chunk</text><text x="450" y="216" text-anchor="middle" font-size="17" fill="#0369a1">语音嵌入 + 转写假设</text><rect x="635" y="110" width="240" height="130" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="755" y="153" text-anchor="middle" font-size="22" font-weight="700" fill="#4c1d95">角色条件 LLM</text><text x="755" y="186" text-anchor="middle" font-size="17" fill="#5b21b6">系统角色 / 对话上下文</text><text x="755" y="214" text-anchor="middle" font-size="17" fill="#5b21b6">是否该接话？该怎么说？</text><rect x="945" y="120" width="200" height="110" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="1045" y="164" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">输出决策</text><text x="1045" y="198" text-anchor="middle" font-size="17" fill="#166534">接话 + 回复 / 继续聆听</text><path d="M265 175 L340 175" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/><path d="M560 175 L635 175" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/><path d="M875 175 L945 175" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/><rect x="120" y="325" width="280" height="130" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="260" y="370" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">ModeratorLM</text><text x="260" y="405" text-anchor="middle" font-size="17" fill="#c2410c">用角色约束轮次行为</text><text x="260" y="433" text-anchor="middle" font-size="17" fill="#c2410c">减少错误插话</text><rect x="460" y="325" width="280" height="130" rx="18" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><text x="600" y="370" text-anchor="middle" font-size="22" font-weight="700" fill="#713f12">ModeratorLM-Think</text><text x="600" y="405" text-anchor="middle" font-size="17" fill="#854d0e">先推理语境与职责</text><text x="600" y="433" text-anchor="middle" font-size="17" fill="#854d0e">再决定是否发言</text><rect x="800" y="325" width="280" height="130" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="940" y="370" text-anchor="middle" font-size="22" font-weight="700" fill="#7f1d1d">应用层含义</text><text x="940" y="405" text-anchor="middle" font-size="17" fill="#991b1b">会议主持 / 客服协同</text><text x="940" y="433" text-anchor="middle" font-size="17" fill="#991b1b">课堂助教 / 多人协作</text><path d="M260 325 C330 270, 530 270, 600 325" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/><path d="M740 390 L800 390" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/><rect x="120" y="555" width="960" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="600" y="590" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">关键变化：语音 Agent 不再只判断“用户一句话结束了吗”，而要判断“在这个群体、这个角色、这个时刻，我是否应该发言”。</text><text x="600" y="625" text-anchor="middle" font-size="18" fill="#334155">这把实时语音从双人问答推进到多人协作界面。</text></g></svg>