<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title{font:700 34px 'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;fill:#0f172a}
      .sub{font:500 18px 'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;fill:#475569}
      .box-title{font:700 24px 'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;fill:#111827}
      .txt{font:500 17px 'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;fill:#334155}
      .small{font:500 15px 'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;fill:#64748b}
      .formula{font:600 18px 'Times New Roman','Noto Sans CJK SC',serif;fill:#1e3a8a}
      .card{fill:#ffffff;stroke:#c7d2fe;stroke-width:2;filter:url(#shadow)}
      .accent{fill:#dbeafe;stroke:#60a5fa;stroke-width:2}
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1e3a8a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="60" y="70" class="title">从 TRPO 到 PPO：同一个信赖域思想的两种工程化表达</text>
  <text x="60" y="105" class="sub">目标不是“每一步都走最大”，而是让策略更新既有效又不过度偏离旧策略</text>

  <rect x="70" y="155" width="310" height="400" rx="22" class="card"/>
  <text x="105" y="205" class="box-title">TRPO：显式约束</text>
  <text x="105" y="250" class="txt">最大化代理目标</text>
  <text x="105" y="285" class="formula">E[ r_t(θ) A_t ]</text>
  <text x="105" y="335" class="txt">同时限制 KL 距离</text>
  <text x="105" y="370" class="formula">E[ KL(π_old || π_θ) ] ≤ δ</text>
  <text x="105" y="430" class="small">优点：更新边界清楚，理论感强</text>
  <text x="105" y="460" class="small">代价：二阶近似、共轭梯度、实现重</text>

  <path d="M405 350 C455 300, 505 300, 555 350" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="430" y="245" width="155" height="78" rx="18" class="accent"/>
  <text x="452" y="278" class="txt">工程问题</text>
  <text x="443" y="305" class="small">能不能更简单？</text>

  <rect x="610" y="155" width="310" height="400" rx="22" class="card"/>
  <text x="645" y="205" class="box-title">PPO：剪切近似</text>
  <text x="645" y="250" class="txt">用概率比率监控更新</text>
  <text x="645" y="285" class="formula">r_t(θ)=π_θ(a|s)/π_old(a|s)</text>
  <text x="645" y="335" class="txt">把过大步长剪回区间</text>
  <text x="645" y="370" class="formula">clip(r_t, 1-ε, 1+ε) A_t</text>
  <text x="645" y="430" class="small">优点：一阶优化即可，易并行、易调参</text>
  <text x="645" y="460" class="small">代价：理论保证变弱，依赖经验阈值</text>

  <rect x="950" y="170" width="185" height="350" rx="20" fill="#fefce8" stroke="#facc15" stroke-width="2"/>
  <text x="982" y="215" class="box-title" font-size="22">共同核心</text>
  <text x="982" y="265" class="txt">1. 使用旧策略采样</text>
  <text x="982" y="305" class="txt">2. 用优势估计定方向</text>
  <text x="982" y="345" class="txt">3. 限制策略分布漂移</text>
  <text x="982" y="385" class="txt">4. 换取稳定改进</text>
  <text x="982" y="450" class="small">PPO 牺牲严格信赖域，</text>
  <text x="982" y="478" class="small">换来后训练时代的可用性。</text>

  <line x1="225" y1="590" x2="765" y2="590" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="225" cy="590" r="10" fill="#2563eb"/>
  <circle cx="495" cy="590" r="10" fill="#60a5fa"/>
  <circle cx="765" cy="590" r="10" fill="#2563eb"/>
  <text x="145" y="630" class="small">理论保证更强</text>
  <text x="420" y="630" class="small">稳定性边界</text>
  <text x="700" y="630" class="small">工程吞吐更友好</text>
</svg>
