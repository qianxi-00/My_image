<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><defs><style>.t{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#172033}.s{font-size:14px;fill:#344054}.h{font-size:26px;font-weight:700;fill:#101828}.box{fill:#f8fbff;stroke:#3b82f6;stroke-width:2;rx:16}.box2{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:16}.box3{fill:#f0fdf4;stroke:#22c55e;stroke-width:2;rx:16}.line{stroke:#475467;stroke-width:2;marker-end:url(#a)}.soft{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475467"/></marker></defs><rect width="1200" height="720" fill="#fff"/><text x="52" y="62" class="h">生产级语音 Agent 的新指标：延迟、可靠性和治理一起看</text><text x="52" y="96" class="s">GPT-Realtime-2 把 reasoning effort、并行工具调用和上下文窗口暴露给开发者，意味着产品要做动态调度。</text><rect x="70" y="155" width="230" height="115" class="box"/><text x="112" y="198" class="t">低风险问答</text><text x="100" y="228" class="s">minimal / low reasoning</text><text x="100" y="252" class="s">优先 TTFA 与连续感</text><rect x="485" y="155" width="230" height="115" class="box2"/><text x="525" y="198" class="t">复杂任务流</text><text x="518" y="228" class="s">medium / high reasoning</text><text x="518" y="252" class="s">允许更多思考与工具调用</text><rect x="900" y="155" width="230" height="115" class="box3"/><text x="935" y="198" class="t">高风险操作</text><text x="928" y="228" class="s">确认、策略、人工接管</text><text x="928" y="252" class="s">合规优先于速度</text><line x1="300" y1="213" x2="485" y2="213" class="line"/><line x1="715" y1="213" x2="900" y2="213" class="line"/><rect x="120" y="350" width="960" height="210" fill="#f8fafc" stroke="#cbd5e1" rx="22"/><text x="170" y="395" class="t">动态调度闭环</text><text x="170" y="434" class="s">1. 识别意图风险：闲聊、查询、跨系统任务、交易或敏感操作</text><text x="170" y="470" class="s">2. 选择 reasoning effort：简单问题保低延迟，复杂任务给模型更长思考预算</text><text x="170" y="506" class="s">3. 管理工具透明度：preamble 告诉用户“正在查日历/订单”，避免沉默</text><text x="170" y="542" class="s">4. 记录审计证据：转写、工具参数、确认话术、失败原因和人工接管点</text><rect x="285" y="610" width="630" height="50" fill="#eef2ff" stroke="#6366f1" rx="14"/><text x="340" y="642" class="s">语音产品的体验，不再只由模型自然度决定，而由会话调度策略决定。</text></svg>