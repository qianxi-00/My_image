<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">Tokenizer + Projector：输入输出契约决定上限</text>
  <rect x="40" y="120" width="262" height="300" rx="12" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>  <text x="171" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">原始模态</text>  <text x="56" y="182" fill="#e2e8f0" font-size="15">文本/图像/视频</text>  <text x="56" y="206" fill="#e2e8f0" font-size="15">音频/GUI</text>  <rect x="326" y="120" width="262" height="300" rx="12" fill="#0ea5e9" opacity="0.92" filter="url(#shadow)"/>  <text x="457" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Tokenizer</text>  <text x="342" y="182" fill="#e2e8f0" font-size="15">离散化粒度</text>  <text x="342" y="206" fill="#e2e8f0" font-size="15">压缩与损失</text>  <rect x="612" y="120" width="262" height="300" rx="12" fill="#10b981" opacity="0.92" filter="url(#shadow)"/>  <text x="743" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Projector</text>  <text x="628" y="182" fill="#e2e8f0" font-size="15">对齐维度</text>  <text x="628" y="206" fill="#e2e8f0" font-size="15">时序/空间保持</text>  <rect x="898" y="120" width="262" height="300" rx="12" fill="#f59e0b" opacity="0.92" filter="url(#shadow)"/>  <text x="1029" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">LLM 主干</text>  <text x="914" y="182" fill="#e2e8f0" font-size="15">统一序列建模</text>  <text x="914" y="206" fill="#e2e8f0" font-size="15">工具/结构化输出</text>  <text x="600" y="536" text-anchor="middle" fill="#94a3b8" font-size="14">接口层往往比主干更决定可落地性</text></svg>
