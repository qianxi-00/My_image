<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#fbfbf9"/><text x="70" y="78" font-size="34" font-family="Arial, sans-serif" font-weight="700" fill="#172033">Agentic Ziggy 更像“商品数据操作系统”的编排层</text><g font-family="Arial, sans-serif" font-size="21" fill="#111827"><rect x="440" y="145" width="320" height="120" rx="22" fill="#111827"/><text x="520" y="195" fill="white" font-weight="700">编排层 Ziggy</text><text x="485" y="230" fill="white">任务分解 / 优先级 / 审批回路</text><rect x="95" y="335" width="220" height="120" rx="16" fill="#e0f2fe" stroke="#0284c7"/><text x="138" y="385">建模 Agent</text><text x="127" y="420">属性、类目、关系</text><rect x="370" y="335" width="220" height="120" rx="16" fill="#ecfccb" stroke="#65a30d"/><text x="408" y="385">映射 Agent</text><text x="404" y="420">渠道字段转换</text><rect x="645" y="335" width="220" height="120" rx="16" fill="#fef9c3" stroke="#ca8a04"/><text x="682" y="385">内容 Agent</text><text x="675" y="420">描述、翻译、补全</text><rect x="920" y="335" width="220" height="120" rx="16" fill="#ffe4e6" stroke="#e11d48"/><text x="958" y="385">质检 Agent</text><text x="950" y="420">一致性、合规、缺口</text><path d="M500 265 L210 330" stroke="#475569" stroke-width="4"/><path d="M555 265 L480 330" stroke="#475569" stroke-width="4"/><path d="M645 265 L755 330" stroke="#475569" stroke-width="4"/><path d="M700 265 L1030 330" stroke="#475569" stroke-width="4"/><rect x="275" y="540" width="650" height="70" rx="14" fill="#f1f5f9" stroke="#64748b"/><text x="354" y="583">人类团队负责目标、规则、抽检与最终责任</text></g></svg>