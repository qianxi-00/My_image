<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">Qwen2.5-VL 能力地图：文档 / 视频 / GUI / Agent</text>
  <rect x="40" y="100" width="260" height="220" rx="12" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>  <text x="170" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">文档理解</text>  <text x="56" y="162" fill="#e2e8f0" font-size="15">OCR+版面</text>  <text x="56" y="186" fill="#e2e8f0" font-size="15">表格票据</text>  <text x="56" y="210" fill="#e2e8f0" font-size="15">图表推理</text>  <rect x="330" y="100" width="260" height="220" rx="12" fill="#0ea5e9" opacity="0.92" filter="url(#shadow)"/>  <text x="460" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">长视频</text>  <text x="346" y="162" fill="#e2e8f0" font-size="15">时序定位</text>  <text x="346" y="186" fill="#e2e8f0" font-size="15">关键帧采样</text>  <text x="346" y="210" fill="#e2e8f0" font-size="15">跨片段引用</text>  <rect x="620" y="100" width="260" height="220" rx="12" fill="#10b981" opacity="0.92" filter="url(#shadow)"/>  <text x="750" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">GUI/截图</text>  <text x="636" y="162" fill="#e2e8f0" font-size="15">控件定位</text>  <text x="636" y="186" fill="#e2e8f0" font-size="15">界面状态</text>  <text x="636" y="210" fill="#e2e8f0" font-size="15">坐标输出</text>  <rect x="910" y="100" width="250" height="220" rx="12" fill="#f59e0b" opacity="0.92" filter="url(#shadow)"/>  <text x="1035" y="132" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">视觉 Agent</text>  <text x="926" y="162" fill="#e2e8f0" font-size="15">多步计划</text>  <text x="926" y="186" fill="#e2e8f0" font-size="15">工具调用</text>  <text x="926" y="210" fill="#e2e8f0" font-size="15">可执行闭环</text>  <rect x="40" y="360" width="1120" height="120" rx="12" fill="#334155" opacity="0.92" filter="url(#shadow)"/>  <text x="600" y="392" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">工程判断</text>  <text x="56" y="422" fill="#e2e8f0" font-size="15">选型看：空间表示是否可落地、长视频是否可控、结构化输出是否稳定、能否接入工作流</text>  <text x="600" y="696" text-anchor="middle" fill="#94a3b8" font-size="14">把“会看图”升级成“能驱动任务”</text></svg>
