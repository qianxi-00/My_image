<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><defs><style>.title{font:700 28px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}.h{font:700 20px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}.t{font:15px Arial,"Noto Sans CJK SC",sans-serif;fill:#374151}.small{font:13px Arial,"Noto Sans CJK SC",sans-serif;fill:#4b5563}.box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:16}.blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#ecfdf5;stroke:#059669}.amber{fill:#fffbeb;stroke:#d97706}.purple{fill:#f5f3ff;stroke:#7c3aed}.arrow{stroke:#334155;stroke-width:2.4;marker-end:url(#a);fill:none}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs><rect width="1280" height="720" fill="#f8fafc"/><text x="50" y="58" class="title">从单模型到系统组件：架构取舍的位置变了</text><rect x="70" y="135" width="230" height="120" class="box blue"/><text x="100" y="180" class="h">输入层</text><text x="100" y="215" class="t">文本 / 代码 / 图像</text><rect x="380" y="135" width="230" height="120" class="box green"/><text x="410" y="180" class="h">注意力层</text><text x="410" y="215" class="t">GQA / MLA / MSA</text><rect x="690" y="135" width="230" height="120" class="box amber"/><text x="720" y="180" class="h">专家层</text><text x="720" y="215" class="t">MoE router / active params</text><rect x="1000" y="135" width="230" height="120" class="box purple"/><text x="1030" y="180" class="h">系统层</text><text x="1030" y="215" class="t">RAG / Agent / IDE / Serving</text><path d="M300 195 L380 195" class="arrow"/><path d="M610 195 L690 195" class="arrow"/><path d="M920 195 L1000 195" class="arrow"/><rect x="105" y="350" width="310" height="190" class="box green"/><text x="135" y="395" class="h">Mellum2 的答案</text><text x="135" y="435" class="t">把模型做成高频组件</text><text x="135" y="470" class="t">少做全能，强调部署经济性</text><text x="135" y="505" class="t">适合路由、摘要、验证、子任务</text><rect x="485" y="350" width="310" height="190" class="box blue"/><text x="515" y="395" class="h">MiniMax M3 的答案</text><text x="515" y="435" class="t">把多能力打包成开放旗舰</text><text x="515" y="470" class="t">长上下文支撑长程 Agent</text><text x="515" y="505" class="t">多模态从预训练起对齐</text><rect x="865" y="350" width="310" height="190" class="box amber"/><text x="895" y="395" class="h">通用稀疏基座的答案</text><text x="895" y="435" class="t">以 MoE + KV 优化降低成本</text><text x="895" y="470" class="t">用后训练与生态扩展能力</text><text x="895" y="505" class="t">让下游产品自行编排</text></svg>