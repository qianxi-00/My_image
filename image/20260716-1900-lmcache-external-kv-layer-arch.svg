<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#111827">外部 KV 缓存层：把缓存管理从推理引擎中拆出</text>
  <text x="600" y="82" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#4b5563">引擎负责算注意力；缓存层负责持久化、跨实例复用、分层存储与观测</text>

  <!-- Engine box -->
  <rect x="60" y="140" width="340" height="480" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="180" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#1d4ed8" font-weight="bold">推理引擎进程</text>
  <rect x="90" y="210" width="280" height="70" rx="10" fill="#dbeafe"/>
  <text x="230" y="252" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">Attention / Prefill / Decode</text>
  <rect x="90" y="300" width="280" height="70" rx="10" fill="#dbeafe"/>
  <text x="230" y="342" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">PagedAttention / Block Table</text>
  <rect x="90" y="390" width="280" height="70" rx="10" fill="#dbeafe"/>
  <text x="230" y="432" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">GPU 本地 KV / Prefix Cache</text>
  <rect x="90" y="480" width="280" height="90" rx="10" fill="#bfdbfe"/>
  <text x="230" y="518" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#1e3a8a">Connector：查找 / 拉取 / 回写</text>
  <text x="230" y="546" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#1e3a8a">不与缓存层命运绑定</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="400" y1="360" x2="500" y2="360" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="450" y="340" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#475569">KV 传输</text>

  <!-- External layer -->
  <rect x="520" y="140" width="620" height="480" rx="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="830" y="180" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#15803d" font-weight="bold">外部 KV 缓存层（如 LMCache）</text>

  <rect x="550" y="210" width="270" height="100" rx="10" fill="#dcfce7"/>
  <text x="685" y="250" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#14532d">控制面 API</text>
  <text x="685" y="278" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">lookup / store / prefetch / clear</text>

  <rect x="840" y="210" width="270" height="100" rx="10" fill="#dcfce7"/>
  <text x="975" y="250" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#14532d">观测与配额</text>
  <text x="975" y="278" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">命中率 / 租户用量 / 生命周期</text>

  <rect x="550" y="340" width="560" height="90" rx="10" fill="#bbf7d0"/>
  <text x="830" y="375" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#14532d">L1：CPU / 主机内存共享池（可跨引擎进程）</text>
  <text x="830" y="405" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#166534">统一缓存，避免 DP rank 各自为政</text>

  <rect x="550" y="455" width="270" height="120" rx="10" fill="#86efac"/>
  <text x="685" y="500" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#14532d">L2：本地 SSD / 远端</text>
  <text x="685" y="528" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#166534">Redis / S3 / Mooncake / NIXL</text>
  <text x="685" y="552" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#166534">持久化与跨节点复用</text>

  <rect x="840" y="455" width="270" height="120" rx="10" fill="#86efac"/>
  <text x="975" y="500" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#14532d">变换与传输插件</text>
  <text x="975" y="528" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#166534">压缩 / Serde / PD 传输</text>
  <text x="975" y="552" text-anchor="middle" font-size="13" font-family="Arial, sans-serif" fill="#166534">CacheBlend 非前缀复用</text>

  <text x="600" y="660" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#334155">核心转变：KV 从“引擎内临时状态”变成“系统级可治理资源”</text>
</svg>