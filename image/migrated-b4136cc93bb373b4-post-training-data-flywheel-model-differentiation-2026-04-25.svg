<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#5b6bff"/>
    </marker>
    <style>
      .title { font: 700 38px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #1f2937; }
      .subtitle { font: 400 20px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #4b5563; }
      .centerTitle { font: 700 34px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #111827; }
      .centerSub { font: 400 20px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #374151; }
      .boxTitle { font: 700 26px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #111827; }
      .boxText { font: 400 18px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #c7d2fe; stroke-width: 2.5; rx: 24; }
      .arrow { fill: none; stroke: #5b6bff; stroke-width: 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="70" text-anchor="middle" class="title">后训练数据飞轮：模型差异化的新主战场</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">关键不只是收集更多数据，而是把真实流量、工具轨迹、评估与训练连成持续闭环</text>

  <rect x="610" y="330" width="380" height="220" rx="28" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/>
  <text x="800" y="410" text-anchor="middle" class="centerTitle">后训练数据飞轮</text>
  <text x="800" y="448" text-anchor="middle" class="centerSub">流量 → 评估 → 优化 → 部署 → 再回流</text>
  <text x="800" y="488" text-anchor="middle" class="centerSub">比“更大底模”更快兑现为产品体感</text>

  <rect class="box" x="120" y="150" width="330" height="140" rx="24"/>
  <text x="285" y="205" text-anchor="middle" class="boxTitle">1. 用户任务与业务流量</text>
  <text x="285" y="240" text-anchor="middle" class="boxText">真实问题、真实失败、真实场景</text>
  <text x="285" y="268" text-anchor="middle" class="boxText">决定模型到底被拿去做什么</text>

  <rect class="box" x="1120" y="150" width="330" height="140" rx="24"/>
  <text x="1285" y="205" text-anchor="middle" class="boxTitle">2. 工具轨迹与思维记录</text>
  <text x="1285" y="240" text-anchor="middle" class="boxText">计划、调用、重试、暂停、回放</text>
  <text x="1285" y="268" text-anchor="middle" class="boxText">把“过程质量”变成可观察对象</text>

  <rect class="box" x="1130" y="610" width="330" height="140" rx="24"/>
  <text x="1295" y="665" text-anchor="middle" class="boxTitle">3. 人工审校与自动评估</text>
  <text x="1295" y="700" text-anchor="middle" class="boxText">rubric、judge model、GRM、规则引擎</text>
  <text x="1295" y="728" text-anchor="middle" class="boxText">把原始轨迹压缩成监督信号</text>

  <rect class="box" x="120" y="610" width="330" height="140" rx="24"/>
  <text x="285" y="665" text-anchor="middle" class="boxTitle">4. SFT / RL / 专家整合</text>
  <text x="285" y="700" text-anchor="middle" class="boxText">偏好优化、specialist、OPD</text>
  <text x="285" y="728" text-anchor="middle" class="boxText">把监督重新写回模型行为</text>

  <rect class="box" x="635" y="690" width="330" height="120" rx="24"/>
  <text x="800" y="742" text-anchor="middle" class="boxTitle">5. 灰度部署与持续监控</text>
  <text x="800" y="775" text-anchor="middle" class="boxText">新版本上线后继续收集回归与新失败样本</text>

  <path class="arrow" d="M450 220 C560 220, 610 260, 680 330"/>
  <path class="arrow" d="M1120 220 C1040 220, 980 260, 920 330"/>
  <path class="arrow" d="M1125 680 C1040 650, 980 610, 940 550"/>
  <path class="arrow" d="M450 680 C560 650, 620 610, 670 550"/>
  <path class="arrow" d="M800 690 C800 640, 800 600, 800 550"/>
  <path class="arrow" d="M965 750 C1090 760, 1180 740, 1225 710"/>
  <path class="arrow" d="M120 220 C60 330, 60 520, 120 640"/>

  <text x="100" y="360" class="boxText" transform="rotate(-90 100 360)">部署后继续回流，飞轮才会真正加速</text>
</svg>
