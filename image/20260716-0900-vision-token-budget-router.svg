<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)" rx="14"/>
  <text x="600" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">视觉 token 预算与动态分辨率：从“堆 patch”到“路由压缩”</text>
  <rect x="40" y="120" width="262" height="300" rx="12" fill="#4f46e5" opacity="0.92" filter="url(#shadow)"/>  <text x="171" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">输入图像</text>  <text x="56" y="182" fill="#e2e8f0" font-size="15">分辨率可变</text>  <text x="56" y="206" fill="#e2e8f0" font-size="15">文档/自然图分流</text>  <rect x="326" y="120" width="262" height="300" rx="12" fill="#0ea5e9" opacity="0.92" filter="url(#shadow)"/>  <text x="457" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">动态采样</text>  <text x="342" y="182" fill="#e2e8f0" font-size="15">高细节区域加密</text>  <text x="342" y="206" fill="#e2e8f0" font-size="15">背景降采样</text>  <rect x="612" y="120" width="262" height="300" rx="12" fill="#10b981" opacity="0.92" filter="url(#shadow)"/>  <text x="743" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Token 路由</text>  <text x="628" y="182" fill="#e2e8f0" font-size="15">重要 patch 保留</text>  <text x="628" y="206" fill="#e2e8f0" font-size="15">冗余 token 合并</text>  <rect x="898" y="120" width="262" height="300" rx="12" fill="#f59e0b" opacity="0.92" filter="url(#shadow)"/>  <text x="1029" y="152" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">进入 LLM</text>  <text x="914" y="182" fill="#e2e8f0" font-size="15">上下文可控</text>  <text x="914" y="206" fill="#e2e8f0" font-size="15">延迟/质量折中</text>  <text x="600" y="536" text-anchor="middle" fill="#94a3b8" font-size="14">看清图像 ≠ 无脑增加视觉 token</text></svg>
