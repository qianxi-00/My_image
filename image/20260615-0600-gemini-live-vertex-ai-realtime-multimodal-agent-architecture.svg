<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720"><style>text{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;fill:#122033}.title{font-size:26px;font-weight:700}.h{font-size:18px;font-weight:700}.t{font-size:14px}.s{font-size:12px;fill:#506070}.box{fill:#f7fbff;stroke:#2b6cb0;stroke-width:2;rx:16}.green{fill:#f4fff7;stroke:#2f855a}.orange{fill:#fffaf0;stroke:#c05621}.purple{fill:#faf5ff;stroke:#805ad5}.line{stroke:#435466;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:6 5}</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#435466"/></marker></defs><rect width="1180" height="720" fill="#ffffff"/><text x="50" y="52" class="title">Gemini Live API：实时多模态 Agent 的生产链路</text><text x="52" y="82" class="s">低延迟音频、视频/屏幕上下文、工具调用与 Vertex AI 治理在同一条交互链上协同</text><rect x="55" y="140" width="230" height="115" class="box"/><text x="85" y="178" class="h">连续输入</text><text x="85" y="210" class="t">语音 / 画面 / 屏幕 / 文本</text><text x="85" y="234" class="s">包含停顿、打断、语气与视觉指代</text><rect x="370" y="120" width="270" height="155" class="box green"/><text x="405" y="158" class="h">Live API 会话层</text><text x="405" y="190" class="t">流式音视频事件</text><text x="405" y="216" class="t">turn-taking / barge-in</text><text x="405" y="242" class="t">session state / tool events</text><rect x="725" y="110" width="310" height="175" class="box purple"/><text x="760" y="150" class="h">Gemini Flash Live 模型</text><text x="760" y="184" class="t">原生音频理解与生成</text><text x="760" y="210" class="t">视觉上下文 + 长对话记忆</text><text x="760" y="236" class="t">复杂任务执行与函数调用</text><rect x="370" y="385" width="270" height="145" class="box orange"/><text x="405" y="425" class="h">Vertex AI 生产面</text><text x="405" y="458" class="t">区域、数据驻留、权限</text><text x="405" y="484" class="t">并发、SLA、日志与监控</text><rect x="725" y="390" width="310" height="150" class="box"/><text x="760" y="430" class="h">业务动作</text><text x="760" y="464" class="t">客服工单 / 贷款助手 / 现场维修</text><text x="760" y="490" class="t">视觉诊断 / 预约成交 / 创作陪伴</text><path d="M285 198 C315 198 330 198 370 198" class="line"/><path d="M640 198 C675 198 690 198 725 198" class="line"/><path d="M880 285 C880 340 850 365 805 390" class="line"/><path d="M725 465 C690 465 675 465 640 465" class="line"/><path d="M505 385 C505 340 505 320 505 275" class="line dash"/><path d="M640 455 C685 380 695 300 725 240" class="line dash"/><text x="86" y="610" class="s">重点变化：实时 Agent 不再只是 ASR+LLM+TTS 级联，而是把连续感知、会话状态、函数调用和企业治理放到同一条链路里。</text></svg>