<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><defs><style>.t{font-family:Arial,"Noto Sans CJK SC",sans-serif;font-size:18px;fill:#172033}.s{font-size:14px;fill:#344054}.h{font-size:26px;font-weight:700;fill:#101828}.box{fill:#f8fbff;stroke:#3b82f6;stroke-width:2;rx:16}.box2{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:16}.box3{fill:#f0fdf4;stroke:#22c55e;stroke-width:2;rx:16}.line{stroke:#475467;stroke-width:2;marker-end:url(#a)}.soft{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475467"/></marker></defs><rect width="1200" height="720" fill="#ffffff"/><text x="52" y="58" class="h">GPT-Realtime-2：语音 Agent 从聊天模型变成会话操作系统</text><text x="54" y="92" class="s">音频输入、推理、工具调用、翻译、转写和治理在同一条实时链路里协同</text><rect x="55" y="145" width="220" height="105" class="box"/><text x="88" y="188" class="t">用户现场</text><text x="82" y="218" class="s">语音 / 打断 / 口音 / 情绪</text><line x1="275" y1="198" x2="360" y2="198" class="line"/><rect x="365" y="132" width="250" height="135" class="soft"/><text x="405" y="180" class="t">Realtime 会话层</text><text x="394" y="212" class="s">WebRTC / WebSocket / SIP</text><text x="394" y="238" class="s">事件流、状态、上下文窗口</text><line x1="615" y1="198" x2="705" y2="198" class="line"/><rect x="710" y="112" width="300" height="175" class="box2"/><text x="760" y="158" class="t">GPT-Realtime-2</text><text x="744" y="190" class="s">语音中推理 + 可调 reasoning effort</text><text x="744" y="218" class="s">preamble、并行工具调用、恢复行为</text><text x="744" y="246" class="s">128K 上下文、专有名词保持</text><line x1="860" y1="287" x2="860" y2="370" class="line"/><rect x="650" y="380" width="420" height="135" class="box3"/><text x="720" y="425" class="t">工具与业务系统</text><text x="690" y="458" class="s">日历 / CRM / 订单 / 知识库 / 工单 / 合规策略</text><text x="690" y="486" class="s">并行调用、失败解释、确认与人工接管</text><line x1="710" y1="448" x2="285" y2="448" class="line"/><rect x="55" y="382" width="230" height="132" class="box"/><text x="94" y="430" class="t">实时反馈</text><text x="84" y="462" class="s">自然语音、翻译、转写</text><text x="84" y="490" class="s">边做边说，而不是等结果</text><rect x="170" y="580" width="860" height="64" fill="#f9fafb" stroke="#d0d5dd" rx="16"/><text x="220" y="620" class="s">关键变化：不是把 ASR、LLM、TTS 简单串联，而是把“听懂—推理—行动—解释—治理”变成一个低延迟会话协议。</text></svg>