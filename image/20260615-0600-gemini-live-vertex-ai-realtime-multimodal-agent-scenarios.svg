<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720"><style>text{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;fill:#122033}.title{font-size:26px;font-weight:700}.h{font-size:18px;font-weight:700}.t{font-size:14px}.s{font-size:12px;fill:#506070}.box{fill:#f7fbff;stroke:#2b6cb0;stroke-width:2;rx:16}.green{fill:#f4fff7;stroke:#2f855a}.orange{fill:#fffaf0;stroke:#c05621}.purple{fill:#faf5ff;stroke:#805ad5}.line{stroke:#435466;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:6 5}</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#435466"/></marker></defs><rect width="1180" height="720" fill="#ffffff"/><text x="50" y="55" class="title">Gemini Live API 的落地方向：从语音聊天到现场协作</text><rect x="70" y="130" width="300" height="180" class="box"/><text x="105" y="170" class="h">客户体验</text><text x="105" y="205" class="t">实时客服、AI 接待、预约成交</text><text x="105" y="235" class="s">关键：低延迟、多语言、情绪识别</text><rect x="440" y="130" width="300" height="180" class="box green"/><text x="475" y="170" class="h">视觉支持</text><text x="475" y="205" class="t">远程维修、屏幕共享、图表解释</text><text x="475" y="235" class="s">关键：看到同一现场并即时讲解</text><rect x="810" y="130" width="300" height="180" class="box purple"/><text x="845" y="170" class="h">高风险流程</text><text x="845" y="205" class="t">贷款、医疗、合规问答</text><text x="845" y="235" class="s">关键：权限、审计、人工接管</text><rect x="255" y="410" width="300" height="170" class="box orange"/><text x="290" y="450" class="h">移动/无桌面场景</text><text x="290" y="485" class="t">仓储、门店、车载、现场作业</text><text x="290" y="515" class="s">关键：少打字、边看边说边执行</text><rect x="625" y="410" width="300" height="170" class="box"/><text x="660" y="450" class="h">创作与陪伴</text><text x="660" y="485" class="t">共同创作、训练陪练、实时反馈</text><text x="660" y="515" class="s">关键：长对话线程和自然节奏</text><path d="M370 220 L440 220" class="line"/><path d="M740 220 L810 220" class="line"/><path d="M555 495 L625 495" class="line"/><text x="91" y="640" class="s">核心趋势：实时多模态不是“多一个语音入口”，而是把 AI 从聊天窗口移动到业务现场。</text></svg>