<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .title { font: 700 38px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif; fill:#111827; }
      .subtitle { font: 500 22px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif; fill:#374151; }
      .label { font: 700 26px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif; fill:#111827; }
      .text { font: 500 21px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif; fill:#1f2937; }
      .small { font: 500 18px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif; fill:#4b5563; }
      .pill { font: 700 18px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif; fill:#fff; }
    </style>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="1400" height="860" fill="#f8fafc"/>
  <text x="700" y="72" text-anchor="middle" class="title">PIXAR 想重写的，不只是“篡改检测”，而是 VLM 的三层评测结构</text>
  <text x="700" y="110" text-anchor="middle" class="subtitle">从二元真假判断，升级到像素定位、语义分类与语言描述的统一协议</text>

  <rect x="110" y="175" width="1180" height="560" rx="32" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>

  <rect x="180" y="230" width="1040" height="90" rx="24" fill="#dbeafe"/>
  <text x="700" y="268" text-anchor="middle" class="label">第 1 层：像素级定位</text>
  <text x="700" y="304" text-anchor="middle" class="text">问题不再是“对象大概在哪”，而是“哪些像素真的承载了编辑痕迹”</text>

  <line x1="700" y1="320" x2="700" y2="380" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/>

  <rect x="230" y="390" width="420" height="120" rx="24" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="440" y="435" text-anchor="middle" class="label">第 2 层：语义类别</text>
  <text x="440" y="472" text-anchor="middle" class="text">被改的是哪类对象？属于哪种操作？</text>
  <text x="440" y="500" text-anchor="middle" class="small">例如：路牌 / 人脸 / 商品；替换 / 删除 / 改属性 / 改颜色</text>

  <rect x="750" y="390" width="420" height="120" rx="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="960" y="435" text-anchor="middle" class="label">第 3 层：自然语言描述</text>
  <text x="960" y="472" text-anchor="middle" class="text">模型要说清“改了什么、怎么改、语义后果是什么”</text>
  <text x="960" y="500" text-anchor="middle" class="small">不再只给 mask，而是给能被人读懂的证据表达</text>

  <line x1="440" y1="510" x2="440" y2="575" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/>
  <line x1="960" y1="510" x2="960" y2="575" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow2)"/>
  <line x1="700" y1="320" x2="440" y2="380" stroke="#60a5fa" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="700" y1="320" x2="960" y2="380" stroke="#60a5fa" stroke-width="3" stroke-dasharray="8 8"/>

  <rect x="250" y="590" width="900" height="95" rx="24" fill="#ecfccb" stroke="#84cc16" stroke-width="2"/>
  <text x="700" y="632" text-anchor="middle" class="label">最终回答的核心问题</text>
  <text x="700" y="668" text-anchor="middle" class="text">模型到底是在识别“哪里变了”，还是已经理解“这些变化改变了图像想表达的意思”</text>

  <rect x="118" y="760" width="1164" height="56" rx="16" fill="#111827"/>
  <text x="700" y="796" text-anchor="middle" class="pill">这也是 PIXAR 与旧式 IFDL / explainable 方案的真正分野：它把“像素真实度”和“语义后果”放进同一把尺子</text>
</svg>
